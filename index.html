// ── 📊 REPORT CHARTS ─────────────────────────────────────────────
function buildRevExpChart(rev,exp){
  if(rev===0&&exp===0)return'';
  const W=260,H=90,pad=10,barW=60,gap=30;
  const maxVal=Math.max(rev,exp,1);
  const revH=Math.round((rev/maxVal)*(H-pad*2));
  const expH=Math.round((exp/maxVal)*(H-pad*2));
  const baseline=H-pad;
  const cx=(W-(barW*2+gap))/2;
  const revX=cx, expX=cx+barW+gap;
  const revY=baseline-revH, expY=baseline-expH;
  return`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:${W}px;display:block;margin:0 auto">
    <rect x="${revX}" y="${revY}" width="${barW}" height="${revH}" rx="4" fill="#22c55e" opacity="0.85"/>
    <rect x="${expX}" y="${expY}" width="${barW}" height="${expH}" rx="4" fill="#ef4444" opacity="0.85"/>
    <line x1="0" y1="${baseline}" x2="${W}" y2="${baseline}" stroke="currentColor" stroke-opacity="0.15" stroke-width="1"/>
    <text x="${revX+barW/2}" y="${revY-4}" text-anchor="middle" font-size="9" fill="#22c55e" font-weight="700" font-family="inherit">Rev</text>
    <text x="${expX+barW/2}" y="${expY-4}" text-anchor="middle" font-size="9" fill="#ef4444" font-weight="700" font-family="inherit">Exp</text>
  </svg>`;
}

function buildDonutChart(byMethod){
  const entries=Object.entries(byMethod).filter(([,v])=>v>0);
  if(entries.length===0)return'';
  const total=entries.reduce((s,[,v])=>s+v,0);
  if(total===0)return'';
  const COLORS=['#3b82f6','#22c55e','#f59e0b','#a855f7','#ef4444'];
  const cx=60,cy=60,R=44,r=26;
  let paths='',startAngle=-Math.PI/2;
  entries.forEach(([m,v],i)=>{
    const slice=(v/total)*Math.PI*2;
    const endAngle=startAngle+slice;
    const x1=cx+R*Math.cos(startAngle),y1=cy+R*Math.sin(startAngle);
    const x2=cx+R*Math.cos(endAngle),y2=cy+R*Math.sin(endAngle);
    const xi1=cx+r*Math.cos(startAngle),yi1=cy+r*Math.sin(startAngle);
    const xi2=cx+r*Math.cos(endAngle),yi2=cy+r*Math.sin(endAngle);
    const large=slice>Math.PI?1:0;
    const pct=Math.round(v/total*100);
    const midA=startAngle+slice/2;
    const lx=cx+(R+10)*Math.cos(midA),ly=cy+(R+10)*Math.sin(midA);
    paths+=`<path d="M${xi1} ${yi1} L${x1} ${y1} A${R} ${R} 0 ${large} 1 ${x2} ${y2} L${xi2} ${yi2} A${r} ${r} 0 ${large} 0 ${xi1} ${yi1}Z" fill="${COLORS[i%COLORS.length]}" opacity="0.88"/>`;
    if(pct>=8)paths+=`<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="middle" font-size="8" font-weight="700" fill="${COLORS[i%COLORS.length]}" font-family="inherit">${pct}%</text>`;
    startAngle=endAngle;
  });
  const legend=entries.map(([m,v],i)=>`<div style="display:flex;align-items:center;gap:4px;font-size:10px;font-weight:600;color:var(--text-secondary)"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${COLORS[i%COLORS.length]};flex-shrink:0"></span>${m} ${p(v)}</div>`).join('');
  return`<div style="display:flex;align-items:center;gap:12px">
    <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" style="width:90px;height:90px;flex-shrink:0">${paths}</svg>
    <div style="display:flex;flex-direction:column;gap:5px">${legend}</div>
  </div>`;
}

function buildTopProdsChart(topProds){
  if(topProds.length===0)return'';
  const maxQty=topProds[0][1]||1;
  const COLORS=['#3b82f6','#22c55e','#f59e0b','#a855f7','#ef4444'];
  return topProds.map(([name,qty],i)=>{
    const pct=Math.round(qty/maxQty*100);
    const shortName=name.length>18?name.slice(0,17)+'…':name;
    return`<div style="margin-bottom:7px">
      <div style="display:flex;justify-content:space-between;font-size:11px;font-weight:600;color:var(--text-secondary);margin-bottom:3px">
        <span>${i+1}. ${shortName}</span><span style="color:${COLORS[i%COLORS.length]}">×${qty}</span>
      </div>
      <div style="background:var(--bg-tertiary);border-radius:4px;height:7px;overflow:hidden">
        <div style="width:${pct}%;height:100%;background:${COLORS[i%COLORS.length]};border-radius:4px;opacity:0.85"></div>
      </div>
    </div>`;
  }).join('');
}

// ── 📊 END OF DAY REPORT ─────────────────────────────────────────
function buildReportsContent(key){
  const per=repPer[key]||'Today';
  const logs=BIZ_LOGS[key]||[];
  const explogs=BIZ_EXPLOGS[key]||[];
  const now=new Date();
  const today=dateKey();
  const todayShort=now.toLocaleDateString('en-PH',{month:'short',day:'numeric'});
  const curMonth=now.getMonth();
  const curYear=now.getFullYear();

  // Filter logs by period
  function logsForPer(){
    if(per==='Today') return logs.filter(l=>{
      if(l.dateKey)return l.dateKey===today;
      if(l.time)return l.time.startsWith(todayShort);
      return false;
    });
    if(per==='Monthly') return logs.filter(l=>{
      const d=l.dateKey?new Date(l.dateKey):null;
      return d&&d.getMonth()===curMonth&&d.getFullYear()===curYear;
    });
    if(per==='Custom'){
      const cd=customDate[key];
      if(!cd)return[];
      return logs.filter(l=>l.dateKey===cd);
    }
    // Yearly
    return logs.filter(l=>{
      const d=l.dateKey?new Date(l.dateKey):null;
      return d&&d.getFullYear()===curYear;
    });
  }

  // Filter expenses by period
  function expForPer(){
    if(per==='Today') return explogs.filter(e=>{
      if(e.dateKey)return e.dateKey===today;
      if(e.time)return e.time.startsWith(todayShort);
      return false;
    });
    if(per==='Monthly') return explogs.filter(e=>{
      const d=e.dateKey?new Date(e.dateKey):null;
      return d&&d.getMonth()===curMonth&&d.getFullYear()===curYear;
    });
    if(per==='Custom'){
      const cd=customDate[key];
      if(!cd)return[];
      return explogs.filter(e=>e.dateKey===cd);
    }
    return explogs.filter(e=>{
      const d=e.dateKey?new Date(e.dateKey):null;
      return d&&d.getFullYear()===curYear;
    });
  }

  const filteredLogs=logsForPer();
  const filteredExp=expForPer();

  // Revenue: for Today use todayRev (already tracked), for Monthly/Yearly sum from logs
  const rev=(per==='Today'&&!customDate[key])
    ?getRev(key)
    :filteredLogs.reduce((s,l)=>s+(l.total||0),0);
  const exp=filteredExp.reduce((s,e)=>s+e.amount,0);
  const net=rev-exp;
  const txnCount=filteredLogs.filter(l=>!(l.method==='Credit/Utang'&&(l.total||0)===0)).length;
  const avgSale=txnCount>0?rev/txnCount:0;

  // Top products
  const prodSales={};
  filteredLogs.forEach(l=>(l.items||[]).forEach(i=>{
    prodSales[i.name]=(prodSales[i.name]||0)+i.qty;
  }));
  const topProds=Object.entries(prodSales).sort((a,b)=>b[1]-a[1]).slice(0,5);

  // Payment breakdown
  const byMethod={Cash:0,GCash:0,Bank:0};
  filteredLogs.forEach(l=>{if(l.method&&l.method!=='Credit/Utang')byMethod[l.method]=(byMethod[l.method]||0)+(l.total||0);});

  // Credit/Utang total — sum unpaid credits recorded within the current period
  const allCredits=Object.values(BIZ_CREDITS[key]||{});
  const creditUtangTotal=allCredits.filter(c=>{
    if(!c.dateKey||c.status!=='unpaid')return false;
    if(per==='Today'){return c.dateKey===today;}
    const cd=new Date(c.dateKey);
    if(per==='Monthly'){return cd.getMonth()===now.getMonth()&&cd.getFullYear()===now.getFullYear();}
    if(per==='Yearly'){return cd.getFullYear()===curYear;}
    if(per==='Custom'&&customDate[key]){const cp=new Date(customDate[key]);return cd.toDateString()===cp.toDateString();}
    return false;
  }).reduce((s,c)=>s+(c.amount||0),0);

  const cdStr=customDate[key]?new Date(customDate[key]).toLocaleDateString('en-PH',{month:'long',day:'numeric',year:'numeric'}):'';
  const periodLabel=per==='Today'?`Today — ${todayShort}`:per==='Monthly'?`${now.toLocaleString('en-PH',{month:'long',year:'numeric'})}`:per==='Custom'?(cdStr||'Pick a date'):String(curYear);
  const reportTitle=per==='Today'?'📊 End of Day Report':per==='Monthly'?'📊 Monthly Report':per==='Custom'?`📊 Daily Report — ${cdStr||'Pick a date'}`:'📊 Yearly Report';
  const nowStr=now.toLocaleString('en-PH',{month:'short',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'});

  return`
    <div class="cb" style="margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
        <div style="font-size:13px;font-weight:800;color:var(--text-primary)">${reportTitle}</div>
        <select class="inp" style="width:auto;padding:4px 8px;font-size:12px;margin:0"
          onchange="if(this.value==='Custom'){repPer['${key}']='Custom';openReportCalendar('${key}');}else{repPer['${key}']=this.value;render();}">
          ${['Today','Monthly','Yearly','Custom'].map(x=>`<option${per===x?' selected':''}>${x}</option>`).join('')}
        </select>
      </div>
      <div style="font-size:11px;color:var(--text-tertiary)">${periodLabel} · Generated ${nowStr}</div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
      <div class="sc" style="cursor:pointer;user-select:none" onclick="var d=document.getElementById('rep-rev-drop-${key}');var a=document.getElementById('rep-rev-arr-${key}');if(d){d.style.display=d.style.display==='none'?'block':'none';a.textContent=d.style.display==='none'?'▸':'▾';}">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <div class="slb">Revenue</div>
            <div class="sv g">${p(rev)}</div>
          </div>
          <span id="rep-rev-arr-${key}" style="font-size:11px;color:var(--text-tertiary);margin-left:4px">${filteredLogs.length>0?'▸':''}</span>
        </div>
        <div id="rep-rev-drop-${key}" style="display:none;margin-top:8px;max-height:160px;overflow-y:auto;border-top:0.5px solid var(--border-secondary);padding-top:6px">
          ${filteredLogs.length===0?'<div style="font-size:11px;color:var(--text-tertiary)">No transactions</div>':filteredLogs.slice().reverse().map(l=>`<div style="padding:4px 0;border-bottom:0.5px solid var(--border-secondary);font-size:11px"><div style="display:flex;justify-content:space-between;font-weight:600"><span style="color:var(--text-primary);max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${(l.items||[]).map(i=>i.name).join(', ')||l.id}</span><span style="color:#22c55e;flex-shrink:0">${p(l.total)}</span></div><div style="color:var(--text-tertiary);font-size:10px;margin-top:1px">${l.method||''} · ${l.time||''}</div></div>`).join('')}
        </div>
      </div>
      <div class="sc" style="cursor:pointer;user-select:none" onclick="var d=document.getElementById('rep-exp-drop-${key}');var a=document.getElementById('rep-exp-arr-${key}');if(d){d.style.display=d.style.display==='none'?'block':'none';a.textContent=d.style.display==='none'?'▸':'▾';}">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <div class="slb">Expenses</div>
            <div class="sv r">${p(exp)}</div>
          </div>
          <span id="rep-exp-arr-${key}" style="font-size:11px;color:var(--text-tertiary);margin-left:4px">${filteredExp.length>0?'▸':''}</span>
        </div>
        <div id="rep-exp-drop-${key}" style="display:none;margin-top:8px;max-height:160px;overflow-y:auto;border-top:0.5px solid var(--border-secondary);padding-top:6px">
          ${filteredExp.length===0?'<div style="font-size:11px;color:var(--text-tertiary)">No expenses</div>':filteredExp.slice().reverse().map(e=>`<div style="padding:4px 0;border-bottom:0.5px solid var(--border-secondary);font-size:11px"><div style="display:flex;justify-content:space-between;font-weight:600"><span style="color:var(--text-primary);max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e.desc||''}</span><span style="color:#ef4444;flex-shrink:0">${p(e.amount)}</span></div><div style="color:var(--text-tertiary);font-size:10px;margin-top:1px">${e.cat||''} · ${e.time||''}</div></div>`).join('')}
        </div>
      </div>
      <div class="sc"><div class="slb">Net Profit</div><div class="sv ${net>=0?'g':'r'}">${p(net)}</div></div>
      <div class="sc"><div class="slb">Transactions</div><div class="sv b">${txnCount}</div></div>
      <div class="sc"><div class="slb">Avg Sale</div><div class="sv b">${p(avgSale)}</div></div>
      <div class="sc"><div class="slb">Margin</div><div class="sv ${net>=0?'g':'r'}">${rev>0?Math.round(net/rev*100):0}%</div></div>
      ${Object.entries(byMethod).map(([m,v])=>`<div class="sc"><div class="slb">${m}</div><div class="sv" style="color:var(--text-primary)">${p(v)}</div></div>`).join('')}
      <div class="sc"><div class="slb">Credit/Utang</div><div class="sv" style="color:var(--warning)">${p(creditUtangTotal)}</div></div>
    </div>
    ${(rev>0||exp>0)?`<div class="sl">📊 Revenue vs Expenses</div><div class="cb" style="margin-bottom:8px;padding:10px 12px">${buildRevExpChart(rev,exp)}</div>`:''}
    ${Object.values(byMethod).some(v=>v>0)?`<div class="sl">💳 Payment Breakdown</div><div class="cb" style="margin-bottom:8px;padding:10px 12px">${buildDonutChart(byMethod)}</div>`:''}
    ${topProds.length>0?`<div class="sl">🏆 Top Products</div><div class="cb" style="margin-bottom:8px;padding:10px 12px">${buildTopProdsChart(topProds)}</div>`:''}
    <div class="sl">📋 Transactions (${txnCount})</div>
    <div class="cb" style="max-height:220px;overflow-y:auto">
      ${txnCount===0?`<div class="le">No transactions for this period</div>`:filteredLogs.filter(l=>!(l.method==='Credit/Utang'&&(l.total||0)===0)).slice().reverse().map(l=>`<div class="li"><div class="lt"><span class="ln">${l.id}</span><span class="la">${p(l.total)}</span></div><div class="lm">${(l.items||[]).map(i=>i.name+'×'+i.qty).join(', ')} · ${l.method} · ${l.time}</div></div>`).join('')}
    </div>`;
}

// ── 📅 CUSTOM DATE CALENDAR ──────────────────────────────────────
function openReportCalendar(key){
  // Collect all days that have logs or expenses for this biz
  const allLogs=BIZ_LOGS[key]||[];
  const allExp=BIZ_EXPLOGS[key]||[];
  const daysWithData=new Set();
  allLogs.forEach(l=>{if(l.dateKey)daysWithData.add(l.dateKey);});
  allExp.forEach(e=>{if(e.dateKey)daysWithData.add(e.dateKey);});

  // Calendar state — start from current month
  let calYear=new Date().getFullYear();
  let calMonth=new Date().getMonth();

  function buildCal(){
    const monthNames=['January','February','March','April','May','June','July','August','September','October','November','December'];
    const firstDay=new Date(calYear,calMonth,1).getDay(); // 0=Sun
    const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
    const todayDk=dateKey();
    const selDk=customDate[key]||'';

    let dayGrid='';
    // Day headers
    ['Su','Mo','Tu','We','Th','Fr','Sa'].forEach(d=>{
      dayGrid+=`<div style="text-align:center;font-size:10px;font-weight:700;color:var(--text-tertiary);padding:4px 0">${d}</div>`;
    });
    // Empty cells before first day
    for(let i=0;i<firstDay;i++){
      dayGrid+=`<div></div>`;
    }
    // Day cells
    for(let d=1;d<=daysInMonth;d++){
      const dk=new Date(calYear,calMonth,d).toDateString();
      const hasData=daysWithData.has(dk);
      const isToday=dk===todayDk;
      const isSel=dk===selDk;
      const bg=isSel?'var(--accent)':isToday?'var(--accent-light)':'transparent';
      const color=isSel?'#fff':hasData?'var(--accent)':'var(--text-primary)';
      const fw=hasData||isToday||isSel?'700':'400';
      const dot=hasData&&!isSel?`<div style="width:4px;height:4px;border-radius:50%;background:var(--accent);margin:1px auto 0"></div>`:'';
      dayGrid+=`<div onclick="pickReportDate('${key}','${dk}')"
        style="text-align:center;padding:6px 2px;border-radius:6px;cursor:pointer;background:${bg};color:${color};font-weight:${fw};font-size:12px;line-height:1"
        onmouseover="if('${isSel}'!=='true')this.style.background='var(--bg-tertiary)'"
        onmouseout="if('${isSel}'!=='true')this.style.background='${bg}'">
        ${d}${dot}
      </div>`;
    }

    return`
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <button onclick="shiftCalMonth('${key}',-1)" style="background:none;border:none;cursor:pointer;font-size:18px;color:var(--text-primary);padding:4px 8px">‹</button>
        <span style="font-size:13px;font-weight:700;color:var(--text-primary)">${monthNames[calMonth]} ${calYear}</span>
        <button onclick="shiftCalMonth('${key}',1)" style="background:none;border:none;cursor:pointer;font-size:18px;color:var(--text-primary);padding:4px 8px">›</button>
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">
        ${dayGrid}
      </div>
      <div style="margin-top:10px;font-size:10px;color:var(--text-tertiary);text-align:center">● = days with data</div>`;
  }

  // Store month navigation on window so inline buttons can call it
  window._calState={key,get calYear(){return calYear;},get calMonth(){return calMonth;}};
  window.shiftCalMonth=function(k,dir){
    calMonth+=dir;
    if(calMonth>11){calMonth=0;calYear++;}
    if(calMonth<0){calMonth=11;calYear--;}
    const body=document.getElementById('_cal_body');
    if(body)body.innerHTML=buildCal();
  };
  window.pickReportDate=function(k,dk){
    customDate[k]=dk;
    repPer[k]='Custom';
    rmModal();
    render();
  };

  modal(`
    <div class="modal-t">📅 Pick a Date</div>
    <div id="_cal_body" style="min-width:260px">${buildCal()}</div>
    <button class="btn-c" style="width:100%;margin-top:10px" onclick="rmModal();if(!customDate['${key}']){repPer['${key}']='Today';}render()">Cancel</button>
  `);
}

// ── 🧾 RECEIPT ───────────────────────────────────────────────────
function buildReceiptContent(key){
  const logs=BIZ_LOGS[key]||[];
  if(logs.length===0)return`<div class="cb"><div class="le">No transactions yet — record a sale first</div></div>`;
  const last=logs[logs.length-1];
  const biz=getBizInfo(key);
  return`
    <div style="display:flex;gap:6px;margin-bottom:10px">
      <button class="btn-s" style="flex:1" onclick="loadReceiptInTab('${key}','last')">🧾 Last Transaction</button>
      <button class="btn-c" style="flex:1" onclick="showReceiptPicker('${key}')">📋 Pick Transaction</button>
    </div>
    <div id="receipt-preview-${key}">
      ${buildReceiptHtml(biz,last,key)}
    </div>`;
}

function buildReceiptHtml(biz,log,key){
  if(!log)return'<div class="cb"><div class="le">No transaction selected</div></div>';
  let _printed={};
  try{_printed=JSON.parse(localStorage.getItem('printedReceipts_'+key)||'{}')}catch(e){}
  const _savedName=(log&&_printed[String(log.id)])||'';
  const d=log.dateKey?new Date(log.dateKey):new Date();
  const dateStr=`${d.getMonth()+1}/${d.getDate()}/${d.getFullYear()}`;
  const items=log.items||[];
  // Build table rows — empty filler rows to give the table some height (min 8 rows total)
  const minRows=Math.max(8,items.length+3);
  let rows='';
  for(let i=0;i<minRows;i++){
    const it=items[i];
    if(it){
      const unit=(it.unit||'').replace(/^per\s+/i,'').trim()||'item';
      const amount=it.price*it.qty;
      rows+=`<tr>
        <td>${unit}</td>
        <td>${it.qty}</td>
        <td class="articles" style="text-align:left">${(it.name||'').toUpperCase()}</td>
        <td>${it.price%1===0?it.price:it.price.toFixed(2)}</td>
        <td>${amount%1===0?amount:amount.toFixed(2)}</td>
      </tr>`;
    } else if(i===minRows-1){
      // Last row: TOTAL
      rows+=`<tr>
        <td colspan="3" style="border:none"></td>
        <td style="font-weight:700;text-align:right;border-left:1px solid #333">TOTAL</td>
        <td style="font-weight:700">₱${log.total%1===0?log.total:log.total.toFixed(2)}</td>
      </tr>`;
    } else {
      rows+=`<tr><td>&nbsp;</td><td></td><td></td><td></td><td></td></tr>`;
    }
  }
  const uid=`receipt-soldto-${key||'x'}`;
  return`
    <div id="print-receipt-area" data-logid="${log.id||''}" data-key="${key||''}" style="background:#fff;color:#000;font-family:Arial,sans-serif;padding:16px;border:0.5px solid var(--border-secondary);border-radius:var(--radius)">
      <div style="text-align:center;font-weight:800;font-size:16px;letter-spacing:.04em;margin-bottom:2px;text-transform:uppercase">${(BIZ_CUSTOM_INFO[key]&&BIZ_CUSTOM_INFO[key].name)||biz?.name||'BUSINESS NAME'}</div>
      ${(BIZ_CUSTOM_INFO[key]&&BIZ_CUSTOM_INFO[key].tagline)?`<div style="text-align:center;font-size:11px;color:#555;margin-bottom:4px">${BIZ_CUSTOM_INFO[key].tagline}</div>`:''}
      ${(BIZ_CUSTOM_INFO[key]&&BIZ_CUSTOM_INFO[key].address)?`<div style="text-align:center;font-size:11px;color:#555;margin-bottom:4px">${BIZ_CUSTOM_INFO[key].address}</div>`:''}
      ${(BIZ_CUSTOM_INFO[key]&&BIZ_CUSTOM_INFO[key].contact)?`<div style="text-align:center;font-size:11px;color:#555;margin-bottom:10px">${BIZ_CUSTOM_INFO[key].contact}</div>`:'<div style="margin-bottom:10px"></div>'}
      <div style="display:flex;justify-content:flex-end;margin-bottom:8px;font-size:13px">

  // Use transaction date, not today

<style>

  if(logId){

    try{printed=JSON.parse(localStorage.getItem('printedReceipts_'+aKey)||'{}')}catch(e){}
    printed[String(logId)]=soldToName;

function loadReceiptInTab(key,mode){

function doPrintAll(key){
  const logs=BIZ_LOGS[key]||[];
  if(logs.length===0){toast('No transactions to print','err');return;}
  let printed={};
  try{printed=JSON.parse(localStorage.getItem('printedReceipts_'+key)||'{}')}catch(e){}

  function buildReceiptBox(l){
    const soldTo=printed[String(l.id)]!==undefined?printed[String(l.id)]:'';
    const d=l.dateKey?new Date(l.dateKey):new Date();
    const dateStr=`${d.getMonth()+1}/${d.getDate()}/${d.getFullYear()}`;
    const items=l.items||[];
    const minRows=Math.max(6,items.length+2);
    let rows='';
    for(let i=0;i<minRows;i++){
      const it=items[i];
      if(it){
        const unit=(it.unit||'').replace(/^per\s+/i,'').trim()||'item';
        const amt=it.price*it.qty;
        rows+=`<tr><td>${unit}</td><td>${it.qty}</td><td style="text-align:left">${(it.name||'').toUpperCase()}</td><td>${it.price%1===0?it.price:it.price.toFixed(2)}</td><td>${amt%1===0?amt:amt.toFixed(2)}</td></tr>`;
      } else if(i===minRows-1){
        const tot=l.total||0;
        rows+=`<tr><td colspan="3" style="border:none"></td><td style="font-weight:700;text-align:right;border-left:1px solid #333">TOTAL</td><td style="font-weight:700">\u20b1${tot%1===0?tot:tot.toFixed(2)}</td></tr>`;
      } else {
        rows+=`<tr><td>&nbsp;</td><td></td><td></td><td></td><td></td></tr>`;
      }
    }
    const disc=l.discount&&l.discount.amt>0?`<div style="text-align:right;font-size:7px;color:#c00">Disc: -\u20b1${(l.discount.amt||0).toFixed(2)}</div>`:'';
    return`<div class="receipt-box">
      <div class="rbiz">${(BIZ_CUSTOM_INFO[key]&&BIZ_CUSTOM_INFO[key].name)||getBizInfo(key)?.name||'BUSINESS NAME'}</div>
      <div class="rdate">Date <span class="rval">${dateStr}</span></div>
      <div class="rsold">SOLD TO <span class="rval">${soldTo}</span></div>
      <table><thead><tr><th>UNIT</th><th>QTY</th><th>ARTICLES</th><th>PRICE</th><th>AMT</th></tr></thead><tbody>${rows}</tbody></table>
      ${disc}
      <div class="rpay">${l.method==='Credit Payment'&&l.isPartial?'Partial Credit Payment':l.method||'Cash'}</div>
      <div class="rsig">SIGNATURE <span class="rval2"></span></div>
    </div>`;
  }

  const printableLogs=logs.filter(l=>!(l.method==='Credit/Utang'&&(l.total||0)===0));
  if(printableLogs.length===0){toast('No paid transactions to print','err');return;}
  const boxesHtml=printableLogs.map(l=>buildReceiptBox(l)).join('');
  const d=new Date();
  const dateStr=`${d.getMonth()+1}/${d.getDate()}/${d.getFullYear()}`;

  const html=`<!DOCTYPE html><html><head><meta charset="utf-8"><title>All Receipts ${dateStr}</title>
<style>

.rdate{display:flex;justify-content:flex-end;margin-bottom:3px;font-size:7px}
.rsold{margin-bottom:4px;font-size:7px}
.rval{border-bottom:0.5px solid #333;display:inline-block;min-width:60px;padding:0 2px}
.rval2{border-bottom:0.5px solid #333;display:inline-block;min-width:80px}

th{font-weight:700;background:#f0f0f0;font-size:6.5px}

}
</style></head>
<body>
<div class="grid">${boxesHtml}</div>
<script>window.onload=function(){window.print();}<\/script>
</body></html>`;

  const w=window.open('about:blank','_blank');
  if(!w){toast('Pop-up blocked — allow pop-ups for this site','err');return;}
  w.document.open();
  w.document.write(html);

// ── 💳 CREDITS / UTANG TRACKER ──────────────────────────────────
function buildCreditsContent(key){
  if(!BIZ_CREDITS[key])BIZ_CREDITS[key]=[];
  const credits=BIZ_CREDITS[key];
  const unpaid=credits.filter(c=>c.status==='unpaid');
  const paid=credits.filter(c=>c.status==='paid');
  const totalOwed=unpaid.reduce((s,c)=>s+(c.amount-(c.amountPaid||0)),0);

  // Group unpaid by name, sort each group newest first, sort groups by most recent entry
  const groupMap={};
  unpaid.slice().sort((a,b)=>b.id-a.id).forEach(c=>{
    const n=c.name.toLowerCase();
    if(!groupMap[n])groupMap[n]={name:c.name,entries:[],totalRemaining:0};
    groupMap[n].entries.push(c);
    groupMap[n].totalRemaining+=(c.amount-(c.amountPaid||0));
  });
  // Sort groups by the most recent entry id (newest group first)
  const groups=Object.values(groupMap).sort((a,b)=>b.entries[0].id-a.entries[0].id);

  function renderUnpaidGroups(filteredGroups){
    if(filteredGroups.length===0)return'<div style="text-align:center;color:var(--text-tertiary);font-size:12px;padding:18px">No results found</div>';
    return filteredGroups.map(g=>`
      <div style="border-bottom:2px solid var(--border-secondary);padding:10px 12px 4px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <span style="font-size:13px;font-weight:800;color:var(--text-primary)">👤 ${g.name}</span>
          <span style="font-size:12px;font-weight:700;color:var(--danger)">Total: ${p(g.totalRemaining)}</span>
        </div>
        ${g.entries.map(c=>{
          const remaining=c.amount-(c.amountPaid||0);
          const hasPart=(c.amountPaid||0)>0;
          return`<div style="background:var(--bg-secondary);border-radius:8px;padding:8px 10px;margin-bottom:8px">
            ${hasPart?`<div class="lm" style="color:var(--warning)">Partially paid: ${p(c.amountPaid||0)} · Remaining: ${p(remaining)}</div>`:''}
            <div style="display:flex;justify-content:space-between;align-items:center">
              <div class="lm" style="color:var(--text-tertiary)">${c.note||''} · ${c.time}</div>
              <span style="font-size:12px;font-weight:700;color:var(--danger)">${p(remaining)}</span>
            </div>
            ${c.items?`<div class="lm" style="font-size:10px;color:var(--text-tertiary);margin-top:2px">${c.items.map(i=>`${i.qty}× ${i.name} @ ${p(i.price)}`).join(' · ')}</div>`:''}
            <div style="margin-top:7px;display:flex;gap:6px">
              <button onclick="openPartialPay('${key}','${c.id}')"
                style="flex:1;padding:6px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit">
                💰 Pay in Partial
              </button>
              <button onclick="markCreditPaid('${key}','${c.id}')"
                style="flex:1;padding:6px;background:var(--success);color:#fff;border:none;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit">
                ✓ Paid in Full
              </button>
              <button onclick="removeCredit('${key}','${c.id}')"
                style="padding:6px 10px;background:none;border:0.5px solid var(--danger);color:var(--danger);border-radius:6px;font-size:11px;cursor:pointer;font-family:inherit">✕</button>
            </div>
          </div>`;
        }).join('')}
      </div>`).join('');
  }

  return`
    <div class="sr2" style="margin-bottom:8px">
      <div class="sc"><div class="slb">Total Owed</div><div class="sv r" style="color:var(--danger)">${p(totalOwed)}</div></div>
      <div class="sc"><div class="slb">Unpaid</div><div class="sv r">${unpaid.length}</div></div>
    </div>
    ${unpaid.length>0?`
    <div class="sl">Unpaid (${unpaid.length})</div>
    <input class="inp" id="credit-search-${key}" placeholder="🔍 Search creditor name..." oninput="filterCredits('${key}')"
      style="margin-bottom:8px;font-size:13px" autocomplete="off">
    <div id="credit-list-${key}" class="cb" style="padding:0;overflow:hidden;max-height:420px;overflow-y:auto;margin-bottom:8px;scrollbar-width:thin;scrollbar-color:var(--accent) transparent">
      ${renderUnpaidGroups(groups)}
    </div>`:'<div class="cb" style="text-align:center;color:var(--text-tertiary);font-size:12px;padding:18px">No unpaid credits 🎉</div>'}
    ${paid.length>0?`
    <div class="sl" style="cursor:pointer;user-select:none" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">
      Paid History (${paid.length}) ▾
    </div>
    <div style="display:none">
      <div class="cb" style="padding:0;overflow:hidden">
        ${paid.slice().reverse().map(c=>`<div class="li" style="border-bottom:0.5px solid var(--border-secondary)">
          <div class="lt">
            <span class="ln" style="color:var(--text-secondary)">👤 ${c.name}</span>
            <span class="la" style="color:var(--success);font-weight:700">${p(c.amount)}</span>
          </div>
          <div class="lm">${c.note||''} · Paid ${c.paidTime||c.time}</div>
          ${c.items?`<div class="lm" style="font-size:10px;color:var(--text-tertiary)">${c.items.map(i=>`${i.qty}× ${i.name}`).join(' · ')}</div>`:''}
        </div>`).join('')}
      </div>
    </div>`:''}`;
}

function filterCredits(key){
  const q=(document.getElementById('credit-search-'+key)?.value||'').toLowerCase().trim();
  // Save so it can be restored after render
  if(!window._creditSearchVal)window._creditSearchVal={};
  window._creditSearchVal[key]=q;
  const unpaid=(BIZ_CREDITS[key]||[]).filter(c=>c.status==='unpaid');
  // Rebuild groups
  const groupMap={};
  unpaid.slice().sort((a,b)=>b.id-a.id).forEach(c=>{
    const n=c.name.toLowerCase();
    if(!groupMap[n])groupMap[n]={name:c.name,entries:[],totalRemaining:0};
    groupMap[n].entries.push(c);
    groupMap[n].totalRemaining+=(c.amount-(c.amountPaid||0));
  });

function doPartialPay(key,id){
  const c=(BIZ_CREDITS[key]||[]).find(x=>x.id==id);
  if(!c)return;
  const amt=parseFloat(document.getElementById('pay-amt-modal')?.value)||0;
  if(amt<=0){toast('Enter a valid amount','err');return;}
  const remaining=c.amount-(c.amountPaid||0);
  const actual=Math.min(amt,remaining);
  c.amountPaid=(c.amountPaid||0)+actual;
  // Add to revenue at payment time
  todayRev[key]=(todayRev[key]||0)+actual;
  if(!BIZ_LOGS[key])BIZ_LOGS[key]=[];
  const _plog1={id:txn(),items:c.items||[{name:`Credit payment — ${c.name}`,qty:1,price:actual}],total:actual,rawTotal:actual,discount:null,method:'Credit Payment',isPartial:(c.amountPaid<c.amount),time:ts(),dateKey:dateKey()};
  BIZ_LOGS[key].push(_plog1);
  try{const _pr1=JSON.parse(localStorage.getItem('printedReceipts_'+key)||'{}');_pr1[String(_plog1.id)]=c.name;localStorage.setItem('printedReceipts_'+key,JSON.stringify(_pr1));}catch(e){}
  if(c.amountPaid>=c.amount){
    c.status='paid';
    c.paidTime=ts();
    rmModal();
    saveData();
    render();
    restoreCreditSearch(key);
    setTimeout(()=>toast(`${c.name} fully paid — ${p(actual)} added to revenue ✓`),50);
  } else {
    rmModal();
    saveData();
    render();
    restoreCreditSearch(key);
    setTimeout(()=>toast(`${p(actual)} recorded · ${c.name} still owes ${p(c.amount-c.amountPaid)} ✓`),50);
  }
}

function markCreditPaid(key,id){
  const c=(BIZ_CREDITS[key]||[]).find(x=>x.id==id);

function doRemoveCredit(key,id){
  const c=(BIZ_CREDITS[key]||[]).find(x=>x.id==id);
  if(!c){rmModal();return;}
  // Return stock for each item in the credit
  if(c.items&&c.items.length&&BIZ_STOCKS[key]){
    const prods=BIZ_PRODUCTS[key]||[];
    c.items.forEach(cartItem=>{
      const isVariantLine=String(cartItem.id).includes('__v');
      if(isVariantLine){
        // Return variant recipe stock
        const prod=prods.find(x=>String(x.id)===String(cartItem.prodId));
        const variant=prod?.variants?.find(v=>v.id===cartItem.variantId);
        if(variant&&variant.recipe&&variant.recipe.length>0){
          variant.recipe.forEach(ing=>{
            const allBatches=(BIZ_STOCKS[key]||[]).filter(s=>s.id===ing.stockId||s.name.toLowerCase()===(ing.stockName||'').toLowerCase());
            if(!allBatches.length)return;
            const refBatch=allBatches.find(b=>b.specAmt>0&&b.specBaseUnit)||allBatches[0];
            const useUnit=(ing.useUnit||'').toLowerCase();
            const specBaseUnit=(refBatch.specBaseUnit||'').toLowerCase();
            const specAmt=refBatch.specAmt||0;
            const returnBase=specAmt>0&&specBaseUnit&&useUnit===specBaseUnit
              ?(ing.qty*cartItem.qty)
              :specAmt>0?(ing.qty*cartItem.qty)*specAmt
              :(ing.qty*cartItem.qty);
            returnStockFIFO(key,allBatches[0].name,returnBase);
          });
        }
        return;
      }
      const prod=prods.find(x=>x.id===cartItem.id);
      const hasRecipe=prod&&prod.recipe&&prod.recipe.length>0;
      if(hasRecipe){
        // Return ingredients consumed by recipe
        const batchYield=prod.batchYield||1;
        prod.recipe.forEach(ing=>{
          const allBatches=(BIZ_STOCKS[key]||[]).filter(s=>s.id===ing.stockId||s.name.toLowerCase()===(ing.stockName||'').toLowerCase());
          if(!allBatches.length)return;
          const refBatch=allBatches.find(b=>b.specAmt>0&&b.specBaseUnit)||allBatches[0];
          const useUnit=(ing.useUnit||'').toLowerCase();
          const specBaseUnit=(refBatch.specBaseUnit||'').toLowerCase();
          const specAmt=refBatch.specAmt||0;
          const returnBase=specAmt>0&&specBaseUnit&&useUnit===specBaseUnit
            ?(ing.qty*cartItem.qty/batchYield)
            :specAmt>0?(ing.qty*cartItem.qty/batchYield)*specAmt
            :(ing.qty*cartItem.qty/batchYield);
          returnStockFIFO(key,allBatches[0].name,returnBase);
        });
      } else {
        // Return direct stock
        const smry=getStockSummary(key,cartItem.name);
        if(smry){
          const sellUnit=(cartItem.unit||'').replace(/^per\s+/i,'').trim().toLowerCase();
          const specBaseUnit=(smry.specBaseUnit||'').toLowerCase();
          const specAmt=smry.specAmt||0;
          const returnBase=specAmt>0&&specBaseUnit&&sellUnit===specBaseUnit
            ?cartItem.qty
            :specAmt>0?cartItem.qty*specAmt
            :cartItem.qty;
          returnStockFIFO(key,cartItem.name,returnBase);
        }
      }
    });
  }
  BIZ_CREDITS[key]=BIZ_CREDITS[key].filter(x=>x.id!=id);
  rmModal();
  saveData();
  render();
  restoreCreditSearch(key);
  setTimeout(()=>toast(`Credit cancelled — stock returned ✓`),50);
}

async function doChangePassword(){
  const cur=document.getElementById('cp-current')?.value||'';
  const np=document.getElementById('cp-new')?.value||'';
  const cp=document.getElementById('cp-confirm')?.value||'';
  if(!cur){toast('Enter your current password','err');return;}
  if(!np){toast('Enter a new password','err');return;}
  if(np.length<6){toast('Password must be at least 6 characters','err');return;}
  if(np!==cp){toast('New passwords do not match','err');return;}
  if(np===cur){toast('New password must be different from current','err');return;}
  // Re-authenticate with current password first
  const email=currentUser?.email||'';
  const {error:signInErr}=await supa.auth.signInWithPassword({email,password:cur});
  if(signInErr){toast('Current password is incorrect','err');return;}
  // Now update to new password
  const {error}=await supa.auth.updateUser({password:np});
  if(error){toast('Error: '+error.message,'err');return;}
  rmModal();
  toast('Password updated successfully ✓');
}

// Reserve (direction=+1) or release (direction=-1) ingredient stock for one unit of a recipe product
function reserveIngredients(key,prod,direction){
  if(!prod)return;
  if(!stockReservations[key])stockReservations[key]={};
  const stk=BIZ_STOCKS[key]||[];
  const recipe=prod.recipe||[];
  if(recipe.length===0)return; // direct stock products use inCartQty for display — no reservation needed
  const batchYield=prod.batchYield||1;
  recipe.forEach(ing=>{
    const allBatches=stk.filter(s=>s.id===ing.stockId||s.name.toLowerCase()===(ing.stockName||'').toLowerCase());
    if(!allBatches.length)return;
    const refBatch=allBatches.find(b=>b.specAmt>0&&b.specBaseUnit)||allBatches[0];
    const useUnit=(ing.useUnit||'').toLowerCase();
    const specBaseUnit=(refBatch.specBaseUnit||'').toLowerCase();
    const specAmt=refBatch.specAmt||0;
    const perUnit=specAmt>0&&specBaseUnit&&useUnit===specBaseUnit
      ?(ing.qty/batchYield)
      :specAmt>0?(ing.qty/batchYield)*specAmt
      :(ing.qty/batchYield);
    const name=allBatches[0].name;
    stockReservations[key][name]=(stockReservations[key][name]||0)+direction*perUnit;
    if(stockReservations[key][name]<0)stockReservations[key][name]=0;
  });
}

// Tracks the last variant picked per product per biz — so tapping card increments it directly
const lastPickedVariant={};

function addToCart(key,id){
  initBizData(key);
  if(!cart[key])cart[key]={};
  const prods=BIZ_PRODUCTS[key]||[];
  const s=prods.find(x=>x.id===id);
  if(!s)return;
  if(s.variants&&s.variants.filter(v=>v.name).length>0){
    const activeVariants=s.variants.filter(v=>v.name);
    // Single entry — behaves like direct add, no picker popup
    if(activeVariants.length===1){
      const v=activeVariants[0];
      const cartKey=id+'__v'+v.id;
      if(!cart[key][cartKey]){
        const price=parseFloat(v.priceAdj)||s.price||0;
        cart[key][cartKey]={id:cartKey,prodId:id,variantId:v.id,variantName:v.name,name:s.name,price,qty:1,recipe:v.recipe||[],singleVariant:true};
        reserveVariantByRecipe(key,v,1,1);
      } else {
        cart[key][cartKey].qty++;
        reserveVariantByRecipe(key,v,1,1);
      }
      lastPickedVariant[key+'_'+id]=cartKey;
      patchCart(key);return;
    }
    const existingLines=Object.keys(cart[key]).filter(k=>k.startsWith(id+'__v'));
    // Check if last picked variant is still in cart
    const lastKey=lastPickedVariant[key+'_'+id];
    const lastInCart=lastKey&&cart[key][lastKey];
    if(lastInCart){
      const variantId=lastKey.split('__v')[1];
      const variant=s.variants.find(v=>v.id===variantId);
      // Check if this variant still has stock before incrementing
      const recipe=variant?.recipe||[];
      let variantOut=false;
      if(recipe.length>0){
        const stk=BIZ_STOCKS[key]||[];
        variantOut=recipe.some(r=>{
          if(!r.stockId)return false;
          const stockItem=stk.find(st=>String(st.id)===String(r.stockId));
          if(!stockItem)return true;
          const smry=getStockSummary(key,stockItem.name);
          return (smry?.totalBase||0)<(r.qty||1);
        });
      }
      if(variantOut){
        // Variant is out — notify and open sheet to pick another
        toast(`${variant?.name||'This variant'} is out of stock — pick another`,'err');
        showVariantSheet(key,id,null);
        return;
      }
      // Stock available — increment directly
      cart[key][lastKey].qty++;
      reserveVariantByRecipe(key,variant,+1,1);
      if(screen===key&&(bizSubTab[key]||'sell')==='sell'){patchCart(key);}else{render();}
      return;
    }
    if(existingLines.length===1){
      // Only one variant in cart and no last pick tracked — check stock then increment
      const cartKey=existingLines[0];
      const variantId=cartKey.split('__v')[1];
      const variant=s.variants.find(v=>v.id===variantId);
      const recipe=variant?.recipe||[];
      let variantOut=false;
      if(recipe.length>0){
        const stk=BIZ_STOCKS[key]||[];
        variantOut=recipe.some(r=>{
          if(!r.stockId)return false;
          const stockItem=stk.find(st=>String(st.id)===String(r.stockId));
          if(!stockItem)return true;
          const smry=getStockSummary(key,stockItem.name);
          return (smry?.totalBase||0)<(r.qty||1);
        });
      }
      if(variantOut){
        toast(`${variant?.name||'This variant'} is out of stock — pick another`,'err');
        showVariantSheet(key,id,null);
        return;
      }
      cart[key][cartKey].qty++;
      reserveVariantByRecipe(key,variant,+1,1);
      lastPickedVariant[key+'_'+id]=cartKey;
      if(screen===key&&(bizSubTab[key]||'sell')==='sell'){patchCart(key);}else{render();}
      return;
    }
    // No variant in cart yet — show sheet
    showVariantSheet(key,id,null);
    return;
  }
  if(!cart[key][id])cart[key][id]={...s,qty:0};
  cart[key][id].qty++;
  reserveIngredients(key,s,+1);
  if(screen===key&&(bizSubTab[key]||'sell')==='sell'){patchCart(key);}else{render();}
}

// NAME-based reservation helper — matches getStockSummary which reads by name
function reserveVariantByRecipe(key,variant,direction,amount){
  if(!variant)return;
  if(!stockReservations[key])stockReservations[key]={};
  const stk=BIZ_STOCKS[key]||[];
  const recipe=variant.recipe||[];
  if(recipe.length>0){
    recipe.forEach(r=>{
      const item=stk.find(s=>String(s.id)===String(r.stockId));
      if(!item)return;
      const specAmt=item.specAmt||0;
      const useUnit=(r.useUnit||'').toLowerCase();
      const specBaseUnit=(item.specBaseUnit||'').toLowerCase();
      const perUnit=specAmt>0&&specBaseUnit&&useUnit===specBaseUnit?(r.qty||1):specAmt>0?(r.qty||1)*specAmt:(r.qty||1);
      stockReservations[key][item.name]=(stockReservations[key][item.name]||0)+direction*perUnit*amount;
      if(stockReservations[key][item.name]<0)stockReservations[key][item.name]=0;
    });
  } else if(variant.stockId){
    const item=stk.find(s=>String(s.id)===String(variant.stockId));
    if(item){
      stockReservations[key][item.name]=Math.max(0,(stockReservations[key][item.name]||0)+direction*amount);
    }
  }
}

function adjQty(key,id,d){
  if(!cart[key]||!cart[key][id])return;
  const prods=BIZ_PRODUCTS[key]||[];
  const isVariant=String(id).includes('__v');
  const oldQty=cart[key][id].qty;
  const stk=BIZ_STOCKS[key]||[];

  // ── Stock cap when pressing + ────────────────────────────────
  if(d>0){
    if(isVariant){
      const variantId=cart[key][id]?.variantId;
      const prodId=cart[key][id]?.prodId;
      const prod=prods.find(x=>String(x.id)===String(prodId));
      const variant=prod?.variants?.find(v=>v.id===variantId);
      const recipe=variant?.recipe||[];
      if(recipe.length>0){
        const isOut=recipe.some(r=>{
          const item=stk.find(s=>String(s.id)===String(r.stockId));
          if(!item)return true;
          const smry=getStockSummary(key,item.name);
          return (smry?.totalBase||0)<(r.qty||1);
        });
        if(isOut){
          toast(`${variant?.name||'Variant'} is out of stock`,'err');
          return;
        }
      }
    } else {
      const s=prods.find(x=>String(x.id)===String(id));
      if(s){
        const recipe=s.recipe||[];
        if(recipe.length>0){
          // Recipe product — check if any ingredient is depleted
          const isBlocked=recipe.some(r=>{
            const item=stk.find(st=>String(st.id)===String(r.stockId)||st.name.toLowerCase()===(r.stockName||'').toLowerCase());
            if(!item)return true;
            const smry=getStockSummary(key,item.name);
            return (smry?.totalBase||0)<(r.qty||1);
          });
          if(isBlocked){
            toast('Not enough ingredients in stock','err');
            return;
          }
        } else {
          // Direct stock product — check by name, convert to sell units
          const smry=getStockSummary(key,s.name);
          if(smry){
            const totalBase=(smry._totalBase||smry.totalBase||0);
            const sellUnit=(s.unit||'').replace(/^per\s+/i,'').trim().toLowerCase();
            const specBaseUnit=(smry.specBaseUnit||'').toLowerCase();
            const specAmt=smry.specAmt||0;
            const maxInSellUnits=(specAmt>0&&specBaseUnit&&sellUnit!==specBaseUnit)
              ?Math.floor(totalBase/specAmt)
              :Math.floor(totalBase);
            if(maxInSellUnits<=oldQty){
              toast(`${s.name} is out of stock`,'err');
              return;
            }
          }
        }
      }
    }
  }
  // ────────────────────────────────────────────────────────────

  cart[key][id].qty+=d;
  if(isVariant){
    const variantId=cart[key][id]?.variantId;
    const prodId=cart[key][id]?.prodId;
    const prod=prods.find(x=>String(x.id)===String(prodId));
    const variant=prod?.variants?.find(v=>v.id===variantId);
    if(cart[key][id].qty<=0){
      reserveVariantByRecipe(key,variant,-1,oldQty);
      delete cart[key][id];
    } else {
      reserveVariantByRecipe(key,variant,d>0?1:-1,1);
    }
  } else {
    const s=prods.find(x=>String(x.id)===String(id));
    if(cart[key][id]&&cart[key][id].qty<=0){
      if(s)reserveIngredients(key,s,-oldQty);
      delete cart[key][id];
    } else {
      if(s)reserveIngredients(key,s,d);
    }
  }
  if(screen===key&&(bizSubTab[key]||'sell')==='sell'){patchCart(key);}else{render();}
}
function setQtyCart(key,id,v){
  let q=parseInt(v)||0;
  if(!cart[key])cart[key]={};
  const prods=BIZ_PRODUCTS[key]||[];
  const isVariant=String(id).includes('__v');
  const oldQty=cart[key][id]?.qty||0;

  // ── Max stock cap ────────────────────────────────────────────
  if(q>0){
    const stk=BIZ_STOCKS[key]||[];
    if(isVariant){
      const variantId=cart[key][id]?.variantId;
      const prodId=cart[key][id]?.prodId;
      const prod=prods.find(x=>String(x.id)===String(prodId));
      const variant=prod?.variants?.find(vt=>vt.id===variantId);
      const recipe=variant?.recipe||[];
      if(recipe.length>0){
        let maxCanAdd=Infinity;
        recipe.forEach(r=>{
          const item=stk.find(s=>String(s.id)===String(r.stockId));
          if(!item)return;
          const smry=getStockSummary(key,item.name);
          const totalAvail=(smry?.totalBase||0)+(oldQty*(r.qty||1)); // add back current reservation
          const canMake=r.qty>0?Math.floor(totalAvail/(r.qty||1)):totalAvail;
          if(canMake<maxCanAdd)maxCanAdd=canMake;
        });
        if(maxCanAdd!==Infinity&&q>maxCanAdd){
          toast(`Only ${maxCanAdd} available for this variant`,'err');
          q=maxCanAdd;
        }
      }
    } else {
      const s=prods.find(x=>String(x.id)===String(id));
      if(s){
        const smry=getStockSummary(key,s.name);
        if(smry){
          // Convert totalBase back to sell units for accurate cap
          const totalBase=(smry._totalBase||smry.totalBase||0);
          const sellUnit=(s.unit||'').replace(/^per\s+/i,'').trim().toLowerCase();
          const specBaseUnit=(smry.specBaseUnit||'').toLowerCase();
          const specAmt=smry.specAmt||0;
          // If selling in base unit (e.g. sheet), cap = totalBase - oldQty
          // If selling in spec unit (e.g. bottle, ream), cap = floor(totalBase/specAmt) - oldQty
          const maxInSellUnits=(specAmt>0&&specBaseUnit&&sellUnit!==specBaseUnit)
            ?Math.floor(totalBase/specAmt)
            :Math.floor(totalBase);
          const maxAllowed=Math.max(0,maxInSellUnits-oldQty);
          if(q>maxAllowed){
            toast(`Only ${maxAllowed} in stock`,'err');
            q=maxAllowed;
          }
        }
      }
    }
  }
  // ────────────────────────────────────────────────────────────

  const diff=q-oldQty;
  if(q<=0){
    if(isVariant){
      const variantId=cart[key][id]?.variantId;
      const prodId=cart[key][id]?.prodId;
      const prod=prods.find(x=>String(x.id)===String(prodId));
      const variant=prod?.variants?.find(vt=>vt.id===variantId);
      reserveVariantByRecipe(key,variant,-1,oldQty);
    } else {
      const s=prods.find(x=>String(x.id)===String(id));
      if(s&&oldQty>0)reserveIngredients(key,s,-oldQty);
    }
    delete cart[key][id];
  } else {
    if(!cart[key][id]){
      const lookupId=isVariant?id.split('__v')[0]:id;
      const s=prods.find(x=>x.id==lookupId);
      if(s)cart[key][id]={...s,qty:0};
    }
    if(cart[key][id]){
      cart[key][id].qty=q;
      if(diff!==0){
        if(isVariant){
          const variantId=cart[key][id]?.variantId;
          const prodId=cart[key][id]?.prodId;

          const s=prods.find(x=>String(x.id)===String(id));
          if(s)reserveIngredients(key,s,diff);

      }
    }

// dim: weight | volume | count
// toBase: conversion factor to base unit (g for weight, ml for volume, null=no standard)
const UNITS={
  // Weight — base: gram
  g:     {label:'grams (g)',       dim:'weight', toBase:1},
  kg:    {label:'kilograms (kg)',  dim:'weight', toBase:1000},
  mg:    {label:'milligrams (mg)', dim:'weight', toBase:0.001},
  oz:    {label:'ounces (oz)',     dim:'weight', toBase:28.3495},
  lb:    {label:'pounds (lb)',     dim:'weight', toBase:453.592},
  // Volume — base: ml
  ml:    {label:'milliliters (ml)',dim:'volume', toBase:1},
  L:     {label:'liters (L)',      dim:'volume', toBase:1000},
  tsp:   {label:'teaspoon (tsp)', dim:'volume', toBase:4.929},
  tbsp:  {label:'tablespoon (tbsp)',dim:'volume',toBase:14.787},
  cup:   {label:'cup',             dim:'volume', toBase:236.588},
  // Count — base: piece
  pc:    {label:'piece (pc)',      dim:'count',  toBase:1},
  sheet: {label:'sheet',           dim:'count',  toBase:1},
  unit:  {label:'unit',            dim:'count',  toBase:1},
  dozen: {label:'dozen',           dim:'count',  toBase:12},
  // Container/Pack — variable contents, user specifies
  ream:  {label:'ream',            dim:'pack',   toBase:null},
  box:   {label:'box',             dim:'pack',   toBase:null},
  pack:  {label:'pack',            dim:'pack',   toBase:null},
  bottle:{label:'bottle',          dim:'pack',   toBase:null},
  sack:  {label:'sack',            dim:'pack',   toBase:null},
  sachet:{label:'sachet',          dim:'pack',   toBase:null},
  bundle:{label:'bundle',          dim:'pack',   toBase:null},
  can:   {label:'can',             dim:'pack',   toBase:null},
  tray:  {label:'tray',            dim:'pack',   toBase:null},
  gallon:{label:'gallon',          dim:'pack',   toBase:null},
};
const UNIT_KEYS=Object.keys(UNITS);
// All possible base units user can specify inside a pack
const BASE_UNIT_OPTS=[
  {k:'pc',   l:'pieces'},
  {k:'sheet',l:'sheets'},
  {k:'g',    l:'grams (g)'},
  {k:'kg',   l:'kilograms (kg)'},
  {k:'mg',   l:'milligrams (mg)'},
  {k:'ml',   l:'milliliters (ml)'},
  {k:'L',    l:'liters (L)'},
  {k:'tsp',  l:'teaspoon (tsp)'},
  {k:'tbsp', l:'tablespoon (tbsp)'},
  {k:'cup',  l:'cup'},
  {k:'unit', l:'units'},
];

// Convert between measurable units (weight or volume only)
function convertUnit(qty,fromUnit,toUnit){
  const from=UNITS[fromUnit],to=UNITS[toUnit];
  if(!from||!to||from.dim!==to.dim)return null;
  if(from.dim==='pack'||from.dim==='count')return null;
  if(fromUnit===toUnit)return qty;
  return qty*(from.toBase||1)/(to.toBase||1);
}

// Get all usable units for a stock item in Customize modal
// Returns [{unit, costPerUnit, isBase}]
// Logic:
//   - Weight/volume stockUnit → full dimension family (auto-converts)
//   - Pack stockUnit with spec → stockUnit + specBaseUnit (+ specBaseUnit's dimension family if measurable)
//   - Count stockUnit → just that unit
//   - If item has specAmt + specBaseUnit → those are also stored
// Safe rounding — never rounds to zero, keeps full precision for tiny values
function safeRound(v){
  if(!v||v===0)return 0;
  const abs=Math.abs(v);
  // Find how many decimal places needed to show at least 2 significant digits
  if(abs>=0.01)return Math.round(v*100000)/100000;
  // Very small: use toPrecision(4) to avoid truncating to 0
  return parseFloat(v.toPrecision(4));
}

// Returns aggregated summary of all batches for a given stock name
function getStockSummary(key,name){
  const batches=(BIZ_STOCKS[key]||[]).filter(s=>s.name.toLowerCase()===name.toLowerCase());
  if(!batches.length)return null;
  const first=batches[0];
  const specAmt=first.specAmt||0;
  const specBaseUnit=first.specBaseUnit||'';
  const totalQty=batches.reduce((sum,b)=>sum+b.qty,0);
  const totalValue=batches.reduce((sum,b)=>{
    // Use each batch's OWN specAmt — a sheet-mode batch has specAmt=0, ream batch has specAmt=500
    const bSpecAmt=b.specAmt||0;
    const baseQty=bSpecAmt>0?b.qty*bSpecAmt:b.qty;
    return sum+baseQty*(b.cost||0);
  },0);
  // Total base qty also uses per-batch specAmt
  const totalBase=batches.reduce((sum,b)=>{
    const bSpecAmt=b.specAmt||0;
    return sum+(bSpecAmt>0?b.qty*bSpecAmt:b.qty);
  },0);
  const wac=totalBase>0?totalValue/totalBase:first.cost||0;
  // Subtract in-memory ingredient reservations for this key only
  const _reservedBase=(stockReservations[key]?.[first.name]||0);
  const availableBase=Math.max(0,totalBase-_reservedBase);
  return{id:first.id,name:first.name,qty:totalQty,totalBase:availableBase,_totalBase:totalBase,stockUnit:first.stockUnit,cost:safeRound(wac),specAmt,specBaseUnit,low:first.low,lowUnit:first.lowUnit||first.stockUnit,batches};
}

// Deduct qty across batches FIFO (oldest first)
// deductInBaseUnits = qty to deduct expressed in the base unit (e.g. sheets)
// Each batch knows its own specAmt — ream batch: 1 ream = specAmt sheets; sheet batch: 1 = 1 sheet
function deductStockFIFO(key,name,deductInBaseUnits,stockId){
  const batches=stockId
    ?(BIZ_STOCKS[key]||[]).filter(s=>String(s.id)===String(stockId))
    :(BIZ_STOCKS[key]||[]).filter(s=>s.name.toLowerCase()===name.toLowerCase());
  let remainingBase=deductInBaseUnits;
  for(const b of batches){
    if(remainingBase<=0)break;
    const bSpecAmt=b.specAmt||0;
    // How many base units does this batch hold?
    const batchBase=bSpecAmt>0?b.qty*bSpecAmt:b.qty;
    const takeBase=Math.min(batchBase,remainingBase);
    // Convert back to batch's own stockUnit to deduct
    const takeInBatchUnit=bSpecAmt>0?takeBase/bSpecAmt:takeBase;
    b.qty=Math.max(0,Math.round((b.qty-takeInBatchUnit)*100000)/100000);
    remainingBase=Math.round((remainingBase-takeBase)*100000)/100000;
  }
}

// Return base units back to stock (LIFO — add to last batch first)
// Used when a credit record is cancelled/removed
function returnStockFIFO(key,name,returnInBaseUnits){
  const batches=(BIZ_STOCKS[key]||[]).filter(s=>s.name.toLowerCase()===name.toLowerCase());
  if(!batches.length)return;
  // Add back to the last batch (most recent)
  const last=batches[batches.length-1];
  const bSpecAmt=last.specAmt||0;
  const returnInBatchUnit=bSpecAmt>0?returnInBaseUnits/bSpecAmt:returnInBaseUnits;
  last.qty=Math.round((last.qty+returnInBatchUnit)*100000)/100000;
}

function getItemUnits(item){
  const result=[];
  const dim=UNITS[item.stockUnit]?.dim;
  const cost=item.cost||0;
  // cost storage rule (set by doAddStock):
  //   - weight/volume direct (no spec): cost per 1 stockUnit
  //   - weight/volume with spec: cost per 1 specBaseUnit (the smaller measured unit)
  //   - pack with spec: cost per 1 specBaseUnit (e.g. per sheet, per ml)
  //   - pack without spec: cost per 1 stockUnit (per bottle/ream etc.)
  //   - count: cost per 1 stockUnit

  if(dim==='weight'||dim==='volume'){
    // Stored cost is per 1 stockUnit (e.g. per kg, per ml)
    // If specAmt was provided (e.g. bought 3 bottles of ink, each 250ml, stored qty=750ml, cost=per ml)
    // — in that case stockUnit IS the base unit (ml), so just convert normally
    const stockToBase=UNITS[item.stockUnit]?.toBase||1;
    const costPerBase=cost/stockToBase; // cost per 1g or 1ml
    UNIT_KEYS.filter(k=>UNITS[k].dim===dim).forEach(k=>{
      const toBase=UNITS[k]?.toBase||1;
      result.push({unit:k, costPerUnit:safeRound(costPerBase*toBase), isBase:k===item.stockUnit});
    });

  } else if(dim==='pack'){
    if(item.specAmt&&item.specAmt>0&&item.specBaseUnit){
      // cost is stored per 1 specBaseUnit (e.g. ₱0.36/sheet)
      const costPerSpecUnit=cost;
      // stockUnit (ream) cost = costPerSpecUnit × specAmt (e.g. ₱0.36 × 500 = ₱180/ream)
      const costPerStockUnit=safeRound(costPerSpecUnit*item.specAmt);
      result.push({unit:item.stockUnit, costPerUnit:costPerStockUnit, isBase:true});

      const specDim=UNITS[item.specBaseUnit]?.dim;
      if(specDim==='weight'||specDim==='volume'){
        // Full dimension family from specBaseUnit
        const specToBase=UNITS[item.specBaseUnit]?.toBase||1;
        const costPerBase=costPerSpecUnit/specToBase; // cost per 1g or 1ml
        UNIT_KEYS.filter(k=>UNITS[k].dim===specDim).forEach(k=>{
          const toBase=UNITS[k]?.toBase||1;
          result.push({unit:k, costPerUnit:safeRound(costPerBase*toBase), isBase:false});
        });
      } else {
        // Count spec base (e.g. sheet) — just add that unit
        result.push({unit:item.specBaseUnit, costPerUnit:safeRound(costPerSpecUnit), isBase:false});
      }
    } else {
      // No spec — cost is per 1 stockUnit (bottle, ream, etc.)
      result.push({unit:item.stockUnit, costPerUnit:safeRound(cost), isBase:true});
    }

  } else {
    // Simple count — cost per 1 stockUnit
    result.push({unit:item.stockUnit, costPerUnit:safeRound(cost), isBase:true});
    // dozen: also show per-piece cost
    if(UNITS[item.stockUnit]?.toBase&&UNITS[item.stockUnit].toBase>1){
      result.push({unit:'pc', costPerUnit:safeRound(cost/UNITS[item.stockUnit].toBase), isBase:false});
    }
    // Custom spec on count (e.g. tray=30pc)
    if(item.specAmt&&item.specAmt>0&&item.specBaseUnit){
      result.push({unit:item.specBaseUnit, costPerUnit:safeRound(cost/item.specAmt), isBase:false});
    }
  }

  const seen=new Set();
  return result.filter(r=>{if(seen.has(r.unit))return false;seen.add(r.unit);return true;});
}

// Returns full unit list for Customize modal — always includes complete dimension family
// AND universal cooking units (tsp, tbsp, cup) for carenderia ONLY
function getFullUnitsForCustomize(item,bizKey){
  const base=getItemUnits(item);
  if(!base.length)return base;

  const dims=new Set(base.map(u=>UNITS[u.unit]?.dim).filter(Boolean));
  const existing=new Set(base.map(u=>u.unit));

  // Fill complete dimension family if weight or volume present
  if(dims.has('volume')){
    const refUnit=base.find(u=>UNITS[u.unit]?.dim==='volume'&&u.costPerUnit>0);
    if(refUnit){
      const costPerBase=refUnit.costPerUnit/(UNITS[refUnit.unit]?.toBase||1);
      UNIT_KEYS.filter(k=>UNITS[k].dim==='volume').forEach(k=>{
        if(!existing.has(k)){
          base.push({unit:k,costPerUnit:safeRound(costPerBase*(UNITS[k]?.toBase||1)),isBase:false});
          existing.add(k);
        }
      });
    }
  }
  if(dims.has('weight')){
    const refUnit=base.find(u=>UNITS[u.unit]?.dim==='weight'&&u.costPerUnit>0);
    if(refUnit){
      const costPerBase=refUnit.costPerUnit/(UNITS[refUnit.unit]?.toBase||1);
      UNIT_KEYS.filter(k=>UNITS[k].dim==='weight').forEach(k=>{
        if(!existing.has(k)){
          base.push({unit:k,costPerUnit:safeRound(costPerBase*(UNITS[k]?.toBase||1)),isBase:false});
          existing.add(k);
        }
      });
    }
  }

  // Universal cooking units — CARENDERIA ONLY
  if(bizKey==='carenderia'){
    const isVolume=dims.has('volume');
    const UNIVERSAL=[
      {unit:'tsp',  dryG:5,   liqMl:4.929  },
      {unit:'tbsp', dryG:15,  liqMl:14.787 },
      {unit:'cup',  dryG:240, liqMl:236.588},
    ];
    let costPerG=null,costPerMl=null;
    if(dims.has('weight')){const gUnit=base.find(u=>u.unit==='g');if(gUnit)costPerG=gUnit.costPerUnit;}
    if(dims.has('volume')){const mlUnit=base.find(u=>u.unit==='ml');if(mlUnit)costPerMl=mlUnit.costPerUnit;}
    if(costPerG===null&&costPerMl===null)costPerG=item.cost||0;
    UNIVERSAL.forEach(({unit,dryG,liqMl})=>{
      if(existing.has(unit))return;
      const costPerUnit=isVolume&&costPerMl!=null?safeRound(costPerMl*liqMl):safeRound((costPerG||0)*dryG);
      base.push({unit,costPerUnit,isBase:false});
      existing.add(unit);
    });
  }

  return base;
}

// Which businesses show the Customize button

function isCustomizeBiz(key){return CUSTOMIZE_BIZ.includes(key);}
function isPerishable(key){return PERISHABLE_BIZ.includes(key);}

// Deduct recipe ingredients from BIZ_STOCKS[key]
// multiplier = how many units sold (xerox) or 1 batch (carenderia)
function deductRecipe(key,recipe,multiplier){
  if(!recipe||!recipe.length)return;
  const stk=BIZ_STOCKS[key]||[];
  recipe.forEach(ing=>{
    const refItem=stk.find(s=>s.id===ing.stockId)||stk.find(s=>s.name.toLowerCase()===(ing.stockName||'').toLowerCase());
    if(!refItem)return;
    const useUnit=(ing.useUnit||'').toLowerCase();
    const specBaseUnit=(refItem.specBaseUnit||'').toLowerCase();
    const specAmt=refItem.specAmt||0;
    // Always pass in base units to deductStockFIFO
    const deductInBaseUnits=specAmt>0&&specBaseUnit&&useUnit===specBaseUnit
      ?ing.qty*multiplier                    // already in base unit (e.g. sheets)
      :specAmt>0?ing.qty*multiplier*specAmt  // in stockUnit (e.g. reams) → convert to sheets
      :ing.qty*multiplier;                   // no spec, direct
    deductStockFIFO(key,refItem.name,deductInBaseUnits);
  });
}

// ── VARIANT BOTTOM SHEET ─────────────────────────────────────────
function showVariantSheet(key,prodId,cartLineId){
  const prod=(BIZ_PRODUCTS[key]||[]).find(x=>x.id===prodId);
  if(!prod||!prod.variants||!prod.variants.length)return;
  const stk=BIZ_STOCKS[key]||[];
  const pa=document.querySelector('.pa');
  if(!pa)return;

  // Remove any existing sheet
  const existing=document.getElementById('_vsheet');
  if(existing)existing.remove();

  const variants=prod.variants.filter(v=>v.name);
  const currentVariantId=cartLineId?cartLineId.split('__v')[1]:'';

  const pills=variants.map(v=>{
    // Compute available stock from recipe (use the most limiting ingredient)
    const recipe=v.recipe||[];
    let stockStr='';
    let isOut=false;
    if(recipe.length>0){
      // Find minimum available across all recipe ingredients
      let minAvail=Infinity;
      recipe.forEach(r=>{
        if(!r.stockId)return;
        const stockItem=stk.find(s=>String(s.id)===String(r.stockId));
        if(!stockItem)return;
        const smry=getStockSummary(key,stockItem.name);
        if(!smry)return;
        // totalBase already has reservations subtracted
        const availBase=smry.totalBase||0;
        const canMake=r.qty>0?Math.floor(availBase/r.qty):availBase;
        if(canMake<minAvail)minAvail=canMake;
      });
      if(minAvail===Infinity)minAvail=0;
      isOut=minAvail<=0;
      stockStr=isOut?'Out of stock':`${minAvail} left`;
    } else if(v.stockId){
      // Fallback single stock link
      const stockItem=stk.find(s=>String(s.id)===String(v.stockId));
      const smry=stockItem?getStockSummary(key,stockItem.name):null;
      const specAmt=smry?.specAmt||0;
      const qty=specAmt>0?Math.round(smry.qty*specAmt*1000)/1000:Math.floor(smry?.qty||0);
      isOut=stockItem&&smry&&qty<=0;
      stockStr=stockItem?(isOut?'Out of stock':`${qty} left`):'';
    }
    const priceAdj=parseFloat(v.priceAdj)||0;
    const adjStr=priceAdj>0?`+₱${priceAdj}`:priceAdj<0?`-₱${Math.abs(priceAdj)}`:'';
    const isSel=v.id===currentVariantId;
    return`<div class="vpill${isSel?' sel':''}${isOut?' out':''}"
      onclick="${isOut?'':` pickVariant('${key}',${prodId},'${v.id}','${cartLineId||''}')`}">
      <span class="vpill-name">${v.name}${adjStr?` <span style="font-size:10px;font-weight:400">${adjStr}</span>`:''}</span>
      ${stockStr?`<span class="vpill-stock">${stockStr}</span>`:''}
    </div>`;
  }).join('');

  const sheet=document.createElement('div');
  sheet.id='_vsheet';
  sheet.className='vsheet-bg';
  sheet.innerHTML=`<div class="vsheet">
    <div class="vsheet-handle"></div>
    <div class="vsheet-title">Select ${prod.variantLabel||'Variant'} — <span style="font-weight:400;color:var(--text-secondary)">${prod.name}</span></div>
    <div class="vsheet-body">
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px">${pills}</div>
      <button class="btn-c" style="width:100%" onclick="closeVariantSheet()">Cancel</button>
    </div>
  </div>`;
  sheet.addEventListener('click',e=>{if(e.target===sheet)closeVariantSheet();});
  pa.appendChild(sheet);
}

function closeVariantSheet(){
  const el=document.getElementById('_vsheet');
  if(!el)return;
  const sheet=el.querySelector('.vsheet');
  if(sheet){sheet.style.animation='slideDown .2s ease forwards';
    sheet.style.cssText+=';animation:slideDown .2s ease forwards';
    const style=document.createElement('style');
    style.textContent='@keyframes slideDown{to{transform:translateY(100%)}}';
    document.head.appendChild(style);
    setTimeout(()=>{el.remove();style.remove();},200);
  } else {el.remove();}
}

function pickVariant(key,prodId,variantId,cartLineId){
  const prod=(BIZ_PRODUCTS[key]||[]).find(x=>x.id===prodId);
  if(!prod)return;
  const variant=prod.variants.find(v=>v.id===variantId);
  if(!variant)return;

  if(!cart[key])cart[key]={};
  if(!stockReservations[key])stockReservations[key]={};

  // Always add as new line — never replace existing lines
  // Cart key = prodId__vVariantId — same variant taps just increment
  const newCartKey=`${prodId}__v${variantId}`;
  const priceAdj=parseFloat(variant.priceAdj)||0;
  const finalPrice=prod.price+priceAdj;

  if(!cart[key][newCartKey]){
    cart[key][newCartKey]={
      ...prod,
      id:newCartKey,
      prodId:prodId,
      variantId:variantId,
      variantName:variant.name,
      name:`${prod.name} (${variant.name})`,
      price:finalPrice,
      variantStockId:variant.stockId||null,
      qty:0
    };
  }
  // Always start at +1 — never carry over qty from another line
  cart[key][newCartKey].qty+=1;

  // Track as last picked so subsequent card taps increment this directly
  lastPickedVariant[key+'_'+prodId]=newCartKey;

  // Reserve 1 unit of this variant's recipe
  reserveVariantByRecipe(key,variant,+1,1);

  closeVariantSheet();
  if(screen===key&&(bizSubTab[key]||'sell')==='sell'){patchCart(key);}else{render();}
  setTimeout(()=>toast(`${prod.name} (${variant.name}) added ✓`),50);
}

function openCustomize(key,prodId){

function renderCustomizeModal(key,prodId){
  const stk=BIZ_STOCKS[key]||[];
  const prods=BIZ_PRODUCTS[key]||[];
  const prod=prods.find(x=>x.id===prodId);
  if(!prod){rmModal();return;}
  const isPerish=isPerishable(key);

  // Deduplicate by name — one combined row per item using getStockSummary
  const seenNames=new Set();
  const uniqueStk=[];
  stk.forEach(s=>{const n=s.name.toLowerCase();if(!seenNames.has(n)){seenNames.add(n);uniqueStk.push(getStockSummary(key,s.name));}});

  // Sort: in-stock first, low-stock middle, out-of-stock last
  const sortedStk=[...uniqueStk].sort((a,b)=>{
    const getOrder=s=>{
      const sAmt=s.specAmt||0;
      const qty=sAmt>0?Math.round(s.qty*sAmt*1000)/1000:Math.floor(s.qty);
      if(qty<=0)return 2;
      if(s.low>0&&qty<=s.low)return 1;
      return 0;
    };
    return getOrder(a)-getOrder(b);
  });

  const ingRows=stk.length===0
    ?`<div class="le" style="padding:20px 0;text-align:center">No stock items yet.<br><span style="font-size:10px">Go to Stock tab to add ingredients first.</span></div>`
    :sortedStk.map((s,idx)=>{
      // ── Group divider ──
      const getGroup=x=>{
        const sAmt=x.specAmt||0;
        const qty=sAmt>0?Math.round(x.qty*sAmt*1000)/1000:Math.floor(x.qty);
        if(qty<=0)return 2;
        if(x.low>0&&qty<=x.low)return 1;
        return 0;
      };
      const thisGroup=getGroup(s);
      const prevGroup=idx>0?getGroup(sortedStk[idx-1]):thisGroup;
      let divider='';
      if(idx===0&&thisGroup===0) divider=`<div style="font-size:9px;font-weight:700;color:var(--success);text-transform:uppercase;letter-spacing:.07em;padding:4px 2px 2px">✅ In Stock</div>`;
      else if(idx===0&&thisGroup===1) divider=`<div style="font-size:9px;font-weight:700;color:var(--warning);text-transform:uppercase;letter-spacing:.07em;padding:4px 2px 2px">⚠️ Low Stock</div>`;
      else if(idx===0&&thisGroup===2) divider=`<div style="font-size:9px;font-weight:700;color:var(--danger);text-transform:uppercase;letter-spacing:.07em;padding:4px 2px 2px">❌ Out of Stock</div>`;
      else if(thisGroup!==prevGroup){
        if(thisGroup===1) divider=`<div style="font-size:9px;font-weight:700;color:var(--warning);text-transform:uppercase;letter-spacing:.07em;padding:8px 2px 2px;border-top:0.5px solid var(--border-secondary);margin-top:4px">⚠️ Low Stock</div>`;
        if(thisGroup===2) divider=`<div style="font-size:9px;font-weight:700;color:var(--danger);text-transform:uppercase;letter-spacing:.07em;padding:8px 2px 2px;border-top:0.5px solid var(--border-secondary);margin-top:4px">❌ Out of Stock</div>`;
      }
      // ──────────────────
      const ku=getFullUnitsForCustomize(s,key);
      const inCart=custCart[s.id];
      // Default useUnit = first known unit
      const useUnit=inCart?.useUnit||(ku[0]?.unit||s.stockUnit||'pc');
      const useQty=inCart?.qty||0;

      // Find costPerUnit for selected useUnit
      const kuEntry=ku.find(u=>u.unit===useUnit)||ku[0];
      const cpuDisplay=p(kuEntry?.costPerUnit||0);

      // Row total cost
      const rowCost=useQty>0?useQty*(kuEntry?.costPerUnit||0):0;

      // Unit dropdown — only known units for this item
      const unitOpts=ku.map(u=>
        `<option value="${u.unit}"${u.unit===useUnit?' selected':''}>${u.unit} (${p(u.costPerUnit)}/${u.unit})</option>`
      ).join('');

      // ── Stock availability for this ingredient ──
      const specAmt=s.specAmt||0;
      const specBaseUnit=(s.specBaseUnit||'').toLowerCase();
      const useUnitLow=useUnit.toLowerCase();
      let availQty,availLabel;
      if(specAmt>0&&specBaseUnit&&useUnitLow===specBaseUnit){
        availQty=Math.round(s.qty*specAmt*1000)/1000;
        availLabel=specBaseUnit;
      } else {
        availQty=Math.floor(s.qty);
        availLabel=s.stockUnit||'unit';
      }
      const isOutOfStock=availQty<=0;
      const isLowStock=!isOutOfStock&&s.low>0&&availQty<=s.low;
      let stockBadge='';
      if(isOutOfStock) stockBadge=`<span style="font-size:9px;font-weight:700;color:var(--danger);margin-left:4px">Out of stock</span>`;
      else if(isLowStock) stockBadge=`<span style="font-size:9px;font-weight:700;color:var(--warning);margin-left:4px">Low: ${availQty} ${availLabel}</span>`;
      else stockBadge=`<span style="font-size:9px;color:var(--accent);margin-left:4px">${availQty} ${availLabel}</span>`;
      // ─────────────────────────────────────────────

      return divider+`<div class="cr" style="${isOutOfStock?'opacity:0.4;pointer-events:none;filter:grayscale(0.5)':''}">
        <div style="flex:1;min-width:0">
          <div class="crn" style="display:flex;align-items:center;flex-wrap:wrap;gap:2px">${s.name}${stockBadge}</div>
          <div style="font-size:10px;color:var(--text-tertiary)">${cpuDisplay}/${useUnit}${useQty>0?` · <strong style="color:var(--accent)">${p(rowCost)}</strong>`:''}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0">
          <div class="qw">
            <button class="qb" onclick="custAdj('${key}',${prodId},${s.id},-1)" ${isOutOfStock?'disabled':''}>−</button>
            <input class="qni" type="number" min="0" step="0.001" value="${useQty||''}" placeholder="0"
              oninput="custSave('${key}',${prodId},${s.id},this.value)"
              onblur="custSet('${key}',${prodId},${s.id},this.value)" style="width:44px" ${isOutOfStock?'disabled':''}>
            <button class="qb" onclick="custAdj('${key}',${prodId},${s.id},1)" ${isOutOfStock?'disabled':''}style="${isOutOfStock?'':''}">+</button>
          </div>
          ${ku.length>1
            ?`<select style="font-size:10px;padding:2px 4px;border-radius:5px;border:0.5px solid var(--border-primary);background:var(--bg-secondary);color:var(--text-secondary);font-family:inherit;cursor:pointer"
                onchange="custUnitChange('${key}',${prodId},${s.id},this.value)" ${isOutOfStock?'disabled':''}>${unitOpts}</select>`
            :`<span style="font-size:10px;color:var(--text-tertiary)">${useUnit}</span>`
          }
        </div>
        <span class="crp" style="min-width:44px;align-self:center">${useQty>0?p(rowCost):''}</span>
      </div>`;
    }).join('');

  // Total estimated cost using knownUnits costPerUnit
  let totalEst=0;
  Object.values(custCart).forEach(r=>{
    const item=stk.find(s=>s.id===r.stockId);
    if(!item)return;
    const ku=getItemUnits(item);
    const kuEntry=ku.find(u=>u.unit===r.useUnit)||ku[0];
    totalEst+=r.qty*(kuEntry?.costPerUnit||0);
  });
  const usedCount=Object.values(custCart).filter(r=>r.qty>0).length;

  const estLine=usedCount>0
    ?`<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0 2px;border-top:0.5px solid var(--border-secondary);margin-top:2px">
        <span style="font-size:11px;color:var(--text-secondary)">${usedCount} ingredient${usedCount!==1?'s':''}</span>
        <span style="font-size:14px;font-weight:700;color:var(--text-primary)" data-est>Est. cost: ${p(totalEst)}</span>
      </div>`:'' ;

  const yieldNote=isPerish
    ?`<div class="yield-row" style="margin-top:6px"><span class="yield-label">🍳 Servings this batch makes <span style="color:var(--text-tertiary);font-size:10px">(optional)</span></span><input type="number" class="yield-inp" id="batch-yield" min="1" value="${prod.batchYield||1}"></div>
      <div class="wn" style="margin-top:4px">⚠️ Stock deducts <strong>immediately</strong> on save.</div>`
    :`<div class="wn" style="margin-top:6px">🖨️ Stock deducts <strong>per unit sold</strong> at checkout.</div>`;

  const html=`<div class="modal-t">⚙️ Customize — ${prod.name||'New Product'}</div>
    <div style="font-size:10px;color:var(--text-tertiary);margin-bottom:8px">Set qty per unit. Unit options come from how you stocked each item. Cost auto-calculates.</div>

    <!-- INGREDIENTS SECTION -->

function custAdj(key,prodId,stockId,d){
  const stk=BIZ_STOCKS[key]||[];
  const item=stk.find(s=>s.id===stockId);
  if(!item)return;
  const ku=getItemUnits(item);
  const useUnit=custCart[stockId]?.useUnit||(ku[0]?.unit||item.stockUnit||'pc');
  const cur=custCart[stockId]?.qty||0;
  const next=Math.max(0,Math.round((cur+d)*1000)/1000);
  if(next===0){delete custCart[stockId];}
  else{custCart[stockId]={stockId,stockName:item.name,qty:next,useUnit};}
  renderCustomizeModal(key,prodId);
}

function custSave(key,prodId,stockId,val){
  // Save qty to custCart silently (no re-render) — used while user is still typing
  const stk=BIZ_STOCKS[key]||[];
  const item=stk.find(s=>s.id===stockId);
  if(!item)return;
  const qty=parseFloat(val)||0;
  const ku=getItemUnits(item);
  const useUnit=custCart[stockId]?.useUnit||(ku[0]?.unit||item.stockUnit||'pc');
  if(qty<=0){delete custCart[stockId];}
  else{custCart[stockId]={stockId,stockName:item.name,qty,useUnit};}
  // Update only the cost display inline without full re-render
  const kuEntry=ku.find(u=>u.unit===useUnit)||ku[0];
  const rowCost=qty>0?qty*(kuEntry?.costPerUnit||0):0;
  // Update est. cost total
  const stk2=BIZ_STOCKS[key]||[];
  let totalEst=0;
  Object.values(custCart).forEach(r=>{
    const it=stk2.find(s=>s.id===r.stockId);if(!it)return;
    const ku2=getItemUnits(it);
    const ke=ku2.find(u=>u.unit===r.useUnit)||ku2[0];
    totalEst+=r.qty*(ke?.costPerUnit||0);
  });
  const usedCount=Object.values(custCart).filter(r=>r.qty>0).length;
  const estEl=document.querySelector('#_modal .modal [data-est]');
  if(estEl)estEl.textContent=`Est. cost: ${p(totalEst)}`;
}

function custSet(key,prodId,stockId,val){
  const stk=BIZ_STOCKS[key]||[];
  const item=stk.find(s=>s.id===stockId);
  if(!item)return;
  const qty=parseFloat(val)||0;
  const ku=getItemUnits(item);
  const useUnit=custCart[stockId]?.useUnit||(ku[0]?.unit||item.stockUnit||'pc');
  if(qty<=0){delete custCart[stockId];}
  else{custCart[stockId]={stockId,stockName:item.name,qty,useUnit};}
  renderCustomizeModal(key,prodId);
}

function custUnitChange(key,prodId,stockId,newUnit){
  const stk=BIZ_STOCKS[key]||[];
  const item=stk.find(s=>s.id===stockId);
  if(!item)return;
  if(custCart[stockId]){custCart[stockId].useUnit=newUnit;}
  else{custCart[stockId]={stockId,stockName:item.name,qty:0,useUnit:newUnit};}
  renderCustomizeModal(key,prodId);
}

function saveCustomize(key,prodId){
  initBizData(key);
  const prods=BIZ_PRODUCTS[key]||[];
  const stk=BIZ_STOCKS[key]||[];
  const prod=prods.find(x=>x.id===prodId);
  if(!prod)return;

  // Save variants
  const variants=(tempVariants[prodId]||[]).filter(v=>v.name.trim());
  prod.variants=variants;
  tempVariants[prodId]=null;
  const recipe=Object.values(custCart).filter(r=>r.qty>0);
  const batchYield=parseInt(document.getElementById('batch-yield')?.value)||1;
  // Est cost using knownUnits costPerUnit
  const estCost=recipe.reduce((sum,ing)=>{
    const item=stk.find(s=>s.id===ing.stockId);
    if(!item)return sum;
    const ku=getItemUnits(item);
    const kuEntry=ku.find(u=>u.unit===ing.useUnit)||ku[0];
    return sum+ing.qty*(kuEntry?.costPerUnit||0);
  },0);
  prod.recipe=recipe;
  prod.batchYield=batchYield;
  if(recipe.length>0){
    prod.cost=isPerishable(key)
      ?(batchYield>0?Math.round((estCost/batchYield)*100)/100:estCost)
      :Math.round(estCost*100)/100;
  }
  if(isPerishable(key)&&recipe.length>0){
    deductRecipe(key,recipe,1);
    saveData();rmModal();render();
    setTimeout(()=>toast(`Recipe saved — batch deducted from stock ✓`),50);
  } else {
    saveData();rmModal();render();
    setTimeout(()=>toast(`Recipe saved for "${prod.name}" ✓`),50);
  }
  custCart={};
}
