  if(!BIZ_WASTELOGS[key])BIZ_WASTELOGS[key]=[];
  renderWasteModal(key,null,0);
}

function renderWasteModal(key,selectedProdId,wasteQty){
  initBizData(key);
  const prods=BIZ_PRODUCTS[key]||[]; // ALL products
  const stk=BIZ_STOCKS[key]||[];
  const logs=(BIZ_WASTELOGS[key]||[]).slice().reverse().slice(0,5);
  const selProd=selectedProdId?prods.find(pr=>pr.id===selectedProdId):null;
  const hasRecipe=selProd&&selProd.recipe&&selProd.recipe.length>0;

  // Product selector rows — all products
  const prodRows=prods.map(pr=>{
    const hasR=pr.recipe&&pr.recipe.length>0;
    return`<div class="cr" style="cursor:pointer;${pr.id===selectedProdId?'background:var(--accent-light);border-radius:6px;':''}"
      onclick="renderWasteModal('${key}',${pr.id},${pr.id===selectedProdId?wasteQty:0})">
      <div style="flex:1">
        <div class="crn">${pr.name}</div>
        <div style="font-size:10px;color:var(--text-tertiary)">${hasR?`⚙️ ${pr.recipe.map(r=>r.stockName+'×'+r.qty+r.useUnit).join(', ')}`:'No recipe — log only'}</div>
      </div>
      ${pr.id===selectedProdId?'<span style="color:var(--accent);font-size:14px">✓</span>':''}
    </div>`;
  }).join('');

  // Deduction preview — only if product has recipe
  let preview='';
  if(selProd&&wasteQty>0){
    if(hasRecipe){
      const lines=selProd.recipe.map(r=>{
        const item=stk.find(s=>s.id===r.stockId);
        const ku=getItemUnits(item||{});
        const kuEntry=ku.find(u=>u.unit===r.useUnit)||ku[0];
        const totalDeduct=r.qty*wasteQty;
        const costDeduct=kuEntry?totalDeduct*(kuEntry.costPerUnit||0):0;
        return`<div style="display:flex;justify-content:space-between;font-size:11px;padding:3px 0;border-bottom:0.5px solid var(--border-tertiary)">
          <span style="color:var(--text-secondary)">${r.stockName}</span>
          <span style="color:var(--danger);font-weight:600">−${totalDeduct} ${r.useUnit} <span style="color:var(--text-tertiary);font-weight:400">(~${p(costDeduct)})</span></span>
        </div>`;
      }).join('');
      const totalCostLost=selProd.recipe.reduce((sum,r)=>{
        const item=stk.find(s=>s.id===r.stockId);
        const ku=getItemUnits(item||{});
        const kuEntry=ku.find(u=>u.unit===r.useUnit)||ku[0];
        return sum+(kuEntry?(r.qty*wasteQty*(kuEntry.costPerUnit||0)):0);
      },0);
      preview=`<div style="margin-top:8px;background:var(--danger-light);border:0.5px solid var(--danger);border-radius:var(--radius-sm);padding:8px 10px">
        <div style="font-size:10px;font-weight:700;color:var(--danger);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em">📉 Will deduct from inventory:</div>
        ${lines}
        <div style="display:flex;justify-content:space-between;margin-top:5px;font-size:11px;font-weight:700">
          <span style="color:var(--text-secondary)">Total material cost lost</span>
          <span style="color:var(--danger)">${p(totalCostLost)}</span>
        </div>
      </div>`;
    } else {
      // No recipe — log only notice
      preview=`<div style="margin-top:8px;background:var(--warning-light);border:0.5px solid var(--warning);border-radius:var(--radius-sm);padding:8px 10px;font-size:11px;color:var(--text-secondary)">
        📋 No recipe set for this product — waste will be <strong>logged only</strong>. No inventory deduction.
        <br><span style="font-size:10px;color:var(--text-tertiary)">Use ⚙️ Customize in Pricing tab to link ingredients.</span>
      </div>`;
    }
  }

  // Recent waste log
  const logHtml=logs.length?`<div style="margin-top:8px"><div style="font-size:10px;font-weight:700;color:var(--text-tertiary);text-transform:uppercase;margin-bottom:4px">Recent Waste Log</div>${logs.map(l=>`<div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text-tertiary);padding:2px 0"><span>${l.prodName} ×${l.qty}${l.deducted?' 📉':' 📋'}</span><span>${l.time}</span></div>`).join('')}</div>`:'';

  const html=`<div class="modal-t">🗑️ Record Waste / Error</div>
    <div style="font-size:10px;color:var(--text-tertiary);margin-bottom:8px">Select any product with defects or errors. Products with recipes will also deduct inventory.</div>
    <div style="font-size:10px;font-weight:700;color:var(--text-tertiary);text-transform:uppercase;margin-bottom:4px">Select Product</div>
    <div class="cb" style="padding:4px 12px;max-height:140px;overflow-y:auto;margin-bottom:8px">${prodRows}</div>
    ${selProd?`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
      <div style="font-size:12px;font-weight:600;color:var(--text-primary);flex:1">Quantity wasted / defective:</div>
      <div class="qw">
        <button class="qb" onclick="renderWasteModal('${key}',${selectedProdId},Math.max(0,${wasteQty}-1))">−</button>
        <input class="qni" type="number" min="0" value="${wasteQty}" onchange="renderWasteModal('${key}',${selectedProdId},parseInt(this.value)||0)" style="width:50px">
        <button class="qb" onclick="renderWasteModal('${key}',${selectedProdId},${wasteQty}+1)">+</button>
      </div>
    </div>${preview}`:'<div style="font-size:11px;color:var(--text-tertiary);text-align:center;padding:8px 0">← Select a product above</div>'}
    ${logHtml}
    <div class="mbtnrow" style="margin-top:10px">
      <button class="btn-c" onclick="rmModal()">Cancel</button>
      <button class="btn-s" style="background:var(--danger)" ${!selProd||wasteQty<=0?'disabled':''} onclick="recordWaste('${key}',${selectedProdId||0},${wasteQty})">🗑️ Record Waste</button>
    </div>`;

  const existingModal=document.getElementById('_modal');
  if(existingModal){existingModal.querySelector('.modal').innerHTML=html;}
  else{modal(html);}
}

function recordWaste(key,prodId,qty){
  if(!qty||qty<=0)return;
  initBizData(key);
  const prods=BIZ_PRODUCTS[key]||[];
  const prod=prods.find(p=>p.id===prodId);
  if(!prod)return;
  const hasRecipe=prod.recipe&&prod.recipe.length>0;
  // Deduct inventory only if recipe exists
  if(hasRecipe){
    const batchYield=prod.batchYield||1;
    deductRecipe(key,prod.recipe,qty/batchYield);
  }
  // Always log the waste
  if(!BIZ_WASTELOGS[key])BIZ_WASTELOGS[key]=[];
  BIZ_WASTELOGS[key].push({prodName:prod.name,qty,time:ts(),deducted:hasRecipe});
  rmModal();render();
  const msg=hasRecipe
    ?`Waste recorded — ${prod.name} ×${qty} · inventory deducted ✓`
    :`Waste recorded — ${prod.name} ×${qty} · logged only ✓`;
  setTimeout(()=>toast(msg,'err'),50);
}

// ── Custom unit dropdown state ────────────────────────────────
let pinnedUnits=[]; // persists during session
let stockUnitSel={}; // selected unit per biz key: stockUnitSel[key]='kg'

function getSelectedUnit(key){return stockUnitSel[key]||'pc';}

function buildUnitDropdown(key){
  const sel=getSelectedUnit(key);
  const selLabel=UNITS[sel]?.label||sel;
  return`<div class="udd-wrap" id="udd-wrap-${key}">
    <div class="udd-trigger" id="udd-trigger-${key}" onclick="toggleUDD('${key}')">
      <span id="udd-label-${key}">${selLabel}</span>
      <span style="font-size:10px;color:var(--text-tertiary)">▾</span>
    </div>
    <div class="udd-panel" id="udd-panel-${key}" style="display:none">
      <div class="udd-search">
        <input id="udd-search-${key}" placeholder="Search unit..." oninput="renderUDDList('${key}',this.value)" onclick="event.stopPropagation()">
      </div>
      <div class="udd-list" id="udd-list-${key}"></div>
    </div>
  </div>`;
}

function toggleUDD(key){
  const panel=document.getElementById('udd-panel-'+key);
  const trigger=document.getElementById('udd-trigger-'+key);
  if(!panel)return;
  const isOpen=panel.style.display!=='none';
  // Close all other open dropdowns first
  document.querySelectorAll('[id^="udd-panel-"]').forEach(p=>{
    p.style.display='none';
    const k=p.id.replace('udd-panel-','');
    const t=document.getElementById('udd-trigger-'+k);
    if(t)t.classList.remove('open');
  });
  if(!isOpen){
    panel.style.display='flex';
    trigger.classList.add('open');
    renderUDDList(key,'');
    setTimeout(()=>{
      const s=document.getElementById('udd-search-'+key);
      if(s)s.focus();
    },50);
    // Close on outside click
    setTimeout(()=>{
      document.addEventListener('click',function closeUDD(e){
        const wrap=document.getElementById('udd-wrap-'+key);
        if(wrap&&!wrap.contains(e.target)){
          panel.style.display='none';
          trigger.classList.remove('open');
          document.removeEventListener('click',closeUDD);
        }
      });
    },10);
  }
}

function renderUDDList(key,q){
  const list=document.getElementById('udd-list-'+key);
  if(!list)return;
  const query=(q||'').toLowerCase().trim();
  const sel=getSelectedUnit(key);

  // Groups: Pinned first, then Weight, Volume, Count, Pack
  const groups=[
    {label:'⭐ Pinned',units:pinnedUnits.filter(u=>UNITS[u])},
    {label:'── Weight ──',units:UNIT_KEYS.filter(k=>UNITS[k].dim==='weight'&&!pinnedUnits.includes(k))},
    {label:'── Volume ──',units:UNIT_KEYS.filter(k=>UNITS[k].dim==='volume'&&!pinnedUnits.includes(k))},
    {label:'── Count ──',units:UNIT_KEYS.filter(k=>UNITS[k].dim==='count'&&!pinnedUnits.includes(k))},
    {label:'── Pack / Container ──',units:UNIT_KEYS.filter(k=>UNITS[k].dim==='pack'&&!pinnedUnits.includes(k))},
  ];

  let html='';
  groups.forEach(g=>{
    const filtered=g.units.filter(u=>{
      if(!query)return true;
      const label=(UNITS[u]?.label||u).toLowerCase();
      return label.includes(query)||u.toLowerCase().includes(query);
    });
    if(!filtered.length)return;
    html+=`<div class="udd-group">${g.label}</div>`;
    filtered.forEach(u=>{
      const isPinned=pinnedUnits.includes(u);
      const isSel=u===sel;
      html+=`<div class="udd-item${isSel?' sel':''}" onclick="selectUnit('${key}','${u}')">
        <span class="udd-item-label">${UNITS[u]?.label||u}</span>
        <button class="udd-pin${isPinned?' pinned':''}" onclick="event.stopPropagation();togglePin_unit('${key}','${u}')" title="${isPinned?'Unpin':'Pin'}">${isPinned?'📌':'📍'}</button>
      </div>`;
    });
  });
  if(!html)html=`<div style="padding:16px;text-align:center;font-size:11px;color:var(--text-tertiary)">No units found</div>`;
  list.innerHTML=html;
}

function selectUnit(key,unitKey){
  stockUnitSel[key]=unitKey;
  const label=document.getElementById('udd-label-'+key);
  if(label)label.textContent=UNITS[unitKey]?.label||unitKey;
  const panel=document.getElementById('udd-panel-'+key);
  const trigger=document.getElementById('udd-trigger-'+key);
  if(panel)panel.style.display='none';
  if(trigger)trigger.classList.remove('open');
  onStockUnitChange(key);
}

function togglePin_unit(key,unitKey){
  if(pinnedUnits.includes(unitKey)){
    pinnedUnits=pinnedUnits.filter(u=>u!==unitKey);
  } else {
    pinnedUnits=[unitKey,...pinnedUnits];
  }
  renderUDDList(key,document.getElementById('udd-search-'+key)?.value||'');
}
function stockAC(key,val){
  const container=document.getElementById('ac-'+key);
  if(!container)return;
  const q=val.trim().toLowerCase();
  if(!q){container.innerHTML='';return;}
  const stk=BIZ_STOCKS[key]||[];
  const matches=stk.filter(s=>s.name.toLowerCase().includes(q));
  if(!matches.length){container.innerHTML='';return;}
  container.className='ac-list';
  container.innerHTML=matches.map(s=>{
    const ku=getItemUnits(s);
    const unitInfo=ku.map(u=>`${u.unit} (${p(u.costPerUnit)}/${u.unit})`).join(' · ');
    return`<div class="ac-item" onmousedown="fillStockAC('${key}',${s.id})">
      <span class="ac-item-name">${s.name}</span>
      <span class="ac-item-sub">${s.qty} ${s.stockUnit} in stock · ${unitInfo}</span>
    </div>`;
  }).join('');
}

// Fill stock form from an existing item — user can edit before restocking
function fillStockAC(key,stockId){
  const stk=BIZ_STOCKS[key]||[];
  const item=stk.find(s=>s.id===stockId);
  if(!item)return;
  const nameEl=document.getElementById('sn-'+key);
  if(nameEl)nameEl.value=item.name;
  const qtyEl=document.getElementById('sq-'+key);
  if(qtyEl){qtyEl.value='';qtyEl.focus();}
  // Step 1: set stockUnit first
  stockUnitSel[key]=item.stockUnit||'pc';
  const label=document.getElementById('udd-label-'+key);
  if(label)label.textContent=UNITS[item.stockUnit]?.label||item.stockUnit||'pc';
  // Step 2: pre-fill spec fields BEFORE updateFormUnitDropdowns
  const spuEl=document.getElementById('spu-'+key);
  const spbuEl=document.getElementById('spbu-'+key);
  if(item.specAmt>0){
    if(spuEl)spuEl.value=item.specAmt;
    if(spbuEl)spbuEl.value=item.specBaseUnit||'pc';
    const body=document.getElementById('spec-body-'+key);
    if(body&&body.style.display==='none')toggleSpecBox(key);
  } else {
    if(spuEl)spuEl.value='';
    if(spbuEl)spbuEl.value='pc';
  }
  // Step 3: NOW update unit dropdowns — spec is already set
  onStockUnitChange(key);
  // Step 4: pre-fill low stock with existing value
  const lowEl=document.getElementById('sl-'+key);
  if(lowEl)lowEl.value=item.low||2;
  const lowUnitEl=document.getElementById('sl-unit-'+key);
  if(lowUnitEl&&item.lowUnit)lowUnitEl.value=item.lowUnit;
  const costEl=document.getElementById('sc-'+key);
  if(costEl)costEl.value='';
  const container=document.getElementById('ac-'+key);
  if(container)container.innerHTML='';
  // Auto-fill category if item has one in sell tab
  const prod=(BIZ_PRODUCTS[key]||[]).find(p=>p.name.toLowerCase()===item.name.toLowerCase());
  if(prod&&prod.category){
    const catEl=document.getElementById('sell-cat-'+key);
    if(catEl)catEl.value=prod.category;
  }
}
function doAddStock(key){
  const name=document.getElementById('sn-'+key)?.value.trim();
  const qty=parseFloat(document.getElementById('sq-'+key)?.value)||0;
  const stockUnit=getSelectedUnit(key);
  const totalCost=parseFloat(document.getElementById('sc-'+key)?.value)||0;
  const low=parseInt(document.getElementById('sl-'+key)?.value)||2;
  const lowUnit=document.getElementById('sl-unit-'+key)?.value||stockUnit;
  const specAmt=parseFloat(document.getElementById('spu-'+key)?.value)||0;
  const specBaseUnit=document.getElementById('spbu-'+key)?.value||'pc';
  const sellToSell=document.getElementById('sell-toggle-'+key)?.classList.contains('on')||false;
  const sellCat=(document.getElementById('sell-cat-'+key)?.value||'').trim();
  const activeSellRows=sellToSell?(sellRows[key]||[]).filter(r=>parseFloat(r.price)>0):[];
  if(!name||qty<=0){toast('Enter item name and quantity','err');return;}
  if(!totalCost){toast('Enter total amount paid','err');return;}
  // Low stock alert validation
  const lowInStockUnit=lowUnit===specBaseUnit&&specAmt>0?(low/specAmt):low;
  if(low>0&&lowInStockUnit>=qty){
    toast(`⚠️ Low stock alert (${low} ${lowUnit}) is ≥ your restock qty (${qty} ${stockUnit}). Please reduce it.`,'err');
    const lowEl=document.getElementById('sl-'+key);
    if(lowEl){lowEl.style.borderColor='var(--danger)';setTimeout(()=>lowEl.style.borderColor='',2500);}
    return;
  }

  // Auto-detect formula
  // Spec provided → qty × specAmt ÷ totalCost = cost per specBaseUnit
  // No spec       → totalCost ÷ qty = cost per stockUnit
  let cost,finalQty,formulaDesc;
  if(specAmt>0){
    const totalBase=qty*specAmt;
    cost=totalCost/totalBase; // cost per 1 specBaseUnit (e.g. per sheet, per ml)
    finalQty=qty; // qty stays in stockUnit
    formulaDesc=`${qty} × ${specAmt} = ${totalBase} ${specBaseUnit} · ${p(cost)}/${specBaseUnit}`;
  } else {
    cost=totalCost/qty; // cost per 1 stockUnit
    finalQty=qty;
    formulaDesc=`${p(totalCost)} ÷ ${qty} = ${p(cost)}/${stockUnit}`;
  }

  if(!BIZ_STOCKS[key])BIZ_STOCKS[key]=[];
  const ex=BIZ_STOCKS[key].find(s=>s.name.toLowerCase()===name.toLowerCase());
  if(ex){
    // ── Weighted Average Cost (WAC) ──────────────────────────────
    // Rule: cost is always stored per 1 base unit
    //   - with spec:    base unit = specBaseUnit (e.g. sheet, ml)
    //                   existing base qty = ex.qty × ex.specAmt
    //                   new base qty      = qty × specAmt
    //   - without spec: base unit = stockUnit (e.g. kg, pc)
    //                   existing base qty = ex.qty
    //                   new base qty      = qty

    const hasSpec=specAmt>0&&specBaseUnit;
    const exSpecAmt=ex.specAmt||0;
    const exHasSpec=exSpecAmt>0&&ex.specBaseUnit;

    // Existing inventory value in base units
    const exBaseQty=exHasSpec?ex.qty*exSpecAmt:ex.qty;
    const exValue=exBaseQty*(ex.cost||0); // total ₱ value of existing stock

    // New purchase value in base units
    const newBaseQty=hasSpec?qty*specAmt:qty;
    const newValue=totalCost; // total ₱ paid for new purchase

    // WAC = (old total value + new total value) / (old base qty + new base qty)
    const totalBaseQty=exBaseQty+newBaseQty;
    const totalValue=exValue+newValue;
    const newWAC=totalBaseQty>0?totalValue/totalBaseQty:cost;

    const wacLabel=hasSpec?`${p(newWAC)}/${specBaseUnit}`:`${p(newWAC)}/${stockUnit}`;

    // Update item
    ex.qty+=qty;
    ex.cost=safeRound(newWAC);
    ex.stockUnit=stockUnit;
    if(hasSpec){ex.specAmt=specAmt;ex.specBaseUnit=specBaseUnit;}
    ex.lowUnit=lowUnit;
    if(sellToSell)activeSellRows.forEach(r=>addToSellTab(key,ex.name,parseFloat(r.price),r.unit||stockUnit,sellCat));
    // Auto-log as expense
    if(!BIZ_EXPLOGS[key])BIZ_EXPLOGS[key]=[];
    BIZ_EXPLOGS[key].push({id:uid(),desc:`Stock: ${name} (+${qty} ${stockUnit})`,amount:totalCost,cat:'Stock Purchase',time:ts(),dateKey:dateKey(),auto:true});
    render();
    setTimeout(()=>toast(`"${ex.name}" restocked +${qty} ${stockUnit} · WAC ${wacLabel} ✓`),50);
  } else {
    const sellSummary=activeSellRows.length?activeSellRows.map(r=>`${p(parseFloat(r.price))}/${r.unit}`).join(', '):'';
    modal(`<div class="modal-t">Confirm New Item</div>
      <div class="modal-sub">"<strong>${name}</strong>" — confirm before adding:</div>
      <input class="inp" id="ni-n" value="${name}">
      <div style="display:flex;gap:8px;margin-bottom:8px">
        <div style="flex:1;background:var(--bg-tertiary);border:0.5px solid var(--border-secondary);border-radius:var(--radius-sm);padding:8px;font-size:11px;color:var(--text-secondary);text-align:center">${qty} ${stockUnit}${specAmt>0?`<br>= ${qty*specAmt} ${specBaseUnit}`:''}</div>
        <div style="flex:1;background:var(--accent-light);border:0.5px solid var(--accent);border-radius:var(--radius-sm);padding:8px;font-size:11px;color:var(--accent);text-align:center">${formulaDesc}</div>
      </div>
      <input class="inp" id="ni-l" type="number" value="${low}" placeholder="Low stock alert">
      ${sellToSell&&sellSummary?`<div style="background:var(--success-light);border:0.5px solid var(--success);border-radius:var(--radius-sm);padding:8px;font-size:11px;color:var(--success);margin-top:6px">✓ Will add to Sell tab: ${sellSummary}</div>`:''}
      <div class="mbtnrow">
        <button class="btn-c" onclick="rmModal()">Cancel</button>
        <button class="btn-s" onclick="saveNewItem('${key}',${finalQty},'${stockUnit}',${cost},${low},${specAmt},'${specBaseUnit}',${sellToSell?1:0},'${sellCat.replace(/'/g,"\\'")}')">Add to Inventory</button>
      </div>`);
  }
}

function saveNewItem(key,qty,stockUnit,cost,low,specAmt,specBaseUnit,sellWasOn,sellCat){
  const name=document.getElementById('ni-n')?.value.trim();
  const lo=parseInt(document.getElementById('ni-l')?.value)||low||2;
  if(!name){toast('Enter item name','err');return;}
  if(!BIZ_STOCKS[key])BIZ_STOCKS[key]=[];
  const item={id:uid(),name,qty,stockUnit,cost,low:lo};
  if(specAmt>0){item.specAmt=specAmt;item.specBaseUnit=specBaseUnit;}
  BIZ_STOCKS[key].push(item);
  // Only add to sell tab if toggle was explicitly ON and rows have prices
  const rows=sellWasOn?(sellRows[key]||[]).filter(r=>parseFloat(r.price)>0):[];
  rows.forEach(r=>addToSellTab(key,name,parseFloat(r.price),r.unit||stockUnit,sellCat||''));
  // Auto-log total cost as expense
  const totalPaid=cost*(specAmt>0?qty*specAmt:qty);
  if(totalPaid>0){
    if(!BIZ_EXPLOGS[key])BIZ_EXPLOGS[key]=[];
    BIZ_EXPLOGS[key].push({id:uid(),desc:`Stock: ${name} (+${qty} ${stockUnit})`,amount:totalPaid,cat:'Stock Purchase',time:ts(),dateKey:dateKey(),auto:true});
  }
  rmModal();render();
  const costLabel=specAmt>0?`${p(cost)}/${specBaseUnit}`:`${p(cost)}/${stockUnit}`;
  const sellLabel=rows.length?` · ${rows.length} price(s) added to Sell tab ✓`:'';
  setTimeout(()=>toast(`"${name}" added — ${qty} ${stockUnit} · ${costLabel}${sellLabel}`),50);
}
function saveExp(key){const desc=document.getElementById('ed-'+key)?.value.trim();const amount=parseFloat(document.getElementById('ea-'+key)?.value)||0;const cat=document.getElementById('ec-'+key)?.value;if(!desc||amount<=0){toast('Fill description and amount','err');return;}if(!BIZ_EXPLOGS[key])BIZ_EXPLOGS[key]=[];BIZ_EXPLOGS[key].push({id:uid(),desc,amount,cat,time:ts(),dateKey:dateKey()});render();setTimeout(()=>toast(`Expense saved — ${p(amount)} ✓`),50);}
function logCS(){const desc=document.getElementById('csd')?.value.trim();const amount=parseFloat(document.getElementById('csa')?.value)||0;const method=document.getElementById('csm')?.value;if(!desc||amount<=0){toast('Fill all fields','err');return;}if(!BIZ_LOGS.cs)BIZ_LOGS.cs=[];BIZ_LOGS.cs.push({id:txn(),desc,total:amount,method,time:ts()});todayRev.cs=(todayRev.cs||0)+amount;render();setTimeout(()=>toast(`Recorded ${p(amount)} ✓`),50);}
function logPV(){const machine=document.getElementById('pvm')?.value.trim();const coins=parseFloat(document.getElementById('pvc')?.value)||0;const load=parseFloat(document.getElementById('pvl')?.value)||0;if(!machine||coins<=0){toast('Fill machine and coins','err');return;}const net=coins-load;if(!BIZ_LOGS.pv)BIZ_LOGS.pv=[];BIZ_LOGS.pv.push({id:txn(),machine,coins,load,net,time:ts()});todayRev.pv=(todayRev.pv||0)+net;render();setTimeout(()=>toast(`Collected ${p(net)} net ✓`),50);}
function markPaid(){const id=parseInt(document.getElementById('ic')?.value);if(!id){toast('Select a client','err');return;}const c=CLIENTS.find(x=>x.id===id);if(!c)return;c.status='Paid';todayRev.internet=(todayRev.internet||0)+c.amount;render();setTimeout(()=>toast(`${c.name} marked paid ✓`),50);}
function qPay(id){const c=CLIENTS.find(x=>x.id===id);if(!c)return;c.status='Paid';todayRev.internet=(todayRev.internet||0)+c.amount;render();setTimeout(()=>toast(`${c.name} paid ✓`),50);}
function goScreen(s){screen=s;svcQ='';if(s!=='home')initBizData(s);render();}
function setXTab(t){bizSubTab[screen]=t;['sell','stock','pricing','others'].forEach(x=>{const b=document.getElementById('nb-'+x);if(b)b.classList.toggle('act',x===t)});render();}
function clearAllData(){
  modal(`<div class="modal-t" style="color:var(--danger)">⚠️ Clear All Data</div>
    <div style="font-size:13px;color:var(--text-primary);margin-bottom:8px">This will permanently delete ALL your data:</div>
    <div style="font-size:12px;color:var(--text-secondary);margin-bottom:12px">Products, stock, sales logs, expenses, waste records, client list — everything.</div>
    <div style="background:var(--danger-light);border:0.5px solid var(--danger);border-radius:var(--radius-sm);padding:8px;font-size:11px;color:var(--danger);margin-bottom:12px">⚠️ This cannot be undone.</div>
    <div class="mbtnrow">
      <button class="btn-c" onclick="rmModal()">Cancel</button>
      <button style="background:var(--danger);color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit" onclick="confirmClearAll()">Yes, Delete Everything</button>
    </div>`);
}
function confirmClearAll(){
  localStorage.removeItem(STORAGE_KEY);
  selectedBiz=[];BIZ_PRODUCTS={};BIZ_STOCKS={};BIZ_LOGS={};BIZ_EXPLOGS={};BIZ_WASTELOGS={};
  CLIENTS=[];todayRev={};pinnedUnits=[];isDark=false;
  document.documentElement.classList.remove('dark');
  rmModal();render();
  setTimeout(()=>toast('All data cleared ✓'),50);

function openCamera(ctx){scanCtx=ctx;if(navigator.mediaDevices&&navigator.mediaDevices.getUserMedia){navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}}).then(stream=>{modal(`<div class="modal-t">📷 Camera</div><video id="cam-vid" autoplay playsinline style="width:100%;border-radius:8px;margin-bottom:8px;max-height:200px;object-fit:cover"></video><canvas id="cam-canvas" style="display:none"></canvas><img id="cam-preview" style="display:none;width:100%;border-radius:8px;margin-bottom:8px;max-height:200px;object-fit:contain"><div class="mbtnrow"><button class="btn-c" onclick="stopCam()">Cancel</button><button class="btn-s" id="snap-btn" onclick="snapPhoto()">📸 Capture</button></div>`);const vid=document.getElementById('cam-vid');vid.srcObject=stream;vid._stream=stream;}).catch(()=>openFile(ctx));}else{openFile(ctx);}}
function stopCam(){const v=document.getElementById('cam-vid');if(v&&v._stream)v._stream.getTracks().forEach(t=>t.stop());rmModal();}
function snapPhoto(){const v=document.getElementById('cam-vid'),c=document.getElementById('cam-canvas'),img=document.getElementById('cam-preview'),btn=document.getElementById('snap-btn');c.width=v.videoWidth;c.height=v.videoHeight;c.getContext('2d').drawImage(v,0,0);const dataUrl=c.toDataURL('image/jpeg',0.85);v.style.display='none';img.src=dataUrl;img.style.display='block';btn.textContent='✓ Use Photo';btn.onclick=()=>{if(v._stream)v._stream.getTracks().forEach(t=>t.stop());rmModal();processScanImage(dataUrl,scanCtx);};}
function openFile(ctx){scanCtx=ctx;const input=document.getElementById('file-cam-input');input.onchange=e=>{const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=ev=>processScanImage(ev.target.result,ctx);r.readAsDataURL(file);input.value='';};input.click();}
async function processScanImage(dataUrl,ctx){
  const isExp=ctx.startsWith('exp-');
  const lb=document.getElementById('lb-'+ctx),lbi=document.getElementById('lbi-'+ctx),sr=document.getElementById('sr-'+ctx),si=document.getElementById('si-'+ctx);
  if(!lb||!sr||!si){toast('Reload and try again','err');return;}
  lb.style.display='block';lbi.style.width='0';let prog=0;const iv=setInterval(()=>{prog=Math.min(prog+7,85);lbi.style.width=prog+'%';},200);
  const base64=dataUrl.split(',')[1];
  const prompt=isExp?'Extract all expense items from this receipt. Return ONLY a JSON array: [{"name":"item","amount":0.00}]. No other text.':'Extract all items and quantities from this stock/inventory image. Return ONLY a JSON array: [{"name":"item","qty":1,"unit":"pcs"}]. No other text.';
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:'image/jpeg',data:base64}},{type:'text',text:prompt}]}]})});
    const data=await resp.json();
    clearInterval(iv);lbi.style.width='100%';setTimeout(()=>{lb.style.display='none';lbi.style.width='0';},400);
    const raw=data.content?.map(c=>c.text||'').join('');
    const parsed=JSON.parse(raw.replace(/```json|```/g,'').trim());
    sr.style.display='block';
    si.innerHTML=parsed.map((it,i)=>`<div class="scan-edit-row"><input class="sei-name" id="sn-${i}" value="${it.name||''}"><input class="sei-qty" id="sq-${i}" type="number" value="${isExp?(it.amount||0):(it.qty||1)}" placeholder="${isExp?'₱':'Qty'}"></div>`).join('');
    toast('Scan complete — review below ✓','ok');
  }catch(e){clearInterval(iv);lb.style.display='none';toast('Could not read image. Try a clearer photo.','err');}
}
function applyScanned(ctx){
  const isExp=ctx.startsWith('exp-');const key=ctx.replace('stock-','').replace('exp-','');
  const si=document.getElementById('si-'+ctx);if(!si)return;
  const rows=si.querySelectorAll('.scan-edit-row');let count=0;
  rows.forEach((_,i)=>{const name=document.getElementById('sn-'+i)?.value.trim();const val=parseFloat(document.getElementById('sq-'+i)?.value)||0;if(!name||val<=0)return;if(isExp){if(!BIZ_EXPLOGS[key])BIZ_EXPLOGS[key]=[];BIZ_EXPLOGS[key].push({id:uid(),desc:name,amount:val,cat:'Supplies',time:ts()});}else{if(!BIZ_STOCKS[key])BIZ_STOCKS[key]=[];const ex=BIZ_STOCKS[key].find(s=>s.name.toLowerCase()===name.toLowerCase());if(ex)ex.qty+=Math.round(val);else BIZ_STOCKS[key].push({id:uid(),name,qty:Math.round(val),unit:'unit',cost:0,low:2});}count++;});
  document.getElementById('sr-'+ctx).style.display='none';render();setTimeout(()=>toast(`${count} item(s) saved ✓`),50);
}
function updateClock(){const el=document.getElementById('posClock');if(el)el.textContent=new Date().toLocaleTimeString('en-PH',{hour:'2-digit',minute:'2-digit'});}

// ── Startup ──────────────────────────────────────────────────
loadData();
if(isDark){document.documentElement.classList.add('dark');const tog=document.getElementById('dmToggle');const lbl=document.getElementById('dmLabel');if(tog)tog.classList.add('dark-on');if(lbl)lbl.textContent='🌙 Dark';}
render();checkNet();setInterval(checkNet,20000);setInterval(updateClock,1000);updateClock();
</script>
