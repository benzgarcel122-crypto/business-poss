<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business Hub POS — V9</title>
<style>
/* ============================================================
   MULTI-BUSINESS POS V9
   Last Updated: May 2026
   Changes: Mobile-fit split POS layout, Dark mode visibility fix
   Stack: Plain HTML/CSS/JS — Path A
   Deploy: Vercel (free)
   ============================================================ */
:root{
  --bg-primary:#ffffff;--bg-secondary:#f8f7f4;--bg-tertiary:#f0ede8;
  --border-primary:#e0dbd2;--border-secondary:#ece8e1;--border-tertiary:#f0ede8;
  --text-primary:#1a1a1a;--text-secondary:#6b6560;--text-tertiary:#9e9890;
  --accent:#1a56db;--accent-light:#eff6ff;--success:#16a34a;--success-light:#dcfce7;
  --danger:#dc2626;--danger-light:#fee2e2;--warning:#ca8a04;--warning-light:#fef9c3;
  --shadow:0 1px 3px rgba(0,0,0,.08);--radius:12px;--radius-sm:8px;
}
.dark{
  --bg-primary:#1e1e1e;--bg-secondary:#272727;--bg-tertiary:#313131;
  --border-primary:#4a4a4a;--border-secondary:#404040;--border-tertiary:#383838;
  --text-primary:#f0f0f0;--text-secondary:#b8b4b0;--text-tertiary:#868280;
  --accent:#5b8aff;--accent-light:#1a2a4a;--success:#34d468;--success-light:#0f2a1a;
  --danger:#f87171;--danger-light:#2a1010;--warning:#fcd34d;--warning-light:#2a200a;
  --shadow:0 1px 3px rgba(0,0,0,.3);
}
*{box-sizing:border-box;margin:0;padding:0;transition:background-color .2s,color .2s,border-color .2s}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg-secondary)}
.pw{display:flex;justify-content:center;padding:12px;min-height:100vh;background:var(--bg-secondary);align-items:flex-start}
.pa{width:100%;max-width:480px;background:var(--bg-secondary);border-radius:20px;border:0.5px solid var(--border-primary);overflow:hidden;display:flex;flex-direction:column;height:calc(100vh - 24px);position:relative;box-shadow:var(--shadow)}
.ptb{background:var(--bg-primary);border-bottom:0.5px solid var(--border-secondary);padding:10px 14px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;gap:8px}
.ptb-left{display:flex;flex-direction:column;min-width:0}
.ptb-t{font-size:14px;font-weight:700;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ptb-s{font-size:10px;color:var(--text-tertiary);margin-top:1px}
.ptb-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.pclk{font-size:11px;font-weight:500;color:var(--text-secondary);font-variant-numeric:tabular-nums}
.net-badge{display:flex;align-items:center;gap:3px;font-size:10px;font-weight:600;padding:3px 7px;border-radius:20px}
.net-badge.online{background:var(--success-light);color:var(--success)}
.net-badge.offline{background:var(--danger-light);color:var(--danger)}
.net-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.net-badge.online .net-dot{background:var(--success)}
.net-badge.offline .net-dot{background:var(--danger)}
.dm-toggle{width:32px;height:18px;border-radius:20px;border:0.5px solid var(--border-primary);background:var(--bg-tertiary);cursor:pointer;position:relative;flex-shrink:0;transition:background .2s}
.dm-toggle.dark-on{background:var(--accent)}
.dm-knob{width:14px;height:14px;border-radius:50%;background:var(--bg-primary);position:absolute;top:1px;left:1px;transition:transform .2s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
.dm-toggle.dark-on .dm-knob{transform:translateX(14px)}
.dm-label{font-size:9px;color:var(--text-tertiary)}
.pbody{flex:1;overflow:hidden;min-height:0;display:flex;flex-direction:column}
/* ── Custom unit dropdown ── */
.udd-wrap{position:relative;flex:1;min-width:0}
.udd-trigger{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:var(--bg-primary);border:0.5px solid var(--border-primary);border-radius:var(--radius-sm);cursor:pointer;font-size:12px;color:var(--text-primary);font-family:inherit;gap:6px;user-select:none}
.udd-trigger:hover{border-color:var(--accent)}
.udd-trigger.open{border-color:var(--accent);border-radius:var(--radius-sm) var(--radius-sm) 0 0}
.udd-panel{position:absolute;top:100%;left:0;right:0;z-index:300;background:var(--bg-primary);border:0.5px solid var(--accent);border-top:none;border-radius:0 0 var(--radius-sm) var(--radius-sm);box-shadow:0 6px 20px rgba(0,0,0,.2);max-height:260px;display:flex;flex-direction:column}
.udd-search{padding:7px 10px;border-bottom:0.5px solid var(--border-secondary);flex-shrink:0}
.udd-search input{width:100%;padding:6px 10px;font-size:11px;border-radius:6px;border:0.5px solid var(--border-primary);background:var(--bg-secondary);color:var(--text-primary);font-family:inherit;outline:none}
.udd-search input:focus{border-color:var(--accent)}
.udd-list{overflow-y:auto;flex:1}
.udd-group{font-size:9px;font-weight:700;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.08em;padding:6px 12px 3px;background:var(--bg-secondary)}
.udd-item{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;cursor:pointer;border-bottom:0.5px solid var(--border-tertiary);gap:8px}
.udd-item:last-child{border-bottom:none}
.udd-item:hover,.udd-item.sel{background:var(--accent-light)}
.udd-item.sel .udd-item-label{color:var(--accent);font-weight:700}
.udd-item-label{font-size:12px;color:var(--text-primary);flex:1}
.udd-item-abbr{font-size:10px;color:var(--text-tertiary);flex-shrink:0}
.udd-pin{background:none;border:none;cursor:pointer;font-size:13px;padding:2px 4px;flex-shrink:0;opacity:.5;transition:opacity .15s}
.udd-pin:hover,.udd-pin.pinned{opacity:1}
.ac-wrap{position:relative}
.ac-list{position:absolute;top:100%;left:0;right:0;z-index:200;background:var(--bg-primary);border:0.5px solid var(--accent);border-radius:var(--radius-sm);box-shadow:0 4px 16px rgba(0,0,0,.18);max-height:160px;overflow-y:auto;margin-top:2px}
.ac-item{padding:9px 12px;cursor:pointer;border-bottom:0.5px solid var(--border-tertiary);display:flex;flex-direction:column;gap:2px}
.ac-item:last-child{border-bottom:none}
.ac-item:hover,.ac-item:active{background:var(--accent-light)}
.ac-item-name{font-size:12px;font-weight:600;color:var(--text-primary)}
.ac-item-sub{font-size:10px;color:var(--text-tertiary)}
.sell-toggle-row{background:var(--bg-tertiary);border:0.5px solid var(--border-secondary);border-radius:var(--radius-sm);padding:10px 12px}
.sell-toggle-circle{width:22px;height:22px;border-radius:50%;border:2px solid var(--border-primary);background:var(--bg-primary);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.sell-toggle-circle.on{border-color:var(--accent);background:var(--accent)}
.sell-toggle-circle.on::after{content:'✓';font-size:12px;font-weight:700;color:#fff}border:0.5px solid var(--danger);border-radius:6px;padding:5px 8px;font-size:13px;cursor:pointer;display:flex;align-items:center;transition:background .15s}
.trash-btn:hover{background:var(--danger);}align-items:center;gap:3px;padding:5px 10px;font-size:11px;font-weight:600;border-radius:6px;border:0.5px solid var(--accent);background:var(--accent-light);color:var(--accent);cursor:pointer;font-family:inherit;white-space:nowrap}
.cust-btn:hover{background:var(--accent);color:#fff}
.ingr-row{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:0.5px solid var(--border-tertiary)}
.ingr-row:last-child{border-bottom:none}
.ingr-check{width:15px;height:15px;accent-color:var(--accent);cursor:pointer;flex-shrink:0}
.ingr-name{flex:1;font-size:11px;color:var(--text-primary);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ingr-unit{font-size:10px;color:var(--text-tertiary);flex-shrink:0}
.ingr-qty{width:52px;padding:3px 5px;font-size:11px;border-radius:5px;border:0.5px solid var(--border-primary);background:var(--bg-primary);color:var(--text-primary);font-family:inherit;text-align:center}
.ingr-qty:focus{outline:none;border-color:var(--accent)}
.recipe-tag{display:inline-flex;align-items:center;gap:3px;font-size:9px;background:var(--accent-light);color:var(--accent);border-radius:4px;padding:1px 5px;margin-right:3px;margin-top:2px}
.recipe-badge{font-size:9px;font-weight:700;color:var(--accent);margin-left:3px}
.yield-row{display:flex;align-items:center;gap:8px;padding:8px 0 4px;border-top:0.5px solid var(--border-secondary);margin-top:4px}
.yield-label{font-size:11px;color:var(--text-secondary);flex:1}
.yield-inp{width:60px;padding:4px 6px;font-size:12px;border-radius:6px;border:0.5px solid var(--border-primary);background:var(--bg-primary);color:var(--text-primary);font-family:inherit;text-align:center}
.yield-inp:focus{outline:none;border-color:var(--accent)}
.sell-wrap{display:flex;flex-direction:column;flex:1;overflow:hidden;padding:0}
.sell-top{flex:1;overflow-y:auto;padding:12px 12px 6px}
.sell-bottom{flex-shrink:0;background:var(--bg-primary);border-top:0.5px solid var(--border-secondary);padding:10px 12px 12px}
/* ── All non-sell tabs keep normal scroll ── */
.tab-scroll{flex:1;overflow-y:auto;padding:12px}
.pnav{display:grid;grid-template-columns:repeat(4,1fr);background:var(--bg-primary);border-top:0.5px solid var(--border-secondary);flex-shrink:0}
.pnb{padding:8px 2px 6px;text-align:center;cursor:pointer;border:none;background:transparent;color:var(--text-tertiary);font-size:10px;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:2px;transition:color .15s}
.pnb.act{color:var(--accent)}
.tm{border-radius:var(--radius-sm);padding:8px 12px;font-size:12px;margin-bottom:10px;display:none}
.tm.ok{background:var(--success-light);border:0.5px solid var(--success);color:var(--success)}
.tm.err{background:var(--danger-light);border:0.5px solid var(--danger);color:var(--danger)}
.sl{font-size:10px;font-weight:700;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.07em;margin:0 0 7px}
.cb{background:var(--bg-primary);border:0.5px solid var(--border-secondary);border-radius:var(--radius);padding:12px;margin-bottom:10px}
.inp{width:100%;padding:9px 11px;font-size:13px;border-radius:var(--radius-sm);border:0.5px solid var(--border-primary);background:var(--bg-primary);color:var(--text-primary);font-family:inherit;margin-bottom:8px}
.inp:focus{outline:none;border-color:var(--accent)}
.inp:last-child{margin-bottom:0}
.ir{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.ir .inp{margin-bottom:0}
select.inp{appearance:auto}
.bm{width:100%;padding:11px;font-size:13px;font-weight:600;border-radius:var(--radius-sm);border:none;background:var(--text-primary);color:var(--bg-primary);cursor:pointer;font-family:inherit;margin-top:6px}
.bm:active{opacity:.8}
.bm:disabled{opacity:.3;cursor:not-allowed}
.bk{display:inline-flex;align-items:center;gap:5px;background:var(--bg-primary);border:0.5px solid var(--border-primary);border-radius:var(--radius-sm);padding:6px 12px;cursor:pointer;font-size:12px;color:var(--text-secondary);font-family:inherit;margin-bottom:12px}
.sell-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.cart-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.cart-badge{display:inline-block;background:var(--accent);color:#fff;font-size:9px;font-weight:700;border-radius:10px;padding:1px 6px;margin-left:5px;vertical-align:middle}
.cart-body{max-height:96px;overflow-y:auto;margin-bottom:6px}
.pay-row{display:flex;gap:6px;margin-bottom:6px}

.sc{background:var(--bg-primary);border:0.5px solid var(--border-secondary);border-radius:10px;padding:10px 12px}
.slb{font-size:10px;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.sv{font-size:16px;font-weight:700;color:var(--text-primary)}
.sv.g{color:var(--success)}.sv.b{color:var(--accent)}.sv.r{color:var(--danger)}
.hsum{background:var(--bg-primary);border:0.5px solid var(--border-secondary);border-radius:var(--radius);padding:12px;margin-bottom:12px}
.hsh{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.hrev{font-size:20px;font-weight:800;color:var(--text-primary)}
.hsd{padding:5px 10px;font-size:11px;font-weight:600;border-radius:6px;border:0.5px solid var(--border-primary);background:var(--bg-secondary);color:var(--text-secondary);cursor:pointer;font-family:inherit}
/* Scrollable revenue list — shows ~4 rows then scrolls */
.rev-scroll{max-height:128px;overflow-y:auto;overflow-x:hidden}
.rev-scroll::-webkit-scrollbar{width:5px;cursor:pointer}
.rev-scroll::-webkit-scrollbar-track{background:var(--bg-tertiary);border-radius:3px}
.rev-scroll::-webkit-scrollbar-thumb{background:var(--border-primary);border-radius:3px;cursor:grab}
.rev-scroll::-webkit-scrollbar-thumb:active{cursor:grabbing;background:var(--text-tertiary)}
/* Scrollable biz grid — shows ~2 rows then scrolls */
.biz-grid-wrap{max-height:200px;overflow-y:auto;overflow-x:hidden;margin-bottom:12px;padding:2px 2px 2px 0}
.biz-grid-wrap::-webkit-scrollbar{width:5px;cursor:pointer}
.biz-grid-wrap::-webkit-scrollbar-track{background:var(--bg-tertiary);border-radius:3px}
.biz-grid-wrap::-webkit-scrollbar-thumb{background:var(--border-primary);border-radius:3px;cursor:grab}
.biz-grid-wrap::-webkit-scrollbar-thumb:active{cursor:grabbing;background:var(--text-tertiary)}
.brow{cursor:pointer;border-bottom:0.5px solid var(--border-tertiary)}
.brow:last-of-type{border-bottom:none}
.brow-inner{display:flex;justify-content:space-between;align-items:center;padding:5px 0}
.brow-name{font-size:12px;color:var(--text-secondary);display:flex;align-items:center;gap:5px}
.brow-amt{font-size:12px;font-weight:600;color:var(--success)}
.brow-amt.zero{color:var(--text-tertiary)}
.biz-exp{overflow:hidden;max-height:0;transition:max-height .35s ease}
.biz-exp.open{max-height:160px}
.bei{padding:6px 10px;background:var(--bg-secondary);border-radius:0 0 8px 8px;margin-bottom:4px;display:flex;align-items:center;gap:10px}
.bei-stats{flex:1;min-width:0}
.trendline-wrap{display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0}
.trendline-title{font-size:8px;font-weight:700;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.05em;text-align:center}
.trendline-pct{font-size:10px;font-weight:700;border-radius:4px;padding:1px 5px;text-align:center}
.trendline-up{color:var(--success);background:var(--success-light)}
.trendline-down{color:var(--danger);background:var(--danger-light)}
.trendline-flat{color:var(--text-tertiary);background:var(--bg-tertiary)}
.er{display:flex;justify-content:space-between;font-size:11px;padding:2px 0}
.er-l{color:var(--text-tertiary)}
.er-g{font-weight:600;color:var(--success)}
.er-r{font-weight:600;color:var(--danger)}
.hg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:3px 3px 3px 0}
.bc-wrap{position:relative}
.bc{background:var(--bg-primary);border:0.5px solid var(--border-secondary);border-radius:var(--radius);padding:12px 6px 10px;cursor:pointer;text-align:center;user-select:none;width:100%}
.bc:active{transform:scale(.96)}
.bi{font-size:22px;margin-bottom:4px}
.bn{font-size:11px;font-weight:600;color:var(--text-primary);line-height:1.3}
.bb{font-size:9px;color:var(--text-tertiary);margin-top:2px}
.bc-remove{position:absolute;top:-5px;right:-5px;width:18px;height:18px;border-radius:50%;background:var(--danger);border:2px solid var(--bg-secondary);color:#fff;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:5;font-weight:700}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px}
.svc-wrap{position:relative}
.sb{background:var(--bg-primary);border:0.5px solid var(--border-secondary);border-radius:10px;padding:10px 8px;cursor:pointer;text-align:center;font-family:inherit;position:relative}
.sb.in-cart{border-color:var(--accent);background:var(--accent-light);border-left:3px solid var(--accent)}
.sb.pinned-svc{border-top:2px solid var(--warning)}
.sn{font-size:12px;font-weight:600;color:var(--text-primary)}
.sp{font-size:11px;color:var(--text-tertiary);margin-top:1px}
.svc-actions{position:absolute;top:3px;right:3px;display:flex;gap:2px;opacity:0;pointer-events:none;transition:opacity .15s}
.svc-wrap:hover .svc-actions{opacity:1;pointer-events:all}
.svc-x{width:16px;height:16px;border-radius:50%;background:var(--danger-light);border:none;color:var(--danger);cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;padding:0}
.svc-pin{width:16px;height:16px;border-radius:50%;background:var(--warning-light);border:none;color:var(--warning);cursor:pointer;font-size:9px;display:flex;align-items:center;justify-content:center;padding:0}
.pin-badge{position:absolute;top:3px;left:4px;font-size:9px}
.add-svc-btn{display:inline-flex;align-items:center;gap:3px;padding:4px 9px;font-size:11px;font-weight:600;border-radius:6px;border:0.5px dashed var(--border-primary);background:transparent;color:var(--text-tertiary);cursor:pointer;font-family:inherit}
.add-svc-btn:hover{border-color:var(--accent);color:var(--accent)}
.cr{display:flex;align-items:center;gap:6px;padding:7px 0;border-bottom:0.5px solid var(--border-tertiary)}
.cr:last-child{border-bottom:none}
.crn{flex:1;font-size:12px;color:var(--text-primary);min-width:0}
.crp{font-size:12px;font-weight:600;color:var(--text-primary);min-width:48px;text-align:right}
.qw{display:flex;align-items:center;gap:3px;flex-shrink:0}
.qb{width:22px;height:22px;border-radius:50%;border:0.5px solid var(--border-primary);background:var(--bg-secondary);color:var(--text-primary);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;font-family:inherit;padding:0}
.qni{width:34px;height:22px;border-radius:5px;border:0.5px solid var(--border-primary);background:var(--bg-primary);color:var(--text-primary);font-size:12px;font-weight:600;text-align:center;font-family:inherit;padding:0}
.qni:focus{outline:none;border-color:var(--accent)}
.cart-x{width:15px;height:15px;border-radius:50%;border:none;background:var(--bg-tertiary);color:var(--text-tertiary);cursor:pointer;font-size:9px;display:flex;align-items:center;justify-content:center;padding:0;flex-shrink:0;line-height:1}
.cart-x:hover{background:var(--danger-light);color:var(--danger)}
.tb{background:var(--bg-primary);border:0.5px solid var(--border-secondary);border-radius:10px;padding:10px 12px;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.tl{font-size:12px;color:var(--text-secondary)}
.tv{font-size:18px;font-weight:700;color:var(--text-primary)}
.pr{display:flex;gap:6px;margin-bottom:8px}
.pp{flex:1;padding:7px 4px;font-size:11px;font-weight:600;border-radius:var(--radius-sm);border:0.5px solid var(--border-primary);background:var(--bg-primary);color:var(--text-secondary);cursor:pointer;text-align:center;font-family:inherit}
.pp.act{background:var(--text-primary);color:var(--bg-primary);border-color:transparent}
.li{padding:6px 0;border-bottom:0.5px solid var(--border-tertiary)}
.li:last-child{border-bottom:none}
.lt{display:flex;justify-content:space-between;align-items:center}
.ln{font-size:12px;font-weight:600;color:var(--text-primary)}
.la{font-size:12px;font-weight:700;color:var(--success)}
.la-r{font-size:12px;font-weight:700;color:var(--danger)}
.lm{font-size:10px;color:var(--text-tertiary);margin-top:1px}
.le{font-size:12px;color:var(--text-tertiary);text-align:center;padding:14px 0}
.tab-row{display:flex;gap:6px;margin-bottom:12px}
.tab-pill{flex:1;padding:8px 4px;font-size:11px;font-weight:600;border-radius:var(--radius-sm);border:0.5px solid var(--border-primary);background:var(--bg-primary);color:var(--text-secondary);cursor:pointer;text-align:center;font-family:inherit}
.tab-pill.act{background:var(--text-primary);color:var(--bg-primary);border-color:transparent}
.subtab-row{display:flex;gap:6px;margin-bottom:12px}
.subtab{flex:1;padding:7px 4px;font-size:11px;font-weight:600;border-radius:var(--radius-sm);border:0.5px solid var(--border-primary);background:var(--bg-secondary);color:var(--text-secondary);cursor:pointer;text-align:center;font-family:inherit}
.subtab.act{background:var(--accent);color:#fff;border-color:var(--accent)}
.stk-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:0.5px solid var(--border-tertiary)}
.stk-row:last-child{border-bottom:none}
.badge{display:inline-block;font-size:9px;padding:1px 5px;border-radius:8px;margin-left:4px;font-weight:600}
.b-ok{background:var(--success-light);color:var(--success)}
.b-low{background:var(--warning-light);color:var(--warning)}
.b-out{background:var(--danger-light);color:var(--danger)}
.scan-row{display:flex;gap:6px;margin-bottom:10px}

// Trendline data — deterministic per business key, 3 periods
// Today = last 7 hours, Monthly = last 6 weeks, Yearly = last 12 months
const TREND={};
// For food & retail businesses — generate deterministic trend from base revenue
function getTrendData(key,period){
  // Only use real recorded trend data — never generate fake data
  if(TREND[key]&&TREND[key][period]&&TREND[key][period].length>=2)return TREND[key][period];
  return null;
}

function buildTrendline(key,period,liveRev){
  // Only show trendline when there is actual live revenue
  if(!liveRev||liveRev<=0)return'';
  const rawData=getTrendData(key,period);
  if(!rawData||rawData.length<2)return'';

  // Replace last data point with actual live revenue for accuracy
  const data=[...rawData];
  if(liveRev!=null)data[data.length-1]=liveRev;

  const W=90,H=36,pad=3;
  const vals=data.map(v=>Math.max(v||0,0));
  const mn=Math.min(...vals),mx=Math.max(...vals);
  const range=mx-mn||1;

  const pts=vals.map((v,i)=>{
    const x=pad+(i/(vals.length-1))*(W-pad*2);
    const y=H-pad-((v-mn)/range)*(H-pad*2);
    return[Math.round(x*10)/10,Math.round(y*10)/10];
  });

  // % change: compare second-to-last vs last (most recent movement)
  const prev=vals[vals.length-2]||1;
  const last=vals[vals.length-1];
  const pct=prev>0?Math.round(((last-prev)/prev)*100):0;
  const trend=pct>0?'up':pct<0?'down':'flat';
  const arrow=trend==='up'?'↑':trend==='down'?'↓':'→';
  const pctClass=`trendline-${trend}`;
  const lineColorHex=trend==='up'?'#22c55e':trend==='down'?'#ef4444':'#9ca3af';
  const fillId=`tgf-${key}-${period}`;

  const polyPts=pts.map(([x,y])=>`${x},${y}`).join(' ');
  const fillPts=pts.map(([x,y])=>`${x},${y}`).join(' ')+` ${pts[pts.length-1][0]},${H} ${pts[0][0]},${H}`;
  const [lx,ly]=pts[pts.length-1];
  const periodLabel=period==='Today'?'Hourly':period==='Monthly'?'6 Weeks':'12 Months';

  return`<div class="trendline-wrap">
    <svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="overflow:visible;display:block">
      <defs>
        <linearGradient id="${fillId}" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="${lineColorHex}" stop-opacity="0.22"/>
          <stop offset="100%" stop-color="${lineColorHex}" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <polygon points="${fillPts}" fill="url(#${fillId})"/>
      <polyline points="${polyPts}" fill="none" stroke="${lineColorHex}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="${lx}" cy="${ly}" r="2.2" fill="${lineColorHex}" stroke="var(--bg-secondary)" stroke-width="1.2"/>
    </svg>
    <span class="trendline-title">${periodLabel}</span>
    <span class="trendline-pct ${pctClass}">${arrow} ${Math.abs(pct)}%</span>
  </div>`;
}

function initBizData(key){
  if(!BIZ_PRODUCTS[key])BIZ_PRODUCTS[key]=[...(DEFAULT_PRODUCTS[key]||[]).map(p=>({...p}))];
  if(!BIZ_STOCKS[key])BIZ_STOCKS[key]=[...(DEFAULT_STOCKS[key]||[]).map(s=>({...s}))];

let CLIENTS=[];

function saveData(){
  try{
    const snapshot={
      selectedBiz,isDark,
      BIZ_PRODUCTS,BIZ_STOCKS,BIZ_LOGS,BIZ_EXPLOGS,BIZ_WASTELOGS,
      CLIENTS,todayRev,pinnedUnits,
      savedAt:new Date().toISOString()
    };
    localStorage.setItem(STORAGE_KEY,JSON.stringify(snapshot));
  }catch(e){
    console.warn('Save failed:',e);
  }
}

function loadData(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(!raw)return false;
    const d=JSON.parse(raw);
    if(d.selectedBiz)selectedBiz=d.selectedBiz;
    if(d.isDark!==undefined)isDark=d.isDark;
    if(d.BIZ_PRODUCTS)BIZ_PRODUCTS=d.BIZ_PRODUCTS;
    if(d.BIZ_STOCKS)BIZ_STOCKS=d.BIZ_STOCKS;
    if(d.BIZ_LOGS)BIZ_LOGS=d.BIZ_LOGS;
    if(d.BIZ_EXPLOGS)BIZ_EXPLOGS=d.BIZ_EXPLOGS;
    if(d.BIZ_WASTELOGS)BIZ_WASTELOGS=d.BIZ_WASTELOGS;
    if(d.CLIENTS)CLIENTS=d.CLIENTS;
    if(d.todayRev)todayRev=d.todayRev;
    if(d.pinnedUnits)pinnedUnits=d.pinnedUnits;
    // Migrate old expense entries that have no dateKey — stamp them as today
    // since they were saved in localStorage they are from this session
    const today=new Date().toDateString();
    Object.keys(BIZ_EXPLOGS).forEach(k=>{
      (BIZ_EXPLOGS[k]||[]).forEach(e=>{
        if(!e.dateKey)e.dateKey=today;
      });
    });
    return true;
  }catch(e){
    console.warn('Load failed:',e);
    return false;
  }
}
const p=n=>{
  const v=Number(n)||0;
  if(v===0)return'₱0.00';
  const abs=Math.abs(v);
  // For very small values, show enough decimal places to see a non-zero number
  if(abs>0&&abs<0.01){
    // Show up to 6 significant digits
    return'₱'+v.toPrecision(4);
  }
  return'₱'+v.toLocaleString('en-PH',{minimumFractionDigits:2,maximumFractionDigits:5});
};
const ts=()=>new Date().toLocaleString('en-PH',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});

function checkNet(){const img=new Image();const timer=setTimeout(()=>{img.src='';setNetStatus(false);},3000);img.onload=()=>{clearTimeout(timer);setNetStatus(true);};img.onerror=()=>{clearTimeout(timer);setNetStatus(navigator.onLine);};img.src='https://www.gstatic.com/generate_204?_='+Date.now();}

function rmModal(){const m=document.getElementById('_modal');if(m)m.remove();}
function getBizInfo(key){return ALL_BIZ.find(b=>b.key===key);}
function getRev(key){return todayRev[key]||0;}
function getExp(key){
  const today=dateKey();
  const todayShort=new Date().toLocaleDateString('en-PH',{month:'short',day:'numeric'});
  return(BIZ_EXPLOGS[key]||[]).filter(e=>{
    if(e.dateKey)return e.dateKey===today; // new entries — exact match
    if(e.time)return e.time.startsWith(todayShort); // old entries — match by time prefix
    return false;
  }).reduce((s,e)=>s+e.amount,0);
}
function getBadge(key){if(key==='internet')return`${CLIENTS.filter(c=>c.status==='Unpaid').length} unpaid`;const b=getBizInfo(key);return b?.ready?'POS ready':'Coming soon';}

function render(){
  const body=document.getElementById('posBody');const nav=document.getElementById('posNav');const tit=document.getElementById('topTitle');const sub=document.getElementById('topSub');
  const isMainBiz=selectedBiz.includes(screen)&&screen!=='home';
  nav.style.display=isMainBiz?'grid':'none';
  if(isMainBiz){['sell','stock','pricing','others'].forEach(x=>{const b=document.getElementById('nb-'+x);if(b)b.classList.toggle('act',x===(bizSubTab[screen]||'sell'));});}
  const b=getBizInfo(screen);
  if(screen==='home'){tit.textContent='Business Hub';sub.textContent='Your businesses at a glance';}
  else if(b){tit.textContent=b.name;sub.textContent=b.desc;}
  if(screen==='home')body.innerHTML=buildHome();
  else body.innerHTML=buildBizScreen(screen);
  if(showBizSelector)injectBizSelector();
  saveData();
}

function buildHome(){
  const tot=selectedBiz.reduce((s,k)=>s+(getRev(k)-getExp(k)),0);
  const revenueRows=selectedBiz.length===0
    ?`<div style="font-size:12px;color:var(--text-tertiary);text-align:center;padding:10px 0">Select businesses below to see revenue</div>`
    :selectedBiz.map(k=>{const b=getBizInfo(k);const rev=getRev(k);const exp=getExp(k);const net=rev-exp;return`<div class="brow" onclick="expandBiz=expandBiz==='${k}'?null:'${k}';render()"><div class="brow-inner"><span class="brow-name"><span style="font-size:10px">${expandBiz===k?'▾':'▸'}</span>${b?.name||k}</span><span class="brow-amt${net===0?' zero':''}" style="${net<0?'color:var(--danger)':''}">${p(net)}</span></div></div><div class="biz-exp${expandBiz===k?' open':''}"><div class="bei"><div class="bei-stats"><div class="er"><span class="er-l">Revenue</span><span class="er-g">${p(rev)}</span></div><div class="er"><span class="er-l">Expenses</span><span class="er-r">${p(exp)}</span></div><div class="er"><span class="er-l">Net Profit</span><span class="${net>=0?'er-g':'er-r'}">${p(net)}</span></div></div>${buildTrendline(k,revPer,rev)}</div></div>`;}).join('');
  const revenueSection=`<div class="rev-scroll">${revenueRows}</div><div style="display:flex;justify-content:space-between;padding:8px 0 2px;border-top:0.5px solid var(--border-secondary);margin-top:4px"><span style="font-size:12px;font-weight:700;color:var(--text-primary)">Net Profit</span><span style="font-size:15px;font-weight:700;color:${tot>=0?'var(--success)':'var(--danger)'}">${p(tot)}</span></div>`;
  const bizCards=selectedBiz.map(k=>{const b=getBizInfo(k);if(!b)return'';return`<div class="bc-wrap"><div class="bc" onclick="goScreen('${k}')"><div class="bi">${b.icon}</div><div class="bn">${b.name}</div><div class="bb">${getBadge(k)}</div></div><button class="bc-remove" onclick="event.stopPropagation();confirmRemoveBiz('${k}')" title="Remove from hub">✕</button></div>`;}).join('');
  if(selectedBiz.length===0){return`<div class="tab-scroll"><div id="t-el" class="tm ok"></div><div class="hsum"><div class="hsh"><div class="hrev">NET P&L</div><select class="hsd" onchange="revPer=this.value;expandBiz=null;render()">${['Today','Monthly','Yearly'].map(x=>`<option${revPer===x?' selected':''}>${x}</option>`).join('')}</select></div><div style="font-size:12px;color:var(--text-tertiary);text-align:center;padding:10px 0">No businesses yet</div></div><div class="empty-state"><div class="empty-icon">🏪</div><div class="empty-title">Set up your businesses</div><div class="empty-sub">Choose which business types you operate — each one comes with its own POS, inventory, and expense tracking built-in.</div><button class="setup-btn" onclick="openBizSelector()">＋ Select Your Businesses</button></div></div>`;}
  return`<div class="tab-scroll"><div id="t-el" class="tm ok"></div><div class="hsum"><div class="hsh"><div class="hrev">NET P&L</div><select class="hsd" onchange="revPer=this.value;expandBiz=null;render()">${['Today','Monthly','Yearly'].map(x=>`<option${revPer===x?' selected':''}>${x}</option>`).join('')}</select></div>${revenueSection}</div><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px"><div class="sl" style="margin:0">My Businesses</div><button class="add-svc-btn" onclick="openBizSelector()">＋ Add Business</button></div><div class="biz-grid-wrap"><div class="hg">${bizCards}</div></div></div>`;
}

function buildBizScreen(key){
  initBizData(key);
  const tab=bizSubTab[key]||'sell';
  if(key==='internet')return buildInternetScreen(key,tab);
  if(key==='cs')return buildCSScreen(key,tab);
  if(key==='pv')return buildPVScreen(key,tab);
  if(tab==='sell')return buildSell(key);
  if(tab==='stock')return buildStock(key);
  if(tab==='pricing')return buildPricing(key);
  if(tab==='others')return buildOthers(key);
  return buildSell(key);
}

function buildSell(key){
  initBizData(key);
  const prods=BIZ_PRODUCTS[key]||[];
  const sorted=[...prods].sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0));
  if(!sellCatFilter[key])sellCatFilter[key]='All';
  const activeCat=sellCatFilter[key];
  const catFiltered=activeCat==='All'?sorted:sorted.filter(s=>s.category===activeCat);
  const filtered=catFiltered.filter(s=>s.name.toLowerCase().includes((svcQ||'').toLowerCase()));
  if(!cart[key])cart[key]={};
  const items=Object.values(cart[key]);
  const tot=items.reduce((s,i)=>s+i.price*i.qty,0);
  const logs=BIZ_LOGS[key]||[];
  const cartCount=items.reduce((s,i)=>s+i.qty,0);

  // Build category pills — only for xerox/printing
  const CATEGORY_BIZ=['xerox'];
  let catPillsHtml='';
  if(CATEGORY_BIZ.includes(key)){
    const cats=['All',...[...new Set(prods.map(p=>p.category).filter(Boolean))].sort()];
    catPillsHtml=`<div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:8px;scrollbar-width:none;align-items:center">
      ${cats.map(c=>{
        const isAll=c==='All';
        const isActive=activeCat===c;
        const pill=`<button onclick="sellCatFilter['${key}']='${c.replace(/'/g,"\\'")}';updateCatFilter('${key}')"
          style="flex-shrink:0;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:0.5px solid ${isActive?'var(--accent)':'var(--border-primary)'};background:${isActive?'var(--accent)':'var(--bg-primary)'};color:${isActive?'#fff':'var(--text-secondary)'};font-family:inherit;transition:none">${c}</button>`;
        const dots=isAll?'':
          `<button onclick="event.stopPropagation();openCatMenu('${key}','${c.replace(/'/g,"\\'")}',this)"
            style="flex-shrink:0;background:none;border:none;cursor:pointer;color:var(--text-tertiary);font-size:16px;line-height:1;padding:2px 4px;margin-left:-4px" title="Category options">⋮</button>`;
        return pill+dots;
      }).join('')}
    </div>`;
  }

  // TOP — scrollable products area
  // FIX: search uses id="sell-search" and updateSearch(key) to avoid full re-render on input
  const topHtml=`
    <div id="t-el" class="tm ok"></div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <button class="bk" style="margin:0;flex-shrink:0" onclick="goScreen('home')">← Hub</button>
    </div>
    <div class="sell-stats">
      <div class="sc"><div class="slb">Today's Sales</div><div class="sv g">${p(todayRev[key]||0)}</div></div>
      <div class="sc"><div class="slb">Transactions</div><div class="sv b">${logs.length}</div></div>
    </div>
    <div style="position:relative;margin-bottom:8px">
      <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-tertiary);font-size:14px;pointer-events:none">⌕</span>
      <input id="sell-search" class="inp" style="padding-left:30px;margin:0" placeholder="Search product / service..."
        oninput="updateSearch('${key}',this.value)" value="${svcQ||''}">
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:7px">
      <div class="sl" style="margin:0">Products / Services</div>
      <div style="display:flex;gap:6px;align-items:center">
        ${PERUNIT_BIZ.includes(key)?`<button class="trash-btn" onclick="openWasteModal('${key}')" title="Record Waste / Error">🗑️</button>`:''}
        <button class="add-svc-btn" onclick="openAddProduct('${key}')">＋ Add</button>
      </div>
    </div>
    ${catPillsHtml}
    <div class="sg" id="sell-grid-${key}">
      ${buildProductGrid(key,filtered)}
    </div>
    ${logs.length>0?`<div class="sl" style="margin-top:4px">Recent Log</div><div class="cb" style="max-height:180px;overflow-y:auto">${logs.slice().reverse().slice(0,10).map(l=>`<div class="li"><div class="lt"><span class="ln">${l.id}</span><span class="la">${p(l.total)}</span></div><div class="lm">${l.items.map(i=>i.name+'×'+i.qty).join(', ')} · ${l.method} · ${l.time}</div></div>`).join('')}</div>`:''}
  `;

  // BOTTOM — pinned cart + payment
  // FIX: cart-body gets id="cart-body-{key}" so adjQty can patch it without full render
  const d=discount[key]||{type:'fixed',val:''};
  // Make sure discount state exists for this key
  if(!discount[key])discount[key]={type:'fixed',val:'',open:false};
  const rawTot=tot;
  const finalTot=getDiscountedTotal(key,rawTot);
  const discAmt=getDiscountAmt(key,rawTot);
  const hasDiscount=discAmt>0;
  const discOpen=!!(discount[key]&&discount[key].open);

  const discRowHtml=`
    <div id="disc-row-${key}" style="margin:4px 0 2px">
      <button onclick="toggleDiscountRow('${key}')"
        style="width:100%;display:flex;align-items:center;justify-content:space-between;background:none;border:0.5px solid var(--border-primary);border-radius:var(--radius-sm);padding:7px 10px;cursor:pointer;font-family:inherit;color:var(--text-secondary);font-size:11px;font-weight:600">
        <span>🏷️ Add Discount</span>
        <span style="font-size:14px;color:var(--accent)">${discOpen?'▲':'▼'}</span>
      </button>
      <div id="disc-panel-${key}" style="display:${discOpen?'block':'none'};background:var(--accent-light);border:0.5px solid var(--accent);border-radius:0 0 var(--radius-sm) var(--radius-sm);border-top:none;padding:10px">
        <div style="display:flex;gap:6px;margin-bottom:8px">
          <button data-disctype="fixed" onclick="setDiscType('${key}','fixed')" style="flex:1;padding:6px;border-radius:var(--radius-sm);font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;border:0.5px solid ${d.type==='fixed'?'var(--accent)':'var(--border-primary)'};background:${d.type==='fixed'?'var(--accent)':'var(--bg-primary)'};color:${d.type==='fixed'?'#fff':'var(--text-secondary)'}">₱ Fixed Amount</button>
          <button data-disctype="pct" onclick="setDiscType('${key}','pct')" style="flex:1;padding:6px;border-radius:var(--radius-sm);font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;border:0.5px solid ${d.type==='pct'?'var(--accent)':'var(--border-primary)'};background:${d.type==='pct'?'var(--accent)':'var(--bg-primary)'};color:${d.type==='pct'?'#fff':'var(--text-secondary)'}">% Percent Off</button>
        </div>
        <div style="display:flex;gap:6px;align-items:center">
          <input class="inp" type="number" style="margin:0;flex:1" id="disc-val-${key}"
            placeholder="${d.type==='fixed'?'Final amount to charge (e.g. 450)':'Percent off (e.g. 2)'}"
            value="${d.val||''}"
            oninput="applyDiscount('${key}',this.value)">
          <span style="font-size:13px;font-weight:700;color:var(--accent)">${d.type==='pct'?'%':'₱'}</span>
          <button onclick="clearDiscount('${key}')" style="background:none;border:none;cursor:pointer;color:var(--danger);font-size:18px;padding:0 2px" title="Clear discount">✕</button>
        </div>
        ${hasDiscount?`<div style="margin-top:8px;padding:6px 8px;background:var(--bg-primary);border-radius:var(--radius-sm);font-size:11px">
          <div style="display:flex;justify-content:space-between;color:var(--text-secondary);margin-bottom:3px">
            <span>Original total</span><span>${p(rawTot)}</span>
          </div>
          <div style="display:flex;justify-content:space-between;color:var(--danger);margin-bottom:3px">
            <span>Discount${d.type==='pct'?` (${d.val}%)`:`(fixed)`}</span><span>− ${p(discAmt)}</span>
          </div>
          <div style="display:flex;justify-content:space-between;font-weight:800;font-size:13px;color:var(--success);border-top:0.5px solid var(--border-secondary);padding-top:4px;margin-top:2px">
            <span>Amount Due</span><span>${p(finalTot)}</span>
          </div>
        </div>`:''}
      </div>
    </div>`;

  const bottomHtml=`
    <div class="cart-header" id="cart-header-${key}">
      <span class="sl" style="margin:0">Cart${cartCount>0?` <span class="cart-badge">${cartCount}</span>`:''}</span>
      <span style="font-size:16px;font-weight:800;color:${hasDiscount?'var(--text-tertiary)':'var(--text-primary)'}${hasDiscount?';text-decoration:line-through':''}">
        ${p(rawTot)}</span>
      ${hasDiscount?`<span style="font-size:16px;font-weight:800;color:var(--success)">${p(finalTot)}</span>`:''}
    </div>
    <div class="cart-body" id="cart-body-${key}">${buildCartRows(key,items)}</div>
    ${items.length>0?discRowHtml:''}
    <div class="pay-row">
      ${['Cash','GCash','Bank'].map(m=>`<div class="pp${xPay===m?' act':''}" onclick="xPay='${m}';render()">${m}</div>`).join('')}
    </div>
    <button class="bm" id="record-btn-${key}" ${items.length===0?'disabled':''} onclick="confirmSale('${key}')">
      ${items.length===0?'Record Sale':`Record Sale — ${p(finalTot)} via ${xPay}${hasDiscount?' 🏷️':''}`}
    </button>
    <div class="wn" style="margin-top:5px">→ Activepieces → SALES RECORDS</div>
  `;

  return`<div class="sell-wrap"><div class="sell-top">${topHtml}</div><div class="sell-bottom">${bottomHtml}</div></div>`;
}

// Build just the product grid HTML (used by buildSell and updateSearch)
function buildProductGrid(key,filtered){
  if(!cart[key])cart[key]={};
  return filtered.length===0
    ?`<div style="grid-column:1/-1;text-align:center;padding:20px;color:var(--text-tertiary);font-size:12px">No products found</div>`
    :filtered.map(s=>`<div class="svc-wrap"><div class="sb${cart[key][s.id]?' in-cart':''}${s.pinned?' pinned-svc':''}" onclick="addToCart('${key}',${s.id})">${s.pinned?'<span class="pin-badge">📌</span>':''}<div class="sn">${s.name}</div><div class="sp">${p(s.price)} ${s.unit}</div>${cart[key][s.id]?`<div style="margin-top:3px;font-size:10px;font-weight:700;color:var(--accent)">×${cart[key][s.id].qty} in cart</div>`:''}</div><div class="svc-actions"><button class="svc-pin" onclick="event.stopPropagation();togglePin('${key}',${s.id})">${s.pinned?'📌':'📍'}</button><button class="svc-x" onclick="event.stopPropagation();confirmRemoveProduct('${key}',${s.id})">✕</button></div></div>`).join('');
}

// Build just the cart rows HTML (reused by patchCart)
function buildCartRows(key,items){
  return items.length===0
    ?`<div class="le" style="padding:8px 0;font-size:11px">Tap a product above to add to cart</div>`
    :items.map(i=>`<div class="cr"><span class="crn" style="font-size:11px">${i.name}</span><div class="qw"><button class="qb" onclick="adjQty('${key}',${i.id},-1)">−</button><input class="qni" type="number" min="1" value="${i.qty}" onchange="setQtyCart('${key}',${i.id},this.value)" onclick="this.select()"><button class="qb" onclick="adjQty('${key}',${i.id},1)">+</button></div><span class="crp">${p(i.price*i.qty)}</span><button class="cart-x" onclick="removeFromCart('${key}',${i.id})" title="Remove">✕</button></div>`).join('');
}

// FIX: Search — only re-renders the product grid, never touches the input itself
function updateSearch(key,val){
  svcQ=val;
  const prods=BIZ_PRODUCTS[key]||[];
  const sorted=[...prods].sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0));
  const activeCat=sellCatFilter[key]||'All';
  const catFiltered=activeCat==='All'?sorted:sorted.filter(s=>s.category===activeCat);
  const filtered=catFiltered.filter(s=>s.name.toLowerCase().includes(val.toLowerCase()));
  const grid=document.getElementById('sell-grid-'+key);
  if(grid)grid.innerHTML=buildProductGrid(key,filtered);
}

// Category pill tap — re-render pills + grid without full page render
function updateCatFilter(key){
  render();
}

// 3-dots popover for a category pill
let _catMenuEl=null;
function openCatMenu(key,cat,btnEl){
  // Close existing popover if any
  if(_catMenuEl){_catMenuEl.remove();_catMenuEl=null;}
  const menu=document.createElement('div');
  menu.style.cssText='position:fixed;z-index:9999;background:var(--bg-primary);border:0.5px solid var(--border-primary);border-radius:var(--radius-sm);box-shadow:0 4px 16px rgba(0,0,0,.15);min-width:160px;overflow:hidden;';
  menu.innerHTML=`
    <div onclick="rmCatMenu();editCategory('${key}','${cat.replace(/'/g,"\\'")}');event.stopPropagation()"
      style="padding:11px 16px;font-size:12px;font-weight:600;cursor:pointer;color:var(--text-primary);border-bottom:0.5px solid var(--border-secondary)"
      onmouseover="this.style.background='var(--bg-tertiary)'" onmouseout="this.style.background=''">✏️ Edit Category</div>
    <div onclick="rmCatMenu();confirmRemoveCat('${key}','${cat.replace(/'/g,"\\'")}');event.stopPropagation()"
      style="padding:11px 16px;font-size:12px;font-weight:600;cursor:pointer;color:var(--danger)"
      onmouseover="this.style.background='var(--danger-light)'" onmouseout="this.style.background=''">🗑️ Remove Category</div>
  `;
  // Position near button
  const r=btnEl.getBoundingClientRect();
  menu.style.top=(r.bottom+4)+'px';
  menu.style.left=Math.min(r.left,window.innerWidth-180)+'px';
  document.body.appendChild(menu);
  _catMenuEl=menu;
  // Close on outside click
  setTimeout(()=>document.addEventListener('click',rmCatMenu,{once:true}),10);
}
function rmCatMenu(){if(_catMenuEl){_catMenuEl.remove();_catMenuEl=null;}}

// Edit category modal — rename + manage products inside
function editCategory(key,cat){
  const prods=(BIZ_PRODUCTS[key]||[]).filter(p=>p.category===cat);
  const prodRows=prods.map(p=>`
    <div id="ecp-row-${p.id}" style="display:flex;gap:6px;align-items:center;margin-bottom:6px;padding:8px;background:var(--bg-tertiary);border-radius:var(--radius-sm)">
      <div style="flex:1;min-width:0">
        <input class="inp" style="margin-bottom:4px;font-size:12px" value="${p.name.replace(/"/g,'&quot;')}" id="ecp-name-${p.id}" placeholder="Product name">
        <div style="display:flex;gap:6px">
          <input class="inp" type="number" style="margin-bottom:0;font-size:12px;flex:1" value="${p.price}" id="ecp-price-${p.id}" placeholder="Price ₱">
          <span style="font-size:10px;color:var(--text-tertiary);align-self:center;white-space:nowrap">${p.unit}</span>
        </div>
      </div>
      <button onclick="removeCatProduct('${key}',${p.id})" style="flex-shrink:0;background:none;border:0.5px solid var(--danger);color:var(--danger);border-radius:6px;padding:6px 8px;cursor:pointer;font-size:12px">✕</button>
    </div>`).join('');
  modal(`<div class="modal-t">✏️ Edit Category</div>
    <div style="font-size:11px;color:var(--text-secondary);margin-bottom:6px">Category name</div>
    <input class="inp" id="ecat-name" value="${cat.replace(/"/g,'&quot;')}" placeholder="Category name">
    <div style="font-size:11px;color:var(--text-secondary);margin:8px 0 6px">Products in this category (${prods.length})</div>
    <div id="ecat-prod-list" style="max-height:240px;overflow-y:auto">${prodRows||'<div style="font-size:11px;color:var(--text-tertiary);padding:8px 0">No products</div>'}</div>
    <div style="background:var(--success-light);border:0.5px solid var(--success);border-radius:var(--radius-sm);padding:7px 10px;font-size:10px;color:var(--success);margin-top:8px">
      ✅ Removing a product here only removes it from the Sell tab — your stock inventory stays untouched.
    </div>
    <div class="mbtnrow" style="margin-top:10px">
      <button class="btn-c" onclick="rmModal()">Cancel</button>
      <button class="btn-s" onclick="saveCatEdit('${key}','${cat.replace(/'/g,"\\'")}')">Save Changes</button>
    </div>`);
}

// Remove a single product from within the edit category modal
function removeCatProduct(key,prodId){
  const row=document.getElementById('ecp-row-'+prodId);
  if(row)row.remove();
  // Mark for deletion (remove from BIZ_PRODUCTS immediately)
  if(BIZ_PRODUCTS[key])BIZ_PRODUCTS[key]=BIZ_PRODUCTS[key].filter(p=>p.id!==prodId);
  // Also remove from cart if present
  if(cart[key]&&cart[key][prodId])delete cart[key][prodId];
}

// Save edits from the edit category modal
function saveCatEdit(key,oldCat){
  const newCat=(document.getElementById('ecat-name')?.value||'').trim();
  if(!newCat){toast('Category name cannot be empty','err');return;}
  const prods=BIZ_PRODUCTS[key]||[];
  // Update each product's name, price, and category
  prods.forEach(p=>{
    if(p.category!==oldCat)return;
    const nameEl=document.getElementById('ecp-name-'+p.id);
    const priceEl=document.getElementById('ecp-price-'+p.id);
    if(nameEl&&nameEl.value.trim())p.name=nameEl.value.trim();
    if(priceEl&&parseFloat(priceEl.value)>0)p.price=parseFloat(priceEl.value);
    p.category=newCat;
  });
  // If filter was on old category, update to new name
  if(sellCatFilter[key]===oldCat)sellCatFilter[key]=newCat;
  rmModal();render();setTimeout(()=>toast(`Category updated ✓`),50);
}

// Confirm before removing an entire category
function confirmRemoveCat(key,cat){

// Actually remove category + all its products
function doRemoveCat(key,cat){
  if(!BIZ_PRODUCTS[key])return;
  const toRemove=(BIZ_PRODUCTS[key]||[]).filter(p=>p.category===cat).map(p=>p.id);
  BIZ_PRODUCTS[key]=BIZ_PRODUCTS[key].filter(p=>p.category!==cat);
  // Remove from cart too
  if(cart[key])toRemove.forEach(id=>{if(cart[key][id])delete cart[key][id];});
  if(sellCatFilter[key]===cat)sellCatFilter[key]='All';
  rmModal();render();setTimeout(()=>toast(`"${cat}" removed ✓`),50);
}

// FIX: Patch cart panel in-place — saves scroll position, no full render
// Compute final total after discount
function getDiscountedTotal(key,rawTot){
  const d=discount[key];
  if(!d||!d.val||d.val<=0)return rawTot;
  if(d.type==='fixed'){
    const fixed=parseFloat(d.val)||0;
    return Math.max(0,fixed);
  } else {
    const pct=parseFloat(d.val)||0;
    return Math.ceil(Math.max(0,rawTot-(rawTot*pct/100)));
  }
}
function getDiscountAmt(key,rawTot){
  return Math.max(0,rawTot-getDiscountedTotal(key,rawTot));
}

function patchCart(key){
  if(!cart[key])cart[key]={};
  const items=Object.values(cart[key]);
  const tot=items.reduce((s,i)=>s+i.price*i.qty,0);
  const cartCount=items.reduce((s,i)=>s+i.qty,0);

  // Save scroll position
  const cb=document.getElementById('cart-body-'+key);
  const scrollTop=cb?cb.scrollTop:0;

  // Patch cart-body
  if(cb)cb.innerHTML=buildCartRows(key,items);

  // Restore scroll
  const cb2=document.getElementById('cart-body-'+key);
  if(cb2)cb2.scrollTop=scrollTop;

  // Patch header total + badge
  const rawTot=tot;
  const finalTot=getDiscountedTotal(key,rawTot);
  const hasDiscount=getDiscountAmt(key,rawTot)>0;
  const hdr=document.getElementById('cart-header-'+key);
  if(hdr)hdr.innerHTML=`<span class="sl" style="margin:0">Cart${cartCount>0?` <span class="cart-badge">${cartCount}</span>`:''}</span><span style="font-size:16px;font-weight:800;color:${hasDiscount?'var(--text-tertiary)':'var(--text-primary)'}${hasDiscount?';text-decoration:line-through':''}">${p(rawTot)}</span>${hasDiscount?`<span style="font-size:16px;font-weight:800;color:var(--success)">${p(finalTot)}</span>`:''}`;

  // Patch record button
  const btn=document.getElementById('record-btn-'+key);
  if(btn){btn.disabled=items.length===0;btn.textContent=items.length===0?'Record Sale':`Record Sale — ${p(finalTot)} via ${xPay}${hasDiscount?' 🏷️':''}`;}

  // Inject discount row if items exist but row isn't in DOM yet
  if(items.length>0&&!document.getElementById('disc-row-'+key)){
    const payRow=btn&&btn.previousElementSibling; // .pay-row is before button
    if(payRow&&payRow.classList.contains('pay-row')){
      const discDiv=document.createElement('div');
      discDiv.id='disc-row-'+key;
      discDiv.style.cssText='margin:4px 0 2px';
      discDiv.innerHTML=`<button onclick="toggleDiscountRow('${key}')"
        style="width:100%;display:flex;align-items:center;justify-content:space-between;background:none;border:0.5px solid var(--border-primary);border-radius:var(--radius-sm);padding:7px 10px;cursor:pointer;font-family:inherit;color:var(--text-secondary);font-size:11px;font-weight:600">
        <span>🏷️ Add Discount</span><span style="font-size:14px;color:var(--accent)">▼</span></button>
        <div id="disc-panel-${key}" style="display:none;background:var(--accent-light);border:0.5px solid var(--accent);border-radius:0 0 var(--radius-sm) var(--radius-sm);border-top:none;padding:10px">
          <div style="display:flex;gap:6px;margin-bottom:8px">
            <button data-disctype="fixed" onclick="setDiscType('${key}','fixed')" style="flex:1;padding:6px;border-radius:var(--radius-sm);font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;border:0.5px solid var(--accent);background:var(--accent);color:#fff">₱ Fixed Amount</button>
            <button data-disctype="pct" onclick="setDiscType('${key}','pct')" style="flex:1;padding:6px;border-radius:var(--radius-sm);font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;border:0.5px solid var(--border-primary);background:var(--bg-primary);color:var(--text-secondary)">% Percent Off</button>
          </div>
          <div style="display:flex;gap:6px;align-items:center">
            <input class="inp" type="number" style="margin:0;flex:1" id="disc-val-${key}" placeholder="Final amount to charge (e.g. 450)" oninput="applyDiscount('${key}',this.value)">
            <span style="font-size:13px;font-weight:700;color:var(--accent)">₱</span>
            <button onclick="clearDiscount('${key}')" style="background:none;border:none;cursor:pointer;color:var(--danger);font-size:18px;padding:0 2px">✕</button>
          </div>
          <div class="disc-breakdown"></div>
        </div>`;
      payRow.parentNode.insertBefore(discDiv,payRow);
    }
  }
  // Remove discount row if cart is empty
  if(items.length===0){
    const dr=document.getElementById('disc-row-'+key);
    if(dr)dr.remove();
  }
  // Also patch product grid to update "in cart" badges
  const prods=BIZ_PRODUCTS[key]||[];
  const sorted=[...prods].sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0));
  const activeCat=sellCatFilter[key]||'All';
  const catFiltered=activeCat==='All'?sorted:sorted.filter(s=>s.category===activeCat);
  const filtered=catFiltered.filter(s=>s.name.toLowerCase().includes((svcQ||'').toLowerCase()));
  const grid=document.getElementById('sell-grid-'+key);
  if(grid)grid.innerHTML=buildProductGrid(key,filtered);
}

function toggleAddToSell(key){
  const circle=document.getElementById('sell-toggle-'+key);
  const priceWrap=document.getElementById('sell-price-wrap-'+key);
  if(!circle||!priceWrap)return;
  const isOn=circle.classList.toggle('on');
  priceWrap.style.display=isOn?'block':'none';
  if(isOn){
    // Reset sell rows for this key and render
    sellRows[key]=[{price:'',unit:getSelectedUnit(key)}];
    renderSellRows(key);
    // Populate category datalist
    populateCatDatalist(key);
    // Auto-fill category if item already exists in sell tab
    const name=document.getElementById('sn-'+key)?.value.trim();
    if(name){
      const existing=(BIZ_PRODUCTS[key]||[]).find(p=>p.name.toLowerCase()===name.toLowerCase());
      if(existing&&existing.category){
        const catEl=document.getElementById('sell-cat-'+key);
        if(catEl)catEl.value=existing.category;
      }
    }
  }
}

// Populate datalist with existing categories for this biz
function populateCatDatalist(key){
  const dl=document.getElementById('sell-cat-list-'+key);
  if(!dl)return;
  const cats=[...new Set((BIZ_PRODUCTS[key]||[]).map(p=>p.category).filter(Boolean))].sort();
  dl.innerHTML=cats.map(c=>`<option value="${c}">`).join('');
}

  // Just keep it reactive; datalist handles suggestions

// Auto-add or update product in Sell tab
// Each name+unit combo is a separate product entry
function addToSellTab(key,name,sellPrice,unit,category){
  if(!BIZ_PRODUCTS[key])BIZ_PRODUCTS[key]=[];
  const unitLabel=`per ${unit}`;
  // Match by BOTH name and unit — different units = different products
  const existing=BIZ_PRODUCTS[key].find(p=>
    p.name.toLowerCase()===name.toLowerCase()&&p.unit===unitLabel
  );
  if(existing){
    if(sellPrice>0)existing.price=sellPrice;
    if(category)existing.category=category;
  } else {
    BIZ_PRODUCTS[key].push({
      id:uid(),name,
      price:sellPrice||0,
      cost:0,
      unit:unitLabel,
      category:category||'',
      pinned:false,recipe:[],batchYield:1
    });
  }
}
function toggleSpecBox(key){
  const body=document.getElementById('spec-body-'+key);
  const arrow=document.getElementById('spec-arrow-'+key);
  const toggle=document.getElementById('spec-toggle-'+key);
  if(!body)return;
  const isOpen=body.style.display!=='none';
  body.style.display=isOpen?'none':'block';
  if(arrow)arrow.style.transform=isOpen?'':'rotate(180deg)';
  if(toggle){
    toggle.style.borderRadius=isOpen
      ?'var(--radius-sm)'
      :'var(--radius-sm) var(--radius-sm) 0 0';
    toggle.style.borderBottom=isOpen?'0.5px solid var(--border-secondary)':'none';
  }
}

function onStockUnitChange(key){
  const uk=getSelectedUnit(key);
  const hint=document.getElementById('spec-hint-'+key);
  const dim=UNITS[uk]?.dim;
  if(hint){
    if(dim==='weight')hint.textContent=`e.g. 1 sack = 25 kg · leave blank if qty already is the weight`;
    else if(dim==='volume')hint.textContent=`e.g. 1 bottle = 250 ml · leave blank if qty already is the volume`;
    else if(dim==='pack')hint.textContent=`e.g. 1 ${uk} = 500 sheets · 1 ${uk} = 250 ml · what's inside?`;
    else hint.textContent=`e.g. 1 dozen = 12 pieces · leave blank for direct count`;
  }
  updateFormUnitDropdowns(key);
  stockCostHint(key);
}

// Builds unit options from current form state: stockUnit + specBaseUnit (if set)
function getFormUnits(key){
  const stockUnit=getSelectedUnit(key);
  const specBaseUnit=document.getElementById('spbu-'+key)?.value||'';
  const units=[stockUnit];
  if(specBaseUnit&&specBaseUnit!==stockUnit)units.push(specBaseUnit);
  return units;
}

// Updates low-stock unit and sell-unit dropdowns from current form selections
function updateFormUnitDropdowns(key){
  const units=getFormUnits(key);
  const opts=units.map(u=>`<option value="${u}">${u}</option>`).join('');
  const lowU=document.getElementById('sl-unit-'+key);
  if(lowU){const prev=lowU.value;lowU.innerHTML=opts;if(units.includes(prev))lowU.value=prev;}
  // Re-render sell rows so their unit dropdowns update too
  renderSellRows(key);
}

// Edit stock item modal
function checkLowStockAlert(key){
  const warn=document.getElementById('sl-warn-'+key);
  if(!warn)return;
  const qty=parseFloat(document.getElementById('sq-'+key)?.value)||0;
  const low=parseInt(document.getElementById('sl-'+key)?.value)||0;
  const lowUnit=document.getElementById('sl-unit-'+key)?.value||'';
  const stockUnit=getSelectedUnit(key);
  const specAmt=parseFloat(document.getElementById('spu-'+key)?.value)||0;
  const specBaseUnit=document.getElementById('spbu-'+key)?.value||'';
  if(!low||!qty){warn.textContent='';return;}
  const lowInStockUnit=lowUnit===specBaseUnit&&specAmt>0?(low/specAmt):low;
  if(lowInStockUnit>=qty){
    warn.textContent=`⚠️ Alert (${low} ${lowUnit||stockUnit}) ≥ restock qty (${qty} ${stockUnit}) — reduce the alert number`;
  } else {
    warn.textContent='';
  }
}

function toggleEditSpec(){
  const body=document.getElementById('es-spec-body');
  const arrow=document.getElementById('es-spec-arrow');
  if(!body)return;
  const open=body.style.display!=='none';

}

function saveEditStock(key,stockId){
  const stk=BIZ_STOCKS[key]||[];
  const s=stk.find(x=>x.id===stockId);
  if(!s)return;
  const name=document.getElementById('es-name')?.value.trim();
  const qty=parseFloat(document.getElementById('es-qty')?.value)||0;
  const qunit=document.getElementById('es-qunit')?.value||s.stockUnit;
  const low=parseInt(document.getElementById('es-low')?.value)||2;
  const lowunit=document.getElementById('es-lowunit')?.value||s.stockUnit;
  const specAmt=parseFloat(document.getElementById('es-spamt')?.value)||0;
  const specUnit=document.getElementById('es-spunit')?.value||s.specBaseUnit||'';
  if(!name){toast('Name cannot be empty','err');return;}
  if(s.specAmt>0&&s.specBaseUnit&&qunit===s.specBaseUnit){
    s.qty=Math.round((qty/s.specAmt)*10000)/10000;
  } else {s.qty=qty;}
  s.name=name;s.low=low;s.lowUnit=lowunit;
  if(specAmt>0){s.specAmt=specAmt;s.specBaseUnit=specUnit;}
  rmModal();render();
  setTimeout(()=>toast(`"${name}" updated ✓`),50);
}

function confirmDeleteStock(key,stockId){
  const stk=BIZ_STOCKS[key]||[];
  const s=stk.find(x=>x.id===stockId);
  if(!s)return;
  const qtyLabel=s.specAmt>0?`${s.qty} ${s.stockUnit} (${s.qty*(s.specAmt||1)} ${s.specBaseUnit})`:`${s.qty} ${s.stockUnit}`;
  modal(`<div class="modal-t">🗑️ Delete Stock Record</div>

function deleteStock(key,stockId){

function stockCostHint(key){
  const hint=document.getElementById('cost-hint-'+key);
  if(!hint)return;
  const qty=parseFloat(document.getElementById('sq-'+key)?.value)||0;
  const totalCost=parseFloat(document.getElementById('sc-'+key)?.value)||0;
  const uk=getSelectedUnit(key);
  const specAmt=parseFloat(document.getElementById('spu-'+key)?.value)||0;
  const specUnit=document.getElementById('spbu-'+key)?.value||'pc';
  const name=document.getElementById('sn-'+key)?.value.trim().toLowerCase();
  if(!qty||!totalCost){hint.textContent='';return;}

  // Check if this is a restock of existing item
  const stk=BIZ_STOCKS[key]||[];
  const ex=stk.find(s=>s.name.toLowerCase()===name);
  const isRestock=!!ex;

  let hintHtml='';
  if(specAmt>0){
    const totalBase=qty*specAmt;
    const newCostPerBase=totalCost/totalBase;
    const costPerStockUnit=totalCost/qty;
    hintHtml=`<span style="color:var(--text-tertiary)">${qty} × ${specAmt} = ${totalBase} ${specUnit} total</span> → <strong style="color:var(--accent)">${p(newCostPerBase)}/${specUnit}</strong> · ${p(costPerStockUnit)}/${uk}`;
    if(isRestock&&ex){
      const exSpecAmt=ex.specAmt||0;
      const exBaseQty=exSpecAmt>0?ex.qty*exSpecAmt:ex.qty;
      const exValue=exBaseQty*(ex.cost||0);
      const newValue=totalCost;
      const wac=safeRound((exValue+newValue)/(exBaseQty+totalBase));
      hintHtml+=`<br><span style="color:var(--text-tertiary)">Current stock: ${exBaseQty} ${specUnit} @ ${p(ex.cost)}</span> → <strong style="color:var(--success)">WAC = ${p(wac)}/${specUnit}</strong>`;
    }
  } else {
    const newCostPerUnit=totalCost/qty;
    hintHtml=`<span style="color:var(--text-tertiary)">₱${p(totalCost)} ÷ ${qty}</span> → <strong style="color:var(--accent)">${p(newCostPerUnit)}/${uk}</strong>`;
    if(isRestock&&ex){
      const exValue=ex.qty*(ex.cost||0);
      const wac=safeRound((exValue+totalCost)/(ex.qty+qty));
      hintHtml+=`<br><span style="color:var(--text-tertiary)">Current stock: ${ex.qty} ${uk} @ ${p(ex.cost)}</span> → <strong style="color:var(--success)">WAC = ${p(wac)}/${uk}</strong>`;
    }
  }
  hint.innerHTML=hintHtml;
  // Margin hint for sell price field
  const sellPrice=parseFloat(document.getElementById('sp-'+key)?.value)||0;
  const marginEl=document.getElementById('sell-margin-'+key);
  if(marginEl&&sellPrice>0&&qty>0&&totalCost>0){
    const specA=parseFloat(document.getElementById('spu-'+key)?.value)||0;
    const costPerUnit=specA>0?totalCost/(qty*specA):totalCost/qty;
    const margin=Math.round((sellPrice-costPerUnit)/sellPrice*100);
    const profit=sellPrice-costPerUnit;
    marginEl.innerHTML=`Margin: <strong style="color:${margin>=0?'var(--success)':'var(--danger)'}">${margin}%</strong> · Profit per unit: <strong style="color:${profit>=0?'var(--success)':'var(--danger)'}">${p(profit)}</strong>`;
  } else if(marginEl){marginEl.textContent='';}
}

// dim: weight | volume | count
// toBase: conversion factor to base unit (g for weight, ml for volume, null=no standard)
const UNITS={
  // Weight — base: gram
  g:     {label:'grams (g)',       dim:'weight', toBase:1},
  kg:    {label:'kilograms (kg)',  dim:'weight', toBase:1000},
  mg:    {label:'milligrams (mg)', dim:'weight', toBase:0.001},
  oz:    {label:'ounces (oz)',     dim:'weight', toBase:28.3495},
  lb:    {label:'pounds (lb)',     dim:'weight', toBase:453.592},
  // Volume — base: ml
  ml:    {label:'milliliters (ml)',dim:'volume', toBase:1},
  L:     {label:'liters (L)',      dim:'volume', toBase:1000},
  tsp:   {label:'teaspoon (tsp)', dim:'volume', toBase:4.929},
  tbsp:  {label:'tablespoon (tbsp)',dim:'volume',toBase:14.787},
  cup:   {label:'cup',             dim:'volume', toBase:236.588},
  // Count — base: piece
  pc:    {label:'piece (pc)',      dim:'count',  toBase:1},
  sheet: {label:'sheet',           dim:'count',  toBase:1},
  unit:  {label:'unit',            dim:'count',  toBase:1},
  dozen: {label:'dozen',           dim:'count',  toBase:12},
  // Container/Pack — variable contents, user specifies
  ream:  {label:'ream',            dim:'pack',   toBase:null},
  box:   {label:'box',             dim:'pack',   toBase:null},
  pack:  {label:'pack',            dim:'pack',   toBase:null},
  bottle:{label:'bottle',          dim:'pack',   toBase:null},
  sack:  {label:'sack',            dim:'pack',   toBase:null},
  sachet:{label:'sachet',          dim:'pack',   toBase:null},
  bundle:{label:'bundle',          dim:'pack',   toBase:null},
  can:   {label:'can',             dim:'pack',   toBase:null},
  tray:  {label:'tray',            dim:'pack',   toBase:null},
  gallon:{label:'gallon',          dim:'pack',   toBase:null},
};
const UNIT_KEYS=Object.keys(UNITS);
// All possible base units user can specify inside a pack
const BASE_UNIT_OPTS=[
  {k:'pc',   l:'pieces'},
  {k:'sheet',l:'sheets'},
  {k:'g',    l:'grams (g)'},
  {k:'kg',   l:'kilograms (kg)'},
  {k:'mg',   l:'milligrams (mg)'},
  {k:'ml',   l:'milliliters (ml)'},
  {k:'L',    l:'liters (L)'},
  {k:'tsp',  l:'teaspoon (tsp)'},
  {k:'tbsp', l:'tablespoon (tbsp)'},
  {k:'cup',  l:'cup'},
  {k:'unit', l:'units'},
];

// Convert between measurable units (weight or volume only)
function convertUnit(qty,fromUnit,toUnit){
  const from=UNITS[fromUnit],to=UNITS[toUnit];
  if(!from||!to||from.dim!==to.dim)return null;
  if(from.dim==='pack'||from.dim==='count')return null;
  if(fromUnit===toUnit)return qty;
  return qty*(from.toBase||1)/(to.toBase||1);
}

// Get all usable units for a stock item in Customize modal
// Returns [{unit, costPerUnit, isBase}]
// Logic:
//   - Weight/volume stockUnit → full dimension family (auto-converts)
//   - Pack stockUnit with spec → stockUnit + specBaseUnit (+ specBaseUnit's dimension family if measurable)
//   - Count stockUnit → just that unit
//   - If item has specAmt + specBaseUnit → those are also stored
// Safe rounding — never rounds to zero, keeps full precision for tiny values
function safeRound(v){
  if(!v||v===0)return 0;
  const abs=Math.abs(v);
  // Find how many decimal places needed to show at least 2 significant digits
  if(abs>=0.01)return Math.round(v*100000)/100000;
  // Very small: use toPrecision(4) to avoid truncating to 0
  return parseFloat(v.toPrecision(4));
}

function getItemUnits(item){
  const result=[];
  const dim=UNITS[item.stockUnit]?.dim;
  const cost=item.cost||0;
  // cost storage rule (set by doAddStock):
  //   - weight/volume direct (no spec): cost per 1 stockUnit
  //   - weight/volume with spec: cost per 1 specBaseUnit (the smaller measured unit)
  //   - pack with spec: cost per 1 specBaseUnit (e.g. per sheet, per ml)
  //   - pack without spec: cost per 1 stockUnit (per bottle/ream etc.)
  //   - count: cost per 1 stockUnit

  if(dim==='weight'||dim==='volume'){
    // Stored cost is per 1 stockUnit (e.g. per kg, per ml)
    // If specAmt was provided (e.g. bought 3 bottles of ink, each 250ml, stored qty=750ml, cost=per ml)
    // — in that case stockUnit IS the base unit (ml), so just convert normally
    const stockToBase=UNITS[item.stockUnit]?.toBase||1;
    const costPerBase=cost/stockToBase; // cost per 1g or 1ml
    UNIT_KEYS.filter(k=>UNITS[k].dim===dim).forEach(k=>{
      const toBase=UNITS[k]?.toBase||1;
      result.push({unit:k, costPerUnit:safeRound(costPerBase*toBase), isBase:k===item.stockUnit});
    });

  } else if(dim==='pack'){
    if(item.specAmt&&item.specAmt>0&&item.specBaseUnit){
      // cost is stored per 1 specBaseUnit (e.g. ₱0.36/sheet)
      const costPerSpecUnit=cost;
      // stockUnit (ream) cost = costPerSpecUnit × specAmt (e.g. ₱0.36 × 500 = ₱180/ream)
      const costPerStockUnit=safeRound(costPerSpecUnit*item.specAmt);
      result.push({unit:item.stockUnit, costPerUnit:costPerStockUnit, isBase:true});

      const specDim=UNITS[item.specBaseUnit]?.dim;
      if(specDim==='weight'||specDim==='volume'){
        // Full dimension family from specBaseUnit
        const specToBase=UNITS[item.specBaseUnit]?.toBase||1;
        const costPerBase=costPerSpecUnit/specToBase; // cost per 1g or 1ml
        UNIT_KEYS.filter(k=>UNITS[k].dim===specDim).forEach(k=>{
          const toBase=UNITS[k]?.toBase||1;
          result.push({unit:k, costPerUnit:safeRound(costPerBase*toBase), isBase:false});
        });
      } else {
        // Count spec base (e.g. sheet) — just add that unit
        result.push({unit:item.specBaseUnit, costPerUnit:safeRound(costPerSpecUnit), isBase:false});
      }
    } else {
      // No spec — cost is per 1 stockUnit (bottle, ream, etc.)
      result.push({unit:item.stockUnit, costPerUnit:safeRound(cost), isBase:true});
    }

  } else {
    // Simple count — cost per 1 stockUnit
    result.push({unit:item.stockUnit, costPerUnit:safeRound(cost), isBase:true});
    // dozen: also show per-piece cost
    if(UNITS[item.stockUnit]?.toBase&&UNITS[item.stockUnit].toBase>1){
      result.push({unit:'pc', costPerUnit:safeRound(cost/UNITS[item.stockUnit].toBase), isBase:false});
    }
    // Custom spec on count (e.g. tray=30pc)
    if(item.specAmt&&item.specAmt>0&&item.specBaseUnit){
      result.push({unit:item.specBaseUnit, costPerUnit:safeRound(cost/item.specAmt), isBase:false});
    }
  }

  const seen=new Set();
  return result.filter(r=>{if(seen.has(r.unit))return false;seen.add(r.unit);return true;});
}

// Returns full unit list for Customize modal — always includes complete dimension family
// AND universal cooking units (tsp, tbsp, cup) for carenderia ONLY
function getFullUnitsForCustomize(item,bizKey){
  const base=getItemUnits(item);
  if(!base.length)return base;

  const dims=new Set(base.map(u=>UNITS[u.unit]?.dim).filter(Boolean));
  const existing=new Set(base.map(u=>u.unit));

  // Fill complete dimension family if weight or volume present
  if(dims.has('volume')){
    const refUnit=base.find(u=>UNITS[u.unit]?.dim==='volume'&&u.costPerUnit>0);
    if(refUnit){
      const costPerBase=refUnit.costPerUnit/(UNITS[refUnit.unit]?.toBase||1);
      UNIT_KEYS.filter(k=>UNITS[k].dim==='volume').forEach(k=>{
        if(!existing.has(k)){
          base.push({unit:k,costPerUnit:safeRound(costPerBase*(UNITS[k]?.toBase||1)),isBase:false});
          existing.add(k);
        }
      });
    }
  }
  if(dims.has('weight')){
    const refUnit=base.find(u=>UNITS[u.unit]?.dim==='weight'&&u.costPerUnit>0);
    if(refUnit){
      const costPerBase=refUnit.costPerUnit/(UNITS[refUnit.unit]?.toBase||1);
      UNIT_KEYS.filter(k=>UNITS[k].dim==='weight').forEach(k=>{
        if(!existing.has(k)){
          base.push({unit:k,costPerUnit:safeRound(costPerBase*(UNITS[k]?.toBase||1)),isBase:false});
          existing.add(k);
        }
      });
    }
  }

  // Universal cooking units — CARENDERIA ONLY
  if(bizKey==='carenderia'){
    const isVolume=dims.has('volume');
    const UNIVERSAL=[
      {unit:'tsp',  dryG:5,   liqMl:4.929  },
      {unit:'tbsp', dryG:15,  liqMl:14.787 },
      {unit:'cup',  dryG:240, liqMl:236.588},
    ];
    let costPerG=null,costPerMl=null;
    if(dims.has('weight')){const gUnit=base.find(u=>u.unit==='g');if(gUnit)costPerG=gUnit.costPerUnit;}
    if(dims.has('volume')){const mlUnit=base.find(u=>u.unit==='ml');if(mlUnit)costPerMl=mlUnit.costPerUnit;}
    if(costPerG===null&&costPerMl===null)costPerG=item.cost||0;
    UNIVERSAL.forEach(({unit,dryG,liqMl})=>{
      if(existing.has(unit))return;
      const costPerUnit=isVolume&&costPerMl!=null?safeRound(costPerMl*liqMl):safeRound((costPerG||0)*dryG);
      base.push({unit,costPerUnit,isBase:false});
      existing.add(unit);
    });
  }

  return base;
}

const PERISHABLE_BIZ=['carenderia'];
// Per-unit: deduct from stock each time a unit is sold
const PERUNIT_BIZ=['xerox'];
// Which businesses show the Customize button
const CUSTOMIZE_BIZ=[...PERISHABLE_BIZ,...PERUNIT_BIZ];

function isCustomizeBiz(key){return CUSTOMIZE_BIZ.includes(key);}
function isPerishable(key){return PERISHABLE_BIZ.includes(key);}

// Deduct recipe ingredients from BIZ_STOCKS[key]
// multiplier = how many units sold (xerox) or 1 batch (carenderia)
function deductRecipe(key,recipe,multiplier){
  if(!recipe||!recipe.length)return;
  const stk=BIZ_STOCKS[key]||[];
  recipe.forEach(ing=>{
    const item=stk.find(s=>s.id===ing.stockId);
    if(!item)return;
    const ku=getItemUnits(item);
    const kuEntry=ku.find(u=>u.unit===ing.useUnit)||ku[0];
    if(!kuEntry)return;
    // Convert costPerUnit back to qty in stockUnit to deduct
    // costPerUnit = item.cost / perStockUnit equivalent
    // deduct in stockUnit = ing.qty * multiplier * (costPerUnit / item.cost) ... 
    // Simpler: find how many stockUnits 1 useUnit represents
    const costPerStockUnit=item.cost; // cost per 1 stockUnit
    const costPerUseUnit=kuEntry.costPerUnit;
    // 1 useUnit = costPerUseUnit/costPerStockUnit stockUnits
    const useToStock=costPerStockUnit>0?costPerUseUnit/costPerStockUnit:1;
    const deductQty=ing.qty*multiplier*useToStock;
    item.qty=Math.max(0,Math.round((item.qty-deductQty)*100000)/100000);
  });
}

      ).join('');

      return`<div class="cr">
        <div style="flex:1;min-width:0">
          <div class="crn">${s.name}</div>
          <div style="font-size:10px;color:var(--text-tertiary)">${cpuDisplay}/${useUnit}${useQty>0?` · <strong style="color:var(--accent)">${p(rowCost)}</strong>`:''}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0">
          <div class="qw">
            <button class="qb" onclick="custAdj('${key}',${prodId},${s.id},-1)">−</button>
            <input class="qni" type="number" min="0" step="0.001" value="${useQty||''}" placeholder="0"
              onchange="custSet('${key}',${prodId},${s.id},this.value)" style="width:44px">
            <button class="qb" onclick="custAdj('${key}',${prodId},${s.id},1)">+</button>
          </div>
          ${ku.length>1
            ?`<select style="font-size:10px;padding:2px 4px;border-radius:5px;border:0.5px solid var(--border-primary);background:var(--bg-secondary);color:var(--text-secondary);font-family:inherit;cursor:pointer"
                onchange="custUnitChange('${key}',${prodId},${s.id},this.value)">${unitOpts}</select>`
            :`<span style="font-size:10px;color:var(--text-tertiary)">${useUnit}</span>`
          }
        </div>
        <span class="crp" style="min-width:44px;align-self:center">${useQty>0?p(rowCost):''}</span>
      </div>`;
    }).join('');

  // Total estimated cost using knownUnits costPerUnit
  let totalEst=0;
  Object.values(custCart).forEach(r=>{
    const item=stk.find(s=>s.id===r.stockId);
    if(!item)return;
    const ku=getItemUnits(item);
    const kuEntry=ku.find(u=>u.unit===r.useUnit)||ku[0];
    totalEst+=r.qty*(kuEntry?.costPerUnit||0);
  });
  const usedCount=Object.values(custCart).filter(r=>r.qty>0).length;

  const estLine=usedCount>0
    ?`<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0 2px;border-top:0.5px solid var(--border-secondary);margin-top:2px">
        <span style="font-size:11px;color:var(--text-secondary)">${usedCount} ingredient${usedCount!==1?'s':''}</span>
        <span style="font-size:14px;font-weight:700;color:var(--text-primary)">Est. cost: ${p(totalEst)}</span>
      </div>`:'' ;

  const yieldNote=isPerish
    ?`<div class="yield-row" style="margin-top:6px"><span class="yield-label">🍳 Servings this batch makes <span style="color:var(--text-tertiary);font-size:10px">(optional)</span></span><input type="number" class="yield-inp" id="batch-yield" min="1" value="${prod.batchYield||1}"></div>
      <div class="wn" style="margin-top:4px">⚠️ Stock deducts <strong>immediately</strong> on save.</div>`
    :`<div class="wn" style="margin-top:6px">🖨️ Stock deducts <strong>per unit sold</strong> at checkout.</div>`;

  const html=`<div class="modal-t">⚙️ Customize — ${prod.name||'New Product'}</div>
    <div style="font-size:10px;color:var(--text-tertiary);margin-bottom:8px">Set qty per unit. Unit options come from how you stocked each item. Cost auto-calculates.</div>
    <div class="cb" id="cust-ing-list" style="padding:4px 12px;max-height:220px;overflow-y:auto">${ingRows}</div>
    ${estLine}${yieldNote}
    <div class="mbtnrow" style="margin-top:8px">
      <button class="btn-c" onclick="rmModal()">Cancel</button>
      <button class="btn-s" onclick="saveCustomize('${key}',${prodId})">✓ Save Recipe</button>
    </div>`;

  const existingModal=document.getElementById('_modal');
  // Save scroll position before re-render
  const prevScroll=document.getElementById('cust-ing-list')?.scrollTop||0;
  if(existingModal){existingModal.querySelector('.modal').innerHTML=html;}
  else{modal(html);}
  // Restore scroll after re-render
  const ingList=document.getElementById('cust-ing-list');
  if(ingList)ingList.scrollTop=prevScroll;
}

function custAdj(key,prodId,stockId,d){
  const stk=BIZ_STOCKS[key]||[];
  const item=stk.find(s=>s.id===stockId);
  if(!item)return;
  const ku=getItemUnits(item);
  const useUnit=custCart[stockId]?.useUnit||(ku[0]?.unit||item.stockUnit||'pc');
  const cur=custCart[stockId]?.qty||0;
  const next=Math.max(0,Math.round((cur+d)*1000)/1000);
  if(next===0){delete custCart[stockId];}
  else{custCart[stockId]={stockId,stockName:item.name,qty:next,useUnit};}
  renderCustomizeModal(key,prodId);
}

function custSet(key,prodId,stockId,val){
  const stk=BIZ_STOCKS[key]||[];
  const item=stk.find(s=>s.id===stockId);
  if(!item)return;
  const qty=parseFloat(val)||0;
  const ku=getItemUnits(item);
  const useUnit=custCart[stockId]?.useUnit||(ku[0]?.unit||item.stockUnit||'pc');
  if(qty<=0){delete custCart[stockId];}
  else{custCart[stockId]={stockId,stockName:item.name,qty,useUnit};}
}

function custUnitChange(key,prodId,stockId,newUnit){
  const stk=BIZ_STOCKS[key]||[];
  const item=stk.find(s=>s.id===stockId);
  if(!item)return;
  if(custCart[stockId]){custCart[stockId].useUnit=newUnit;}
  else{custCart[stockId]={stockId,stockName:item.name,qty:0,useUnit:newUnit};}
  renderCustomizeModal(key,prodId);
}

function saveCustomize(key,prodId){
  initBizData(key);
  const prods=BIZ_PRODUCTS[key]||[];
  const stk=BIZ_STOCKS[key]||[];
  const prod=prods.find(x=>x.id===prodId);
  if(!prod)return;
  const recipe=Object.values(custCart).filter(r=>r.qty>0);
  const batchYield=parseInt(document.getElementById('batch-yield')?.value)||1;
  // Est cost using knownUnits costPerUnit
  const estCost=recipe.reduce((sum,ing)=>{
    const item=stk.find(s=>s.id===ing.stockId);
    if(!item)return sum;
    const ku=getItemUnits(item);
    const kuEntry=ku.find(u=>u.unit===ing.useUnit)||ku[0];
    return sum+ing.qty*(kuEntry?.costPerUnit||0);
  },0);
  prod.recipe=recipe;
  prod.batchYield=batchYield;
  if(recipe.length>0){
    prod.cost=isPerishable(key)
      ?(batchYield>0?Math.round((estCost/batchYield)*100)/100:estCost)
      :Math.round(estCost*100)/100;
  }
  if(isPerishable(key)&&recipe.length>0){
    deductRecipe(key,recipe,1);
    rmModal();render();
    setTimeout(()=>toast(`Recipe saved — batch deducted from stock ✓`),50);
  } else {
    rmModal();render();
    setTimeout(()=>toast(`Recipe saved for "${prod.name}" ✓`),50);
  }
  custCart={};
}

// ── Waste / Error Tracker (Xerox only) ──────────────────────────
function openWasteModal(key){
  initBizData(key);
