function renderWasteModal(key,selectedProdId,wasteQty){
  initBizData(key);
  const prods=BIZ_PRODUCTS[key]||[]; // ALL products
  const stk=BIZ_STOCKS[key]||[];
  const logs=(BIZ_WASTELOGS[key]||[]).slice().reverse().slice(0,5);
  const selProd=selectedProdId?prods.find(pr=>pr.id===selectedProdId):null;
  const hasRecipe=selProd&&selProd.recipe&&selProd.recipe.length>0;

  // Product selector rows — all products
  const prodRows=prods.map(pr=>{
    const hasR=pr.recipe&&pr.recipe.length>0;
    return`<div class="cr" style="cursor:pointer;${pr.id===selectedProdId?'background:var(--accent-light);border-radius:6px;':''}"
      onclick="renderWasteModal('${key}',${pr.id},${pr.id===selectedProdId?wasteQty:0})">
      <div style="flex:1">
        <div class="crn">${pr.name}</div>
        <div style="font-size:10px;color:var(--text-tertiary)">${hasR?`⚙️ ${pr.recipe.map(r=>r.stockName+'×'+r.qty+r.useUnit).join(', ')}`:'No recipe — log only'}</div>
      </div>
      ${pr.id===selectedProdId?'<span style="color:var(--accent);font-size:14px">✓</span>':''}
    </div>`;
  }).join('');

  // Deduction preview — only if product has recipe
  let preview='';
  if(selProd&&wasteQty>0){
    if(hasRecipe){
      const lines=selProd.recipe.map(r=>{
        const item=stk.find(s=>s.id===r.stockId);
        const ku=getItemUnits(item||{});
        const kuEntry=ku.find(u=>u.unit===r.useUnit)||ku[0];
        const totalDeduct=r.qty*wasteQty;
        const costDeduct=kuEntry?totalDeduct*(kuEntry.costPerUnit||0):0;
        return`<div style="display:flex;justify-content:space-between;font-size:11px;padding:3px 0;border-bottom:0.5px solid var(--border-tertiary)">
          <span style="color:var(--text-secondary)">${r.stockName}</span>
          <span style="color:var(--danger);font-weight:600">−${totalDeduct} ${r.useUnit} <span style="color:var(--text-tertiary);font-weight:400">(~${p(costDeduct)})</span></span>
        </div>`;
      }).join('');
      const totalCostLost=selProd.recipe.reduce((sum,r)=>{
        const item=stk.find(s=>s.id===r.stockId);
        const ku=getItemUnits(item||{});
        const kuEntry=ku.find(u=>u.unit===r.useUnit)||ku[0];
        return sum+(kuEntry?(r.qty*wasteQty*(kuEntry.costPerUnit||0)):0);
      },0);
      preview=`<div style="margin-top:8px;background:var(--danger-light);border:0.5px solid var(--danger);border-radius:var(--radius-sm);padding:8px 10px">
        <div style="font-size:10px;font-weight:700;color:var(--danger);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em">📉 Will deduct from inventory:</div>
        ${lines}
        <div style="display:flex;justify-content:space-between;margin-top:5px;font-size:11px;font-weight:700">
          <span style="color:var(--text-secondary)">Total material cost lost</span>
          <span style="color:var(--danger)">${p(totalCostLost)}</span>
        </div>
      </div>`;
    } else {
      // No recipe — log only notice
      preview=`<div style="margin-top:8px;background:var(--warning-light);border:0.5px solid var(--warning);border-radius:var(--radius-sm);padding:8px 10px;font-size:11px;color:var(--text-secondary)">
        📋 No recipe set for this product — waste will be <strong>logged only</strong>. No inventory deduction.
        <br><span style="font-size:10px;color:var(--text-tertiary)">Use ⚙️ Customize in Pricing tab to link ingredients.</span>
      </div>`;
    }
  }

  // Recent waste log
  const logHtml=logs.length?`<div style="margin-top:8px"><div style="font-size:10px;font-weight:700;color:var(--text-tertiary);text-transform:uppercase;margin-bottom:4px">Recent Waste Log</div>${logs.map(l=>`<div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text-tertiary);padding:2px 0"><span>${l.prodName} ×${l.qty}${l.deducted?' 📉':' 📋'}</span><span>${l.time}</span></div>`).join('')}</div>`:'';

  const html=`<div class="modal-t">🗑️ Record Waste / Error</div>
    <div style="font-size:10px;color:var(--text-tertiary);margin-bottom:8px">Select any product with defects or errors. Products with recipes will also deduct inventory.</div>
    <div style="font-size:10px;font-weight:700;color:var(--text-tertiary);text-transform:uppercase;margin-bottom:4px">Select Product</div>
    <div class="cb" style="padding:4px 12px;max-height:140px;overflow-y:auto;margin-bottom:8px">${prodRows}</div>
    ${selProd?`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
      <div style="font-size:12px;font-weight:600;color:var(--text-primary);flex:1">Quantity wasted / defective:</div>
      <div class="qw">
        <button class="qb" onclick="renderWasteModal('${key}',${selectedProdId},Math.max(0,${wasteQty}-1))">−</button>
        <input class="qni" type="number" min="0" value="${wasteQty}" onchange="renderWasteModal('${key}',${selectedProdId},parseInt(this.value)||0)" style="width:50px">
        <button class="qb" onclick="renderWasteModal('${key}',${selectedProdId},${wasteQty}+1)">+</button>
      </div>
    </div>${preview}`:'<div style="font-size:11px;color:var(--text-tertiary);text-align:center;padding:8px 0">← Select a product above</div>'}
    ${logHtml}
    <div class="mbtnrow" style="margin-top:10px">
      <button class="btn-c" onclick="rmModal()">Cancel</button>
      <button class="btn-s" style="background:var(--danger)" ${!selProd||wasteQty<=0?'disabled':''} onclick="recordWaste('${key}',${selectedProdId||0},${wasteQty})">🗑️ Record Waste</button>
    </div>`;

  const existingModal=document.getElementById('_modal');
  if(existingModal){existingModal.querySelector('.modal').innerHTML=html;}
  else{modal(html);}
}

function recordWaste(key,prodId,qty){
  if(!qty||qty<=0)return;
  initBizData(key);
  const prods=BIZ_PRODUCTS[key]||[];
  const prod=prods.find(p=>p.id===prodId);
  if(!prod)return;
  const hasRecipe=prod.recipe&&prod.recipe.length>0;
  // Deduct inventory only if recipe exists
  if(hasRecipe){
    const batchYield=prod.batchYield||1;
    deductRecipe(key,prod.recipe,qty/batchYield);
  }
  // Always log the waste
  if(!BIZ_WASTELOGS[key])BIZ_WASTELOGS[key]=[];
  BIZ_WASTELOGS[key].push({prodName:prod.name,qty,time:ts(),deducted:hasRecipe});
  rmModal();saveData();render();
  const msg=hasRecipe
    ?`Waste recorded — ${prod.name} ×${qty} · inventory deducted ✓`
    :`Waste recorded — ${prod.name} ×${qty} · logged only ✓`;
  setTimeout(()=>toast(msg,'err'),50);
}

// Variants-only modal — clean, focused UI just for adding variants
// variantCarts[prodId][variantIdx] = {stockId: {stockId,stockName,qty,useUnit}, ...}
let variantCarts={};

function openVariantsOnly(key,prodId){
  initBizData(key);
  const prods=BIZ_PRODUCTS[key]||[];
  const prod=prods.find(x=>x.id===prodId);
  if(!prod)return;
  // Seed tempVariants
  tempVariants[prodId]=prod.variants?JSON.parse(JSON.stringify(prod.variants)):[];
  // Reset expanded state — fresh open
  variantExpandedSet[prodId]=new Set();
  // Seed variantCarts from saved variant recipes
  variantCarts[prodId]={};
  (tempVariants[prodId]||[]).forEach((v,i)=>{
    variantCarts[prodId][i]={};
    (v.recipe||[]).forEach(r=>{variantCarts[prodId][i][r.stockId]={...r};});
  });
  renderVariantsModal(key,prodId);
}

function buildVariantIngRows(key,prodId,vi){
  const stk=BIZ_STOCKS[key]||[];
  if(!variantCarts[prodId])variantCarts[prodId]={};
  if(!variantCarts[prodId][vi])variantCarts[prodId][vi]={};
  const vc=variantCarts[prodId][vi];

  if(!stk.length) return`<div style="font-size:11px;color:var(--text-tertiary);padding:8px 0;text-align:center">No stock items yet. Add stock first.</div>`;

  // Deduplicate by name
  const seenNames=new Set();const uniqueStk=[];
  stk.forEach(s=>{const n=s.name.toLowerCase();if(!seenNames.has(n)){seenNames.add(n);uniqueStk.push(getStockSummary(key,s.name));}});

  // Sort: in-stock first, out last
  const sorted=[...uniqueStk].sort((a,b)=>{
    const ord=s=>{const q=s.specAmt>0?Math.round(s.qty*s.specAmt*1000)/1000:Math.floor(s.qty);return q<=0?2:s.low>0&&q<=s.low?1:0;};
    return ord(a)-ord(b);
  });

  return sorted.map((s,idx)=>{
    // getFullUnitsForCustomize needs a raw stock batch, not a summary
    const rawBatch=stk.find(b=>b.name.toLowerCase()===s.name.toLowerCase())||s;
    const ku=getFullUnitsForCustomize(rawBatch,key);
    const inVC=vc[s.id]||vc[rawBatch.id];
    const useUnit=inVC?.useUnit||(ku[0]?.unit||rawBatch.stockUnit||'pc');
    const useQty=inVC?.qty||0;
    const kuEntry=ku.find(u=>u.unit===useUnit)||ku[0];
    const cpuDisplay=p(kuEntry?.costPerUnit||0);
    const rowCost=useQty>0?useQty*(kuEntry?.costPerUnit||0):0;
    const unitOpts=ku.map(u=>`<option value="${u.unit}"${u.unit===useUnit?' selected':''}>${u.unit} (${p(u.costPerUnit)}/${u.unit})</option>`).join('');

    // Stock badge
    const specAmt=s.specAmt||0;
    const specBaseUnit=(s.specBaseUnit||'').toLowerCase();
    const useUnitLow=useUnit.toLowerCase();
    let availQty;
    if(specAmt>0&&specBaseUnit&&useUnitLow===specBaseUnit){availQty=Math.round(s.qty*specAmt*1000)/1000;}
    else{availQty=Math.floor(s.qty);}
    const isOut=availQty<=0;
    const isLow=!isOut&&s.low>0&&availQty<=s.low;
    const stockBadge=isOut
      ?`<span style="font-size:9px;font-weight:700;color:var(--danger);margin-left:4px">Out of stock</span>`
      :isLow?`<span style="font-size:9px;font-weight:700;color:var(--warning);margin-left:4px">Low: ${availQty}</span>`
      :`<span style="font-size:9px;color:var(--accent);margin-left:4px">${availQty} ${s.specBaseUnit||s.stockUnit||'unit'}</span>`;

    // Group dividers
    const ord=x=>{const q=x.specAmt>0?Math.round(x.qty*x.specAmt*1000)/1000:Math.floor(x.qty);return q<=0?2:x.low>0&&q<=x.low?1:0;};
    const thisG=ord(s);const prevG=idx>0?ord(sorted[idx-1]):thisG;
    let divider='';
    if(idx===0&&thisG===0)divider=`<div style="font-size:9px;font-weight:700;color:var(--success);text-transform:uppercase;letter-spacing:.07em;padding:4px 2px 2px">✅ In Stock</div>`;
    else if(idx===0&&thisG===2)divider=`<div style="font-size:9px;font-weight:700;color:var(--danger);text-transform:uppercase;letter-spacing:.07em;padding:4px 2px 2px">❌ Out of Stock</div>`;
    else if(thisG!==prevG){
      if(thisG===1)divider=`<div style="font-size:9px;font-weight:700;color:var(--warning);text-transform:uppercase;letter-spacing:.07em;padding:8px 2px 2px;border-top:0.5px solid var(--border-secondary);margin-top:4px">⚠️ Low Stock</div>`;
      if(thisG===2)divider=`<div style="font-size:9px;font-weight:700;color:var(--danger);text-transform:uppercase;letter-spacing:.07em;padding:8px 2px 2px;border-top:0.5px solid var(--border-secondary);margin-top:4px">❌ Out of Stock</div>`;
    }

    return divider+`<div class="cr" style="${isOut?'opacity:0.4;pointer-events:none;filter:grayscale(0.5)':''}">
      <div style="flex:1;min-width:0">
        <div class="crn" style="display:flex;align-items:center;flex-wrap:wrap;gap:2px">${s.name}${stockBadge}</div>
        <div style="font-size:10px;color:var(--text-tertiary)">${cpuDisplay}/${useUnit}${useQty>0?` · <strong style="color:var(--accent)">${p(rowCost)}</strong>`:''}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0">
        <div class="qw">
          <button class="qb" onclick="vAdj('${key}',${prodId},${vi},${rawBatch.id},-1)">−</button>
          <input class="qni" type="number" min="0" step="0.001" value="${useQty||''}" placeholder="0"
            id="vi-${prodId}-${vi}-${rawBatch.id}"
            oninput="vSave('${key}',${prodId},${vi},${rawBatch.id},this.value)"
            onblur="vSet('${key}',${prodId},${vi},${rawBatch.id},this.value)" style="width:44px">
          <button class="qb" onclick="vAdj('${key}',${prodId},${vi},${rawBatch.id},1)">+</button>
        </div>
        ${ku.length>1
          ?`<select style="font-size:10px;padding:2px 4px;border-radius:5px;border:0.5px solid var(--border-primary);background:var(--bg-secondary);color:var(--text-secondary);font-family:inherit;cursor:pointer"
              onchange="vUnitChange('${key}',${prodId},${vi},${rawBatch.id},this.value)">${unitOpts}</select>`
          :`<span style="font-size:10px;color:var(--text-tertiary)">${useUnit}</span>`
        }
      </div>
      <span class="crp" style="min-width:44px;align-self:center">${useQty>0?p(rowCost):''}</span>
    </div>`;
  }).join('');
}

function patchVariantCostSummary(prodId,vi,key){
  // Update only the cost summary span — no full re-render, scroll preserved
  const el=document.getElementById('vc-summary-'+prodId+'-'+vi);
  if(!el)return;
  const stk=BIZ_STOCKS[key]||[];
  const vc=variantCarts[prodId]?.[vi]||{};
  const usedCount=Object.values(vc).filter(r=>r.qty>0).length;
  let totalCost=0;
  Object.values(vc).forEach(r=>{
    const item=stk.find(s=>s.id===r.stockId);if(!item)return;
    const ku=getItemUnits(item);const ke=ku.find(u=>u.unit===r.useUnit)||ku[0];
    totalCost+=r.qty*(ke?.costPerUnit||0);
  });
  el.style.display=usedCount>0?'':'none';
  el.textContent=usedCount>0?usedCount+' item'+(usedCount!==1?'s':'')+' · '+p(totalCost):'';
}

function vAdj(key,prodId,vi,stockId,d){
  const stk=BIZ_STOCKS[key]||[];
  const item=stk.find(s=>s.id===stockId);
  if(!item)return;
  if(!variantCarts[prodId])variantCarts[prodId]={};
  if(!variantCarts[prodId][vi])variantCarts[prodId][vi]={};
  const vc=variantCarts[prodId][vi];
  const ku=getItemUnits(item);
  const useUnit=vc[stockId]?.useUnit||(ku[0]?.unit||item.stockUnit||'pc');
  const cur=vc[stockId]?.qty||0;
  const next=Math.max(0,Math.round((cur+d)*1000)/1000);
  if(next===0){delete vc[stockId];}
  else{vc[stockId]={stockId,stockName:item.name,qty:next,useUnit};}
  // Update only the affected input — no full re-render, scroll position preserved
  const inputEl=document.getElementById('vi-'+prodId+'-'+vi+'-'+stockId);
  if(inputEl){
    inputEl.value=next||0;
    patchVariantCostSummary(prodId,vi,key);
  } else {
    renderVariantsModal(key,prodId,vi);
  }
}

function vSave(key,prodId,vi,stockId,val){
  const stk=BIZ_STOCKS[key]||[];
  const item=stk.find(s=>s.id===stockId);
  if(!item)return;
  if(!variantCarts[prodId])variantCarts[prodId]={};
  if(!variantCarts[prodId][vi])variantCarts[prodId][vi]={};
  const vc=variantCarts[prodId][vi];
  const qty=parseFloat(val)||0;
  const ku=getItemUnits(item);
  const useUnit=vc[stockId]?.useUnit||(ku[0]?.unit||item.stockUnit||'pc');
  if(qty<=0){delete vc[stockId];}else{vc[stockId]={stockId,stockName:item.name,qty,useUnit};}
}

function vSet(key,prodId,vi,stockId,val){
  const stk=BIZ_STOCKS[key]||[];
  const item=stk.find(s=>s.id===stockId);
  if(!item)return;
  if(!variantCarts[prodId])variantCarts[prodId]={};
  if(!variantCarts[prodId][vi])variantCarts[prodId][vi]={};
  const vc=variantCarts[prodId][vi];
  const qty=parseFloat(val)||0;
  const ku=getItemUnits(item);
  const useUnit=vc[stockId]?.useUnit||(ku[0]?.unit||item.stockUnit||'pc');
  if(qty<=0){delete vc[stockId];}else{vc[stockId]={stockId,stockName:item.name,qty,useUnit};}
  // Update cost summary only — no full re-render, scroll position preserved
  patchVariantCostSummary(prodId,vi,key);
}

function vUnitChange(key,prodId,vi,stockId,newUnit){
  const stk=BIZ_STOCKS[key]||[];
  const item=stk.find(s=>s.id===stockId);
  if(!item)return;
  if(!variantCarts[prodId])variantCarts[prodId]={};
  if(!variantCarts[prodId][vi])variantCarts[prodId][vi]={};
  const vc=variantCarts[prodId][vi];
  if(vc[stockId]){vc[stockId].useUnit=newUnit;}
  else{vc[stockId]={stockId,stockName:item.name,qty:0,useUnit:newUnit};}
  // Update cost summary only — no full re-render, scroll position preserved
  patchVariantCostSummary(prodId,vi,key);
}

// Track which variant indices are expanded per product — persists during modal session
const variantExpandedSet={};

function toggleVariantExpand(prodId,i){
  if(!variantExpandedSet[prodId])variantExpandedSet[prodId]=new Set();
  if(variantExpandedSet[prodId].has(i))variantExpandedSet[prodId].delete(i);
  else variantExpandedSet[prodId].add(i);
  // Need full re-render since collapsed header is conditionally rendered
  const modal=document.getElementById('_modal');
  if(!modal)return;
  // Find the key from the save button onclick
  const saveBtn=modal.querySelector('[onclick*="saveVariantsOnly"]');
  if(!saveBtn)return;
  const match=saveBtn.getAttribute('onclick').match(/saveVariantsOnly\('([^']+)',(\d+)\)/);
  if(!match)return;
  const key=match[1];const pId=parseInt(match[2]);
  renderVariantsModal(key,pId,null);
}

function renderVariantsModal(key,prodId,activeVi){
  const prods=BIZ_PRODUCTS[key]||[];
  const prod=prods.find(x=>x.id===prodId);
  if(!prod){rmModal();return;}
  const variants=tempVariants[prodId]||[];

  // Initialize expanded set — auto-open first only on fresh open (activeVi===undefined)
  if(!variantExpandedSet[prodId])variantExpandedSet[prodId]=new Set();
  if(variants.length>0&&variantExpandedSet[prodId].size===0&&activeVi===undefined){
    variantExpandedSet[prodId].add(0);
  }

  const rows=variants.length===0
    ?`<div style="text-align:center;padding:20px 0;font-size:12px;color:var(--text-tertiary)">No variants yet — tap ＋ Add Variant below.</div>`
    :variants.map((v,i)=>{
      const isOpen=variantExpandedSet[prodId].has(i);
      const ingRows=buildVariantIngRows(key,prodId,i);
      const vc=variantCarts[prodId]?.[i]||{};
      const usedCount=Object.values(vc).filter(r=>r.qty>0).length;
      const stk=BIZ_STOCKS[key]||[];
      let totalCost=0;
      Object.values(vc).forEach(r=>{
        const item=stk.find(s=>s.id===r.stockId);if(!item)return;
        const ku=getItemUnits(item);const ke=ku.find(u=>u.unit===r.useUnit)||ku[0];
        totalCost+=r.qty*(ke?.costPerUnit||0);
      });
      const costHint=usedCount>0?` · ${usedCount} item${usedCount!==1?'s':''} · ${p(totalCost)}`:'';
      return`<div style="background:var(--bg-secondary);border:1px solid var(--border-primary);border-radius:var(--radius-sm);margin-bottom:6px;overflow:hidden">
        <!-- Collapsed header — only visible when closed -->
        ${!isOpen?`<div onclick="toggleVariantExpand(${prodId},${i})"
          style="display:flex;align-items:center;gap:6px;padding:10px 12px;cursor:pointer;user-select:none">
          <div style="flex:1;min-width:0">
            <div style="font-size:12px;font-weight:700;color:var(--text-primary)">${v.name||'(unnamed)'}</div>
            <div style="font-size:10px;color:var(--text-tertiary)">${v.priceAdj?'₱'+v.priceAdj:'No price set'}${costHint}</div>
          </div>
          <span style="font-size:10px;color:var(--text-tertiary);flex-shrink:0">▼</span>
        </div>`:''}
        <!-- Expanded body — visible when open -->
        <div id="vbody-${prodId}-${i}" style="display:${isOpen?'block':'none'}">
          <!-- Sticky header — name + price + cost summary + buttons -->
          <div style="position:sticky;top:0;z-index:1;background:var(--bg-secondary);padding:10px 12px 8px;border-bottom:0.5px solid var(--border-secondary)">
            <div style="display:flex;align-items:center;gap:6px">
              <input class="inp" placeholder="Variant name (e.g. Short, A4, Long)" value="${v.name||''}"
                style="flex:1;font-size:12px;font-weight:600;padding:5px 8px;margin-bottom:0"
                oninput="updateVariantField('${key}',${prodId},${i},'name',this.value)">
              <input class="inp" placeholder="₱ Price" type="number" value="${v.priceAdj||''}"
                style="width:68px;font-size:12px;padding:5px 7px;margin-bottom:0;text-align:right"
                title="Sell price for this variant"
                oninput="updateVariantField('${key}',${prodId},${i},'priceAdj',this.value)">
              <span id="vc-summary-${prodId}-${i}" style="font-size:10px;font-weight:700;color:var(--accent);white-space:nowrap;flex-shrink:0">${usedCount>0?usedCount+' item'+(usedCount!==1?'s':'')+' · '+p(totalCost):''}</span>
              <button onclick="toggleVariantExpand(${prodId},${i})"
                style="background:none;border:none;cursor:pointer;color:var(--text-tertiary);font-size:12px;padding:0 2px;flex-shrink:0" title="Collapse">▲</button>
              <button onclick="event.stopPropagation();removeVariantRow('${key}',${prodId},${i});variantExpandedSet[${prodId}]&&variantExpandedSet[${prodId}].delete(${i});renderVariantsModal('${key}',${prodId})"
                style="background:none;border:none;cursor:pointer;color:var(--danger);font-size:14px;padding:0 2px;flex-shrink:0">✕</button>
            </div>
          </div>
          <!-- Scrollable stock rows -->
          <div style="max-height:220px;overflow-y:auto;padding:8px 12px">
            <div style="font-size:9px;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">Stock to deduct per sale</div>
            ${ingRows}
          </div>
        </div>
      </div>`;
    }).join('');

  const modeNote=variants.length===1
    ?`<div style="font-size:10px;color:var(--success);background:var(--success-light,#f0fdf4);border-radius:6px;padding:5px 10px;margin-bottom:8px">✅ Single entry — tapping this sell card adds directly to cart (no popup).</div>`
    :variants.length>1
    ?`<div style="font-size:10px;color:var(--accent);background:var(--accent-light);border-radius:6px;padding:5px 10px;margin-bottom:8px">⚡ Multiple variants — customer picks one at checkout.</div>`
    :'';

  const html=`<div class="modal-t">⚙️ Customize — ${prod.name}</div>
    <div style="font-size:10px;color:var(--text-tertiary);margin-bottom:8px">Set a name, price, and stock link per entry. 1 entry = direct add to cart. 2+ = customer picks at checkout.</div>
    ${modeNote}
    <div id="variant-modal-rows" style="max-height:400px;overflow-y:auto;padding-right:2px">${rows}</div>
    <button onclick="addVariantRow('${key}',${prodId});renderVariantsModal('${key}',${prodId},null)"
      style="width:100%;padding:9px;border-radius:var(--radius-sm);border:1.5px dashed var(--accent);background:var(--accent-light);color:var(--accent);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:6px;margin-bottom:10px">
      ＋ Add Variant
    </button>
    <div style="font-size:10px;color:var(--text-tertiary);margin-bottom:8px;font-style:italic">🖨️ Stock deducts per unit sold at checkout.</div>
    <div class="mbtnrow">
      <button class="btn-c" onclick="rmModal()">Cancel</button>
      <button class="btn-s" onclick="saveVariantsOnly('${key}',${prodId})">✓ Save</button>
    </div>`;

  const existingModal=document.getElementById('_modal');
  if(existingModal){existingModal.querySelector('.modal').innerHTML=html;}
  else{modal(html);}
}

function saveVariantsOnly(key,prodId){
  const prods=BIZ_PRODUCTS[key]||[];
  const prod=prods.find(x=>x.id===prodId);
  if(!prod)return;
  const variants=(tempVariants[prodId]||[]).filter(v=>v.name&&v.name.trim());
  if(!variants.length){toast('Add at least one entry name','err');return;}
  // Attach each variant's recipe from variantCarts
  variants.forEach((v,i)=>{
    const vc=variantCarts[prodId]?.[i]||{};
    v.recipe=Object.values(vc).filter(r=>r.qty>0);
  });
  prod.variants=variants;
  // If single entry, set prod.price directly from that entry's price
  if(variants.length===1&&variants[0].priceAdj){
    const p1=parseFloat(variants[0].priceAdj);
    if(!isNaN(p1)&&p1>0)prod.price=p1;
  }
  tempVariants[prodId]=null;
  variantCarts[prodId]=null;
  saveData();rmModal();render();
  setTimeout(()=>toast(`Saved for "${prod.name}" ✓`),50);
}

// ── Custom unit dropdown state ────────────────────────────────
let pinnedUnits=[]; // persists during session
let stockUnitSel={}; // selected unit per biz key: stockUnitSel[key]='kg'
let stockUnitLocked={}; // {key:{stockUnit:'ream',specBaseUnit:'sheet'}} when locked, null when free

function getSelectedUnit(key){return stockUnitSel[key]||'pc';}

function buildUnitDropdown(key){
  const sel=getSelectedUnit(key);
  const selLabel=UNITS[sel]?.label||sel;
  return`<div class="udd-wrap" id="udd-wrap-${key}">
    <div class="udd-trigger" id="udd-trigger-${key}" onclick="toggleUDD('${key}')">
      <span id="udd-label-${key}">${selLabel}</span>
      <span class="udd-lock-toggle" id="udd-lock-toggle-${key}" onclick="event.stopPropagation();toggleUDDLock('${key}')" title="Lock/unlock unit">
        <span class="udd-lock-sw" id="udd-lock-sw-${key}"><span class="udd-lock-knob"></span></span>
      </span>
    </div>
    <div class="udd-panel" id="udd-panel-${key}" style="display:none">
      <div class="udd-search">
        <input id="udd-search-${key}" placeholder="Search unit..." oninput="renderUDDList('${key}',this.value)" onclick="event.stopPropagation()">
      </div>
      <div class="udd-list" id="udd-list-${key}"></div>
    </div>
  </div>`;
}

function toggleUDDLock(key){
  // Toggle switch clicked: if unlocked, lock (only if there's an existing item with known units)
  // If locked, confirm then unlock
  if(stockUnitLocked[key]){
    confirmUnlockUnit(key);
  } else {
    // Only allow manual lock if an existing item is selected (name matches existing stock)
    const nameEl=document.getElementById('sn-'+key);
    const name=(nameEl?.value||'').trim().toLowerCase();
    const stk=BIZ_STOCKS[key]||[];
    const item=stk.find(s=>s.name.toLowerCase()===name);
    if(item){lockStockUnits(key,item);}
    else{toast('Type an existing item name first to lock its units','err');}
  }
}
function toggleUDD(key){
  const panel=document.getElementById('udd-panel-'+key);
  const trigger=document.getElementById('udd-trigger-'+key);
  if(!panel)return;
  const isOpen=panel.style.display!=='none';
  // Close all other open dropdowns first
  document.querySelectorAll('[id^="udd-panel-"]').forEach(p=>{
    p.style.display='none';
    const k=p.id.replace('udd-panel-','');
    const t=document.getElementById('udd-trigger-'+k);
    if(t)t.classList.remove('open');
  });
  if(!isOpen){
    panel.style.display='flex';
    trigger.classList.add('open');
    renderUDDList(key,'');
    setTimeout(()=>{
      const s=document.getElementById('udd-search-'+key);
      if(s)s.focus();
    },50);
    // Close on outside click
    setTimeout(()=>{
      document.addEventListener('click',function closeUDD(e){
        const wrap=document.getElementById('udd-wrap-'+key);
        if(!wrap||!wrap.contains(e.target)){
          panel.style.display='none';
          trigger.classList.remove('open');
          document.removeEventListener('click',closeUDD);
        }
      },{once:true});
    },10);
  }
}

function renderUDDList(key,q){
  const list=document.getElementById('udd-list-'+key);
  if(!list)return;
  const query=(q||'').toLowerCase().trim();
  const sel=getSelectedUnit(key);

  // If locked, only show the item's stockUnit (and specBaseUnit if any)
  const locked=stockUnitLocked[key];
  if(locked){
    const allowedKeys=[locked.stockUnit,locked.specBaseUnit].filter(Boolean);
    let lockedHtml='<div class="udd-group">🔒 Locked units for this item</div>';
    allowedKeys.forEach(u=>{
      const isSel=u===sel;
      lockedHtml+=`<div class="udd-item${isSel?' sel':''}" onclick="selectUnit('${key}','${u}')">
        <span class="udd-item-label">${UNITS[u]?.label||u}</span>
      </div>`;
    });
    list.innerHTML=lockedHtml;
    return;
  }

  // Groups: Pinned first, then Weight, Volume, Count, Pack
  const groups=[
    {label:'⭐ Pinned',units:pinnedUnits.filter(u=>UNITS[u])},
    {label:'── Weight ──',units:UNIT_KEYS.filter(k=>UNITS[k].dim==='weight'&&!pinnedUnits.includes(k))},
    {label:'── Volume ──',units:UNIT_KEYS.filter(k=>UNITS[k].dim==='volume'&&!pinnedUnits.includes(k))},
    {label:'── Count ──',units:UNIT_KEYS.filter(k=>UNITS[k].dim==='count'&&!pinnedUnits.includes(k))},
    {label:'── Pack / Container ──',units:UNIT_KEYS.filter(k=>UNITS[k].dim==='pack'&&!pinnedUnits.includes(k))},
  ];

  let html='';
  groups.forEach(g=>{
    const filtered=g.units.filter(u=>{
      if(!query)return true;
      const label=(UNITS[u]?.label||u).toLowerCase();
      return label.includes(query)||u.toLowerCase().includes(query);
    });
    if(!filtered.length)return;
    html+=`<div class="udd-group">${g.label}</div>`;
    filtered.forEach(u=>{
      const isPinned=pinnedUnits.includes(u);
      const isSel=u===sel;
      html+=`<div class="udd-item${isSel?' sel':''}" onclick="selectUnit('${key}','${u}')">
        <span class="udd-item-label">${UNITS[u]?.label||u}</span>
        <button class="udd-pin${isPinned?' pinned':''}" onclick="event.stopPropagation();togglePin_unit('${key}','${u}')" title="${isPinned?'Unpin':'Pin'}">${isPinned?'📌':'📍'}</button>
      </div>`;
    });
  });
  if(!html)html=`<div style="padding:16px;text-align:center;font-size:11px;color:var(--text-tertiary)">No units found</div>`;
  list.innerHTML=html;
}

function selectUnit(key,unitKey){
  stockUnitSel[key]=unitKey;
  const label=document.getElementById('udd-label-'+key);
  if(label)label.textContent=UNITS[unitKey]?.label||unitKey;
  const panel=document.getElementById('udd-panel-'+key);
  const trigger=document.getElementById('udd-trigger-'+key);
  if(panel)panel.style.display='none';
  if(trigger)trigger.classList.remove('open');
  onStockUnitChange(key);
}

function confirmUnlockUnit(key){
  const su=stockUnitLocked[key]?.stockUnit||'this unit';
  modal(`<div class="modal-t">🔓 Unlock Unit?</div>
    <div style="font-size:13px;color:var(--text-primary);margin-bottom:12px">This item is saved as <strong>${su}</strong>. Changing the unit may cause stock inconsistencies.</div>
    <div class="mbtnrow">
      <button class="btn-c" onclick="rmModal()">Cancel</button>
      <button class="btn-s" onclick="rmModal();unlockStockUnits('${key}')">Yes, Unlock</button>
    </div>`);
}
function lockStockUnits(key,item){
  if(!item)return;
  stockUnitLocked[key]={stockUnit:item.stockUnit||'pc',specBaseUnit:item.specBaseUnit||null};
  updateFormUnitDropdowns(key);
  const sw=document.getElementById('udd-lock-sw-'+key);
  if(sw)sw.classList.add('on');
}
function unlockStockUnits(key){
  stockUnitLocked[key]=null;
  updateFormUnitDropdowns(key);
  const sw=document.getElementById('udd-lock-sw-'+key);
  if(sw)sw.classList.remove('on');
}
function togglePin_unit(key,unitKey){
  if(pinnedUnits.includes(unitKey)){
    pinnedUnits=pinnedUnits.filter(u=>u!==unitKey);
  } else {
    pinnedUnits=[unitKey,...pinnedUnits];
  }
  renderUDDList(key,document.getElementById('udd-search-'+key)?.value||'');
}
function stockAC(key,val){
  const container=document.getElementById('ac-'+key);
  if(!container)return;
  const q=val.trim().toLowerCase();
  if(!q){container.innerHTML='';unlockStockUnits(key);return;}
  const stk=BIZ_STOCKS[key]||[];
  // Deduplicate by name — show each item once with aggregated WAC qty
  const seenNames=new Set();
  const uniqueItems=[];
  stk.forEach(s=>{
    if(s.name.toLowerCase().includes(q)&&!seenNames.has(s.name.toLowerCase())){
      seenNames.add(s.name.toLowerCase());
      uniqueItems.push(s);
    }
  });
  if(!uniqueItems.length){container.innerHTML='';unlockStockUnits(key);return;}
  // Real-time lock: if typed name exactly matches an existing item, lock units immediately
  const exactMatch=uniqueItems.find(s=>s.name.toLowerCase()===q);
  if(exactMatch){lockStockUnits(key,exactMatch);}
  else{unlockStockUnits(key);}
  container.className='ac-list';
  container.innerHTML=uniqueItems.map(s=>{
    const summary=getStockSummary(key,s.name)||s;
    const ku=getItemUnits({...s,cost:summary.cost});
    const unitInfo=ku.map(u=>`${u.unit} (${p(u.costPerUnit)}/${u.unit})`).join(' · ');
    const totalQty=summary.qty||s.qty;
    return`<div class="ac-item" onmousedown="fillStockAC('${key}','${s.name.replace(/'/g,"\'")}')">
      <span class="ac-item-name">${s.name}</span>
      <span class="ac-item-sub">${totalQty} ${s.stockUnit} total in stock · ${unitInfo}</span>
    </div>`;
  }).join('');
}

// Fill stock form from an existing item by NAME (uses first batch for form fields, WAC for cost hint)
function fillStockAC(key,itemName){
  const stk=BIZ_STOCKS[key]||[];
  const item=stk.find(s=>s.name.toLowerCase()===itemName.toLowerCase());
  if(!item)return;
  const summary=getStockSummary(key,itemName)||item;
  const nameEl=document.getElementById('sn-'+key);
  if(nameEl)nameEl.value=item.name;
  const qtyEl=document.getElementById('sq-'+key);
  if(qtyEl){qtyEl.value='';qtyEl.focus();}
  // Step 1: set stockUnit first
  stockUnitSel[key]=item.stockUnit||'pc';
  const label=document.getElementById('udd-label-'+key);
  if(label)label.textContent=UNITS[item.stockUnit]?.label||item.stockUnit||'pc';
  // Step 2: pre-fill spec fields BEFORE updateFormUnitDropdowns
  const spuEl=document.getElementById('spu-'+key);
  const spbuEl=document.getElementById('spbu-'+key);
  if(item.specAmt>0){
    if(spuEl)spuEl.value=item.specAmt;
    if(spbuEl)spbuEl.value=item.specBaseUnit||'pc';
    const body=document.getElementById('spec-body-'+key);
    if(body&&body.style.display==='none')toggleSpecBox(key);
  } else {
    if(spuEl)spuEl.value='';
    if(spbuEl)spbuEl.value='pc';
  }
  // Step 3: NOW update unit dropdowns
  onStockUnitChange(key);
  // Step 3b: lock units AFTER onStockUnitChange so it doesn't get overwritten
  if(item.stockUnit)lockStockUnits(key,item);
  // Step 4: pre-fill low stock with existing value (from first batch)
  const lowEl=document.getElementById('sl-'+key);
  if(lowEl)lowEl.value=item.low||2;
  const lowUnitEl=document.getElementById('sl-unit-'+key);
  if(lowUnitEl&&item.lowUnit)lowUnitEl.value=item.lowUnit;
  const costEl=document.getElementById('sc-'+key);
  if(costEl)costEl.value='';
  const container=document.getElementById('ac-'+key);
  if(container)container.innerHTML='';
  // Show WAC cost hint
  const hint=document.getElementById('cost-hint-'+key);
  if(hint&&summary.cost>0){
    const costLbl=summary.specAmt>0?`${p(summary.cost)}/${summary.specBaseUnit}`:`${p(summary.cost)}/${summary.stockUnit}`;
    hint.innerHTML=`Current WAC: <strong>${costLbl}</strong> across ${summary.batches?.length||1} batch${(summary.batches?.length||1)>1?'es':''}. Enter new qty + total paid to restock.`;
  }
  // Auto-fill category if item has one in sell tab
  const prod=(BIZ_PRODUCTS[key]||[]).find(pr=>pr.name.toLowerCase()===item.name.toLowerCase());
  if(prod&&prod.category){
    const catEl=document.getElementById('sell-cat-'+key);
    if(catEl)catEl.value=prod.category;
  }
}
function doAddStock(key){
  const name=document.getElementById('sn-'+key)?.value.trim();
  const qty=parseFloat(document.getElementById('sq-'+key)?.value)||0;
  const stockUnit=getSelectedUnit(key);
  const totalCost=parseFloat(document.getElementById('sc-'+key)?.value)||0;
  const low=parseInt(document.getElementById('sl-'+key)?.value)||2;
  const lowUnit=document.getElementById('sl-unit-'+key)?.value||stockUnit;
  const specAmt=parseFloat(document.getElementById('spu-'+key)?.value)||0;
  const specBaseUnit=document.getElementById('spbu-'+key)?.value||'pc';
  const sellToSell=document.getElementById('sell-toggle-'+key)?.classList.contains('on')||false;
  const sellCat=(document.getElementById('sell-cat-'+key)?.value||'').trim();
  const activeSellRows=sellToSell?(sellRows[key]||[]).filter(r=>parseFloat(r.price)>0):[];
  if(!name||qty<=0){toast('Enter item name and quantity','err');return;}
  if(!totalCost){toast('Enter total amount paid','err');return;}

  // Sub-unit conversion: if user entered qty in specBaseUnit (e.g. 10 sheets instead of reams),
  // convert to stockUnit before any calculation. e.g. 10 sheets / 500 = 0.02 reams.
  // GUARD: only convert if the user actually left spec fields empty (base-unit-mode restock).
  // If specAmt field is filled, the user entered in stockUnit with a spec — no conversion needed.
  const _existRef=(BIZ_STOCKS[key]||[]).find(s=>s.name.toLowerCase()===name.toLowerCase());
  const _isBaseUnitMode=_existRef&&_existRef.specAmt>0&&_existRef.specBaseUnit&&
     stockUnit.toLowerCase()===_existRef.specBaseUnit.toLowerCase()&&
     specAmt===0; // user did NOT fill spec fields — they're entering in base unit directly
  if(_isBaseUnitMode){
    // qty is already in sheets (base unit) — no conversion, no spec, WAC per sheet
    return doAddStock_inner(key,name,qty,stockUnit,totalCost,low,lowUnit,0,'',sellToSell,sellCat,activeSellRows);
  }

  // Low stock alert validation — only block if alert >= total stock after restock
  const lowInStockUnit=lowUnit===specBaseUnit&&specAmt>0?(low/specAmt):low;
  const existingQty=(BIZ_STOCKS[key]||[]).find(s=>s.name.toLowerCase()===name.toLowerCase())?.qty||0;
  const totalAfterRestock=qty+existingQty;
  if(low>0&&lowInStockUnit>=totalAfterRestock){
    toast(`⚠️ Low stock alert (${low} ${lowUnit}) must be less than total stock after restock (${totalAfterRestock} ${stockUnit}). Please reduce it.`,'err');
    const lowEl=document.getElementById('sl-'+key);
    if(lowEl){lowEl.style.borderColor='var(--danger)';setTimeout(()=>lowEl.style.borderColor='',2500);}
    return;
  }

  // Auto-detect formula
  // Spec provided → qty × specAmt ÷ totalCost = cost per specBaseUnit
  // No spec       → totalCost ÷ qty = cost per stockUnit
  let cost,finalQty,formulaDesc;
  if(specAmt>0){
    const totalBase=qty*specAmt;
    cost=totalCost/totalBase; // cost per 1 specBaseUnit (e.g. per sheet, per ml)
    finalQty=qty; // qty stays in stockUnit
    formulaDesc=`${qty} × ${specAmt} = ${totalBase} ${specBaseUnit} · ${p(cost)}/${specBaseUnit}`;
  } else {
    cost=totalCost/qty; // cost per 1 stockUnit
    finalQty=qty;
    formulaDesc=`${p(totalCost)} ÷ ${qty} = ${p(cost)}/${stockUnit}`;
  }

  if(!BIZ_STOCKS[key])BIZ_STOCKS[key]=[];
  const existingBatches=BIZ_STOCKS[key].filter(s=>s.name.toLowerCase()===name.toLowerCase());
  if(existingBatches.length>0){
    const hasSpec=specAmt>0&&specBaseUnit;
    const summary=getStockSummary(key,name);
    // Use per-batch specAmt so sheet-mode batches (specAmt=0) aren't inflated by ream spec
    const exBaseQty=summary?summary.batches.reduce((sum,b)=>{const bSA=b.specAmt||0;return sum+(bSA>0?b.qty*bSA:b.qty);},0):0;
    const exValue=exBaseQty*(summary?.cost||0);
    const newBaseQty=hasSpec?qty*specAmt:qty;
    const totalBaseQty=exBaseQty+newBaseQty;
    const newWAC=totalBaseQty>0?(exValue+totalCost)/totalBaseQty:cost;
    const wacLabel=hasSpec?`${p(newWAC)}/${specBaseUnit}`:`${p(newWAC)}/${stockUnit}`;
    // Always create a NEW batch row
    const newBatch={id:uid(),name,qty,stockUnit,cost:safeRound(cost),low:existingBatches[0].low||low,lowUnit:lowUnit};
    if(hasSpec){newBatch.specAmt=specAmt;newBatch.specBaseUnit=specBaseUnit;}
    BIZ_STOCKS[key].push(newBatch);
    if(sellToSell)activeSellRows.forEach(r=>addToSellTab(key,name,parseFloat(r.price),r.unit||stockUnit,sellCat));
    if(!BIZ_EXPLOGS[key])BIZ_EXPLOGS[key]=[];
    BIZ_EXPLOGS[key].push({id:uid(),desc:`Stock: ${name} (+${qty} ${stockUnit})`,amount:totalCost,cat:'Stock Purchase',time:ts(),dateKey:dateKey(),auto:true});
    if(!BIZ_STOCKLOGS[key])BIZ_STOCKLOGS[key]=[];
    BIZ_STOCKLOGS[key].push({id:uid(),stockName:name,qty,stockUnit,totalCost,costPerUnit:safeRound(newWAC),specAmt:specAmt||0,specBaseUnit:specBaseUnit||'',time:ts(),dateKey:dateKey()});
    saveData();render();
    setTimeout(()=>toast(`"${name}" restocked +${qty} ${stockUnit} · WAC ${wacLabel} ✓`),50);
  } else {
    const sellSummary=activeSellRows.length?activeSellRows.map(r=>`${p(parseFloat(r.price))}/${r.unit}`).join(', '):'';
    modal(`<div class="modal-t">Confirm New Item</div>
      <div class="modal-sub">"<strong>${name}</strong>" — confirm before adding:</div>
      <input class="inp" id="ni-n" value="${name}">
      <div style="display:flex;gap:8px;margin-bottom:8px">
        <div style="flex:1;background:var(--bg-tertiary);border:0.5px solid var(--border-secondary);border-radius:var(--radius-sm);padding:8px;font-size:11px;color:var(--text-secondary);text-align:center">${qty} ${stockUnit}${specAmt>0?`<br>= ${qty*specAmt} ${specBaseUnit}`:''}</div>
        <div style="flex:1;background:var(--accent-light);border:0.5px solid var(--accent);border-radius:var(--radius-sm);padding:8px;font-size:11px;color:var(--accent);text-align:center">${formulaDesc}</div>
      </div>
      <input class="inp" id="ni-l" type="number" value="${low}" placeholder="Low stock alert">
      ${sellToSell&&sellSummary?`<div style="background:var(--success-light);border:0.5px solid var(--success);border-radius:var(--radius-sm);padding:8px;font-size:11px;color:var(--success);margin-top:6px">✓ Will add to Sell tab: ${sellSummary}</div>`:''}
      <div class="mbtnrow">
        <button class="btn-c" onclick="rmModal()">Cancel</button>
        <button class="btn-s" onclick="saveNewItem('${key}',${finalQty},'${stockUnit}',${cost},${low},'${lowUnit}',${specAmt},'${specBaseUnit}',${sellToSell?1:0},'${sellCat.replace(/'/g,"\\'")}')">Add to Inventory</button>
      </div>`);
  }
}

function saveNewItem(key,qty,stockUnit,cost,low,lowUnit,specAmt,specBaseUnit,sellWasOn,sellCat){

function expDescAC(key,val){
  const container=document.getElementById('exp-ac-'+key);
  if(!container)return;
  const q=val.trim().toLowerCase();
  if(!q){container.innerHTML='';return;}
  const logs=BIZ_EXPLOGS[key]||[];
  const seen=new Set();
  const matches=[];
  logs.slice().reverse().forEach(e=>{
    if(e.desc&&e.desc.toLowerCase().includes(q)&&!seen.has(e.desc.toLowerCase())){
      seen.add(e.desc.toLowerCase());
      matches.push(e);
    }
  });
  if(!matches.length){container.innerHTML='';return;}
  container.className='ac-list';
  container.innerHTML=matches.slice(0,8).map(e=>
    `<div class="ac-item" onmousedown="fillExpDesc('${key}','${e.desc.replace(/'/g,"\'")}','${(e.cat||'').replace(/'/g,"\'")}')">
      <span class="ac-item-name">${e.desc}</span>
      <span class="ac-item-sub">${e.cat||''} · ${p(e.amount)}</span>
    </div>`
  ).join('');
}

function stopCam(){const v=document.getElementById('cam-vid');if(v&&v._stream)v._stream.getTracks().forEach(t=>t.stop());rmModal();}
function snapPhoto(){const v=document.getElementById('cam-vid'),c=document.getElementById('cam-canvas'),img=document.getElementById('cam-preview'),btn=document.getElementById('snap-btn');c.width=v.videoWidth;c.height=v.videoHeight;c.getContext('2d').drawImage(v,0,0);const dataUrl=c.toDataURL('image/jpeg',0.85);v.style.display='none';img.src=dataUrl;img.style.display='block';btn.textContent='✓ Use Photo';btn.onclick=()=>{if(v._stream)v._stream.getTracks().forEach(t=>t.stop());rmModal();processScanImage(dataUrl,scanCtx);};}
function openFile(ctx){scanCtx=ctx;const input=document.getElementById('file-cam-input');input.onchange=e=>{const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=ev=>processScanImage(ev.target.result,ctx);r.readAsDataURL(file);input.value='';};input.click();}
async function processScanImage(dataUrl,ctx){
  const isExp=ctx.startsWith('exp-');
  const lb=document.getElementById('lb-'+ctx),lbi=document.getElementById('lbi-'+ctx),sr=document.getElementById('sr-'+ctx),si=document.getElementById('si-'+ctx);
  if(!lb||!sr||!si){toast('Reload and try again','err');return;}
  lb.style.display='block';lbi.style.width='0';let prog=0;const iv=setInterval(()=>{prog=Math.min(prog+7,85);lbi.style.width=prog+'%';},200);
  const base64=dataUrl.split(',')[1];
  const prompt=isExp?'Extract all expense items from this receipt. Return ONLY a JSON array: [{"name":"item","amount":0.00}]. No other text.':'Extract all items and quantities from this stock/inventory image. Return ONLY a JSON array: [{"name":"item","qty":1,"unit":"pcs"}]. No other text.';
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:'image/jpeg',data:base64}},{type:'text',text:prompt}]}]})});
    const data=await resp.json();
    clearInterval(iv);lbi.style.width='100%';setTimeout(()=>{lb.style.display='none';lbi.style.width='0';},400);
    const raw=data.content?.map(c=>c.text||'').join('');
    const parsed=JSON.parse(raw.replace(/```json|```/g,'').trim());
    sr.style.display='block';
    si.innerHTML=parsed.map((it,i)=>`<div class="scan-edit-row"><input class="sei-name" id="sn-${i}" value="${it.name||''}"><input class="sei-qty" id="sq-${i}" type="number" value="${isExp?(it.amount||0):(it.qty||1)}" placeholder="${isExp?'₱':'Qty'}"></div>`).join('');
    toast('Scan complete — review below ✓','ok');
  }catch(e){clearInterval(iv);lb.style.display='none';toast('Could not read image. Try a clearer photo.','err');}
}
function applyScanned(ctx){
  const isExp=ctx.startsWith('exp-');
  const key=ctx.replace('stock-','').replace('exp-','');
  const si=document.getElementById('si-'+ctx);
  if(!si)return;
  const rows=si.querySelectorAll('.scan-edit-row');
  let count=0;
  rows.forEach(function(_,i){
    const name=document.getElementById('sn-'+i)?.value.trim();
    const val=parseFloat(document.getElementById('sq-'+i)?.value)||0;
    if(!name||val<=0)return;
    if(isExp){
      if(!BIZ_EXPLOGS[key])BIZ_EXPLOGS[key]=[];
      BIZ_EXPLOGS[key].push({id:uid(),desc:name,amount:val,cat:'Supplies',time:ts(),dateKey:dateKey()});
    } else {
      if(!BIZ_STOCKS[key])BIZ_STOCKS[key]=[];
      if(!BIZ_STOCKLOGS[key])BIZ_STOCKLOGS[key]=[];
      const qty=val;
      const existingBatches=BIZ_STOCKS[key].filter(function(s){return s.name.toLowerCase()===name.toLowerCase();});
      const first=existingBatches[0];
      const stockUnit=first?first.stockUnit||'pc':'pc';
      if(existingBatches.length>0){
        const nb={id:uid(),name,qty,stockUnit,cost:0,low:first.low||2,lowUnit:first.lowUnit||stockUnit};
        if(first.specAmt>0){nb.specAmt=first.specAmt;nb.specBaseUnit=first.specBaseUnit;}
        BIZ_STOCKS[key].push(nb);
      } else {
        BIZ_STOCKS[key].push({id:uid(),name,qty,stockUnit:'pc',cost:0,low:2,lowUnit:'pc'});
      }
      BIZ_STOCKLOGS[key].push({id:uid(),stockName:name,qty,stockUnit,totalCost:0,costPerUnit:0,
        specAmt:first?first.specAmt||0:0,specBaseUnit:first?first.specBaseUnit||'':"",
        time:ts(),dateKey:dateKey(),note:'via scan — update cost in Stock tab'});
    }
    count++;
  });
  document.getElementById('sr-'+ctx).style.display='none';
  saveData();render();
  const note=isExp?'':' · ⚠️ Update costs via ✏️ in Stock tab';
  setTimeout(function(){toast(count+' item(s) saved ✓'+note);},50);
}
function updateClock(){const el=document.getElementById('posClock');if(el)el.textContent=new Date().toLocaleTimeString('en-PH',{hour:'2-digit',minute:'2-digit'});}

// ── Startup ──────────────────────────────────────────────────
(async()=>{
  checkNet();setInterval(checkNet,20000);setInterval(updateClock,1000);updateClock();
  // Check existing session
  const {data:{session}}=await supa.auth.getSession();
  if(session&&session.user){
    currentUser=session.user;
    await loadFromSupabase();
    if(isDark){document.documentElement.classList.add('dark');}
    render();
  } else {
    showAuthScreen();
  }
  // Listen for auth changes (tab focus, token refresh)
  supa.auth.onAuthStateChange(async(event,session)=>{
    if(event==='SIGNED_IN'&&session){
      currentUser=session.user;
    } else if(event==='SIGNED_OUT'){
      currentUser=null;
      showAuthScreen();
    }
  });
})();
</script>
