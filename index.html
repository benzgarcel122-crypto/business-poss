<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business Hub POS — V9</title>
<style>
/* ============================================================
   MULTI-BUSINESS POS V9
   Last Updated: May 2026
   Changes: Mobile-fit split POS layout, Dark mode visibility fix
   Stack: Plain HTML/CSS/JS — Path A
   Deploy: Vercel (free)
   ============================================================ */
:root{
  --bg-primary:#ffffff;--bg-secondary:#f8f7f4;--bg-tertiary:#f0ede8;
  --border-primary:#e0dbd2;--border-secondary:#ece8e1;--border-tertiary:#f0ede8;
  --text-primary:#111111;--text-secondary:#4a4540;--text-tertiary:#6e6860;
  --accent:#1a56db;--accent-light:#eff6ff;--success:#16a34a;--success-light:#dcfce7;
  --danger:#dc2626;--danger-light:#fee2e2;--warning:#ca8a04;--warning-light:#fef9c3;
  --shadow:0 1px 3px rgba(0,0,0,.08);--radius:12px;--radius-sm:8px;
}
.dark{
  --bg-primary:#0f1117;--bg-secondary:#181c27;--bg-tertiary:#1e2235;
  --border-primary:#2e3450;--border-secondary:#252a3d;--border-tertiary:#1e2235;
  --text-primary:#e8eaf6;--text-secondary:#9fa8c7;--text-tertiary:#5c6490;
  --accent:#7c8fff;--accent-light:#1a1f3d;--success:#2dd4a0;--success-light:#0a2520;
  --danger:#ff6b8a;--danger-light:#2a0f18;--warning:#fbbf5a;--warning-light:#241a08;
  --shadow:0 2px 8px rgba(0,0,0,.5);
}
*{box-sizing:border-box;margin:0;padding:0;transition:background-color .2s,color .2s,border-color .2s}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg-secondary)}
.pw{display:flex;justify-content:center;padding:12px;min-height:100vh;background:var(--bg-secondary);align-items:flex-start}
.pa{width:100%;max-width:480px;background:var(--bg-secondary);border-radius:20px;border:0.5px solid var(--border-primary);overflow:hidden;display:flex;flex-direction:column;height:calc(100vh - 24px);position:relative;box-shadow:var(--shadow)}
.ptb{background:var(--bg-primary);border-bottom:0.5px solid var(--border-secondary);padding:10px 14px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;gap:8px}
.ptb-left{display:flex;flex-direction:column;min-width:0}
.ptb-t{font-size:15px;font-weight:700;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ptb-s{font-size:11px;color:var(--text-tertiary);margin-top:1px}
.ptb-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.pclk{font-size:12px;font-weight:600;color:var(--text-secondary);font-variant-numeric:tabular-nums}
.net-badge{display:flex;align-items:center;gap:3px;font-size:10px;font-weight:600;padding:3px 7px;border-radius:20px}
.net-badge.online{background:var(--success-light);color:var(--success)}
.net-badge.offline{background:var(--danger-light);color:var(--danger)}
.net-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.net-badge.online .net-dot{background:var(--success)}
.net-badge.offline .net-dot{background:var(--danger)}
.dm-toggle{width:32px;height:18px;border-radius:20px;border:0.5px solid var(--border-primary);background:var(--bg-tertiary);cursor:pointer;position:relative;flex-shrink:0;transition:background .2s}
.dm-toggle.dark-on{background:var(--accent)}
.dm-knob{width:14px;height:14px;border-radius:50%;background:var(--bg-primary);position:absolute;top:1px;left:1px;transition:transform .2s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
.dm-toggle.dark-on .dm-knob{transform:translateX(14px)}
.dm-label{font-size:9px;color:var(--text-tertiary)}
.pbody{flex:1;overflow:hidden;min-height:0;display:flex;flex-direction:column}
/* ── Custom unit dropdown ── */
.udd-wrap{position:relative;flex:1;min-width:0}
.udd-trigger{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:var(--bg-primary);border:0.5px solid var(--border-primary);border-radius:var(--radius-sm);cursor:pointer;font-size:13px;color:var(--text-primary);font-family:inherit;gap:6px;user-select:none}
.udd-trigger:hover{border-color:var(--accent)}
.udd-trigger.open{border-color:var(--accent);border-radius:var(--radius-sm) var(--radius-sm) 0 0}
.udd-panel{position:absolute;top:100%;left:0;right:0;z-index:300;background:var(--bg-primary);border:0.5px solid var(--accent);border-top:none;border-radius:0 0 var(--radius-sm) var(--radius-sm);box-shadow:0 6px 20px rgba(0,0,0,.2);max-height:260px;display:flex;flex-direction:column}
.udd-search{padding:7px 10px;border-bottom:0.5px solid var(--border-secondary);flex-shrink:0}
.udd-search input{width:100%;padding:6px 10px;font-size:12px;border-radius:6px;border:0.5px solid var(--border-primary);background:var(--bg-secondary);color:var(--text-primary);font-family:inherit;outline:none}
.udd-search input:focus{border-color:var(--accent)}
.udd-list{overflow-y:auto;flex:1}
.udd-group{font-size:9px;font-weight:700;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.08em;padding:6px 12px 3px;background:var(--bg-secondary)}
.udd-item{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;cursor:pointer;border-bottom:0.5px solid var(--border-tertiary);gap:8px}
.udd-item:last-child{border-bottom:none}
.udd-item:hover,.udd-item.sel{background:var(--accent-light)}
.udd-item.sel .udd-item-label{color:var(--accent);font-weight:700}
.udd-item-label{font-size:13px;color:var(--text-primary);flex:1}
.udd-item-abbr{font-size:11px;color:var(--text-tertiary);flex-shrink:0}
.udd-pin{background:none;border:none;cursor:pointer;font-size:13px;padding:2px 4px;flex-shrink:0;opacity:.5;transition:opacity .15s}
.udd-pin:hover,.udd-pin.pinned{opacity:1}
.udd-lock-toggle{display:flex;align-items:center;gap:4px;flex-shrink:0;cursor:pointer;user-select:none}
.udd-lock-sw{width:28px;height:16px;border-radius:20px;background:var(--border-primary);position:relative;transition:background .2s;flex-shrink:0}
.udd-lock-sw.on{background:var(--accent)}
.udd-lock-knob{width:12px;height:12px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:transform .2s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
.udd-lock-sw.on .udd-lock-knob{transform:translateX(12px)}
.udd-lock-lbl{font-size:9px;color:var(--text-tertiary)}
.ac-wrap{position:relative}
.ac-list{position:absolute;top:100%;left:0;right:0;z-index:200;background:var(--bg-primary);border:0.5px solid var(--accent);border-radius:var(--radius-sm);box-shadow:0 4px 16px rgba(0,0,0,.18);max-height:160px;overflow-y:auto;margin-top:2px}
.ac-item{padding:9px 12px;cursor:pointer;border-bottom:0.5px solid var(--border-tertiary);display:flex;flex-direction:column;gap:2px}
.ac-item:last-child{border-bottom:none}
.ac-item:hover,.ac-item:active{background:var(--accent-light)}
.ac-item-name{font-size:13px;font-weight:600;color:var(--text-primary)}
.ac-item-sub{font-size:11px;color:var(--text-tertiary)}
.sell-toggle-row{background:var(--bg-tertiary);border:0.5px solid var(--border-secondary);border-radius:var(--radius-sm);padding:10px 12px}
.cat-pills-row::-webkit-scrollbar{height:3px}
.cat-pills-row::-webkit-scrollbar-track{background:transparent}
.cat-pills-row::-webkit-scrollbar-thumb{background:var(--border-primary);border-radius:3px}
.cat-pills-row::-webkit-scrollbar-thumb:hover{background:var(--text-tertiary)}
.sell-toggle-circle{width:22px;height:22px;border-radius:50%;border:2px solid var(--border-primary);background:var(--bg-primary);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.sell-toggle-circle.on{border-color:var(--accent);background:var(--accent)}
.sell-toggle-circle.on::after{content:'✓';font-size:12px;font-weight:700;color:#fff}border:0.5px solid var(--danger);border-radius:6px;padding:5px 8px;font-size:13px;cursor:pointer;display:flex;align-items:center;transition:background .15s}
.trash-btn:hover{background:var(--danger);}align-items:center;gap:3px;padding:5px 10px;font-size:11px;font-weight:600;border-radius:6px;border:0.5px solid var(--accent);background:var(--accent-light);color:var(--accent);cursor:pointer;font-family:inherit;white-space:nowrap}
.cust-btn:hover{background:var(--accent);color:#fff}
.ingr-row{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:0.5px solid var(--border-tertiary)}
.ingr-row:last-child{border-bottom:none}
.ingr-check{width:15px;height:15px;accent-color:var(--accent);cursor:pointer;flex-shrink:0}
.ingr-name{flex:1;font-size:12px;color:var(--text-primary);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ingr-unit{font-size:11px;color:var(--text-tertiary);flex-shrink:0}
.ingr-qty{width:52px;padding:3px 5px;font-size:12px;border-radius:5px;border:0.5px solid var(--border-primary);background:var(--bg-primary);color:var(--text-primary);font-family:inherit;text-align:center}
.ingr-qty:focus{outline:none;border-color:var(--accent)}
.recipe-tag{display:inline-flex;align-items:center;gap:3px;font-size:9px;background:var(--accent-light);color:var(--accent);border-radius:4px;padding:1px 5px;margin-right:3px;margin-top:2px}
.recipe-badge{font-size:9px;font-weight:700;color:var(--accent);margin-left:3px}
.yield-row{display:flex;align-items:center;gap:8px;padding:8px 0 4px;border-top:0.5px solid var(--border-secondary);margin-top:4px}
.yield-label{font-size:11px;color:var(--text-secondary);flex:1}
.yield-inp{width:60px;padding:4px 6px;font-size:12px;border-radius:6px;border:0.5px solid var(--border-primary);background:var(--bg-primary);color:var(--text-primary);font-family:inherit;text-align:center}
.yield-inp:focus{outline:none;border-color:var(--accent)}
.sell-wrap{display:flex;flex-direction:column;flex:1;overflow:hidden;padding:0}
.sell-top{flex:1;overflow-y:auto;padding:12px 12px 6px}
.sell-bottom{flex-shrink:0;background:var(--bg-primary);border-top:0.5px solid var(--border-secondary);padding:10px 12px 12px}
/* ── All non-sell tabs keep normal scroll ── */
.tab-scroll{flex:1;overflow-y:auto;padding:12px}
.pnav{display:grid;grid-template-columns:repeat(4,1fr);background:var(--bg-primary);border-top:0.5px solid var(--border-secondary);flex-shrink:0}
.pnb{padding:8px 2px 6px;text-align:center;cursor:pointer;border:none;background:transparent;color:var(--text-tertiary);font-size:11px;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:2px;transition:color .15s}
.pnb.act{color:var(--accent)}
.tm{border-radius:var(--radius-sm);padding:8px 12px;font-size:12px;margin-bottom:10px;display:none}
.tm.ok{background:var(--success-light);border:0.5px solid var(--success);color:var(--success)}
.tm.err{background:var(--danger-light);border:0.5px solid var(--danger);color:var(--danger)}
.sl{font-size:11px;font-weight:700;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.07em;margin:0 0 7px}
.cb{background:var(--bg-primary);border:0.5px solid var(--border-secondary);border-radius:var(--radius);padding:12px;margin-bottom:10px}
.inp{width:100%;padding:9px 11px;font-size:13px;border-radius:var(--radius-sm);border:0.5px solid var(--border-primary);background:var(--bg-primary);color:var(--text-primary);font-family:inherit;margin-bottom:8px}
.inp:focus{outline:none;border-color:var(--accent)}
.inp:last-child{margin-bottom:0}
.ir{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.ir .inp{margin-bottom:0}
select.inp{appearance:auto}
.bm{width:100%;padding:11px;font-size:13px;font-weight:600;border-radius:var(--radius-sm);border:none;background:var(--text-primary);color:var(--bg-primary);cursor:pointer;font-family:inherit;margin-top:6px}
.split-btn-wrap{display:flex;gap:0;margin-top:6px;border-radius:var(--radius-sm);overflow:hidden}
.split-btn-main{flex:1;padding:11px;font-size:13px;font-weight:600;border:none;background:var(--text-primary);color:var(--bg-primary);cursor:pointer;font-family:inherit}
.split-btn-main:disabled{opacity:0.45;cursor:not-allowed}
.split-btn-main.credit-mode{background:var(--warning);color:#fff}
.split-btn-arrow{width:38px;padding:11px 0;font-size:13px;font-weight:700;border:none;border-left:1px solid rgba(255,255,255,0.18);background:var(--text-primary);color:var(--bg-primary);cursor:pointer;font-family:inherit;flex-shrink:0}
.split-btn-arrow.credit-mode{background:var(--warning);color:#fff}
.split-btn-dropdown{background:var(--bg-primary);border:0.5px solid var(--border-primary);border-radius:var(--radius-sm);box-shadow:0 4px 16px rgba(0,0,0,.13);overflow:hidden;margin-top:2px}
.split-btn-opt{width:100%;padding:10px 14px;font-size:12px;font-weight:600;text-align:left;background:none;border:none;cursor:pointer;font-family:inherit;color:var(--text-primary);display:flex;align-items:center;gap:8px}
.split-btn-opt:hover{background:var(--accent-light)}
.split-btn-opt.active{color:var(--accent)}
.credit-name-row{display:flex;gap:6px;align-items:center;margin-top:5px;position:relative}
.credit-name-row input{flex:1;margin:0}
.credit-ac-list{position:absolute;top:100%;left:0;right:0;z-index:99;background:var(--bg-primary);border:0.5px solid var(--border-primary);border-top:none;border-radius:0 0 var(--radius-sm) var(--radius-sm);max-height:120px;overflow-y:auto}
.credit-ac-item{padding:7px 10px;font-size:12px;cursor:pointer;color:var(--text-primary)}
.credit-ac-item:hover{background:var(--accent-light)}
.bm:active{opacity:.8}
.bm:disabled{opacity:.3;cursor:not-allowed}
.bk{display:inline-flex;align-items:center;gap:5px;background:var(--bg-primary);border:0.5px solid var(--border-primary);border-radius:var(--radius-sm);padding:6px 12px;cursor:pointer;font-size:12px;color:var(--text-secondary);font-family:inherit;margin-bottom:12px}
.sell-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.cart-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.cart-badge{display:inline-block;background:var(--accent);color:#fff;font-size:9px;font-weight:700;border-radius:10px;padding:1px 6px;margin-left:5px;vertical-align:middle}
.cart-body{max-height:96px;overflow-y:auto;margin-bottom:6px}
.pay-row{display:flex;gap:6px;margin-bottom:6px}

.sc{background:var(--bg-primary);border:0.5px solid var(--border-secondary);border-radius:10px;padding:10px 12px}
.slb{font-size:11px;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.sv{font-size:16px;font-weight:700;color:var(--text-primary)}
.sv.g{color:var(--success)}.sv.b{color:var(--accent)}.sv.r{color:var(--danger)}
.hsum{background:var(--bg-primary);border:0.5px solid var(--border-secondary);border-radius:var(--radius);padding:12px;margin-bottom:12px}
.hsh{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.hrev{font-size:20px;font-weight:800;color:var(--text-primary)}
.hsd{padding:5px 10px;font-size:11px;font-weight:600;border-radius:6px;border:0.5px solid var(--border-primary);background:var(--bg-secondary);color:var(--text-secondary);cursor:pointer;font-family:inherit}
/* Scrollable revenue list — shows ~4 rows then scrolls */
.rev-scroll{max-height:128px;overflow-y:auto;overflow-x:hidden}
.rev-scroll::-webkit-scrollbar{width:5px;cursor:pointer}
.rev-scroll::-webkit-scrollbar-track{background:var(--bg-tertiary);border-radius:3px}
.rev-scroll::-webkit-scrollbar-thumb{background:var(--border-primary);border-radius:3px;cursor:grab}
.rev-scroll::-webkit-scrollbar-thumb:active{cursor:grabbing;background:var(--text-tertiary)}
/* Scrollable biz grid — shows ~2 rows then scrolls */
.biz-grid-wrap{max-height:200px;overflow-y:auto;overflow-x:hidden;margin-bottom:12px;padding:2px 2px 2px 0}
.biz-grid-wrap::-webkit-scrollbar{width:5px;cursor:pointer}
.biz-grid-wrap::-webkit-scrollbar-track{background:var(--bg-tertiary);border-radius:3px}
.biz-grid-wrap::-webkit-scrollbar-thumb{background:var(--border-primary);border-radius:3px;cursor:grab}
.biz-grid-wrap::-webkit-scrollbar-thumb:active{cursor:grabbing;background:var(--text-tertiary)}
.brow{cursor:pointer;border-bottom:0.5px solid var(--border-tertiary)}
.brow:last-of-type{border-bottom:none}
.brow-inner{display:flex;justify-content:space-between;align-items:center;padding:5px 0}
.brow-name{font-size:13px;color:var(--text-secondary);display:flex;align-items:center;gap:5px}
.brow-amt{font-size:13px;font-weight:600;color:var(--success)}
.brow-amt.zero{color:var(--text-tertiary)}
.biz-exp{overflow:hidden;max-height:0;transition:max-height .35s ease}
.biz-exp.open{max-height:160px}
.bei{padding:6px 10px;background:var(--bg-secondary);border-radius:0 0 8px 8px;margin-bottom:4px;display:flex;align-items:center;gap:10px}
.bei-stats{flex:1;min-width:0}
.trendline-wrap{display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0}
.trendline-title{font-size:8px;font-weight:700;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.05em;text-align:center}
.trendline-pct{font-size:10px;font-weight:700;border-radius:4px;padding:1px 5px;text-align:center}
.trendline-up{color:var(--success);background:var(--success-light)}
.trendline-down{color:var(--danger);background:var(--danger-light)}
.trendline-flat{color:var(--text-tertiary);background:var(--bg-tertiary)}
.er{display:flex;justify-content:space-between;font-size:12px;padding:2px 0}
.er-l{color:var(--text-tertiary)}
.er-g{font-weight:600;color:var(--success)}
.er-r{font-weight:600;color:var(--danger)}
.hg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:3px 3px 3px 0}
.bc-wrap{position:relative}
.bc{background:var(--bg-primary);border:0.5px solid var(--border-secondary);border-radius:var(--radius);padding:12px 6px 10px;cursor:pointer;text-align:center;user-select:none;width:100%}
.bc:active{transform:scale(.96)}
.bi{font-size:22px;margin-bottom:4px}
.bn{font-size:11px;font-weight:600;color:var(--text-primary);line-height:1.3}
.bb{font-size:9px;color:var(--text-tertiary);margin-top:2px}
.bc-remove{position:absolute;top:-5px;right:-5px;width:18px;height:18px;border-radius:50%;background:var(--danger);border:2px solid var(--bg-secondary);color:#fff;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:5;font-weight:700}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px}
.svc-wrap{position:relative}
.sb{background:var(--bg-primary);border:0.5px solid var(--border-secondary);border-radius:10px;padding:10px 8px;cursor:pointer;text-align:center;font-family:inherit;position:relative}
.sb.in-cart{border-color:var(--accent);background:var(--accent-light);border-left:3px solid var(--accent)}
.sb.pinned-svc{border-top:2px solid var(--warning)}
.sn{font-size:13px;font-weight:600;color:var(--text-primary)}
.sp{font-size:12px;color:var(--text-tertiary);margin-top:1px}
.svc-actions{position:absolute;top:3px;right:3px;display:flex;gap:2px;opacity:0;pointer-events:none;transition:opacity .15s}
.svc-wrap:hover .svc-actions{opacity:1;pointer-events:all}
.svc-x{width:16px;height:16px;border-radius:50%;background:var(--danger-light);border:none;color:var(--danger);cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;padding:0}
.svc-pin{width:16px;height:16px;border-radius:50%;background:var(--warning-light);border:none;color:var(--warning);cursor:pointer;font-size:9px;display:flex;align-items:center;justify-content:center;padding:0}
.pin-badge{position:absolute;top:3px;left:4px;font-size:9px}
.add-svc-btn{display:inline-flex;align-items:center;gap:3px;padding:4px 9px;font-size:11px;font-weight:600;border-radius:6px;border:0.5px dashed var(--border-primary);background:transparent;color:var(--text-tertiary);cursor:pointer;font-family:inherit}
.add-svc-btn:hover{border-color:var(--accent);color:var(--accent)}
.cr{display:flex;align-items:center;gap:6px;padding:7px 0;border-bottom:0.5px solid var(--border-tertiary)}
.cr:last-child{border-bottom:none}
.crn{flex:1;font-size:13px;color:var(--text-primary);min-width:0}
.crp{font-size:13px;font-weight:600;color:var(--text-primary);min-width:48px;text-align:right}
.qw{display:flex;align-items:center;gap:3px;flex-shrink:0}
.qb{width:22px;height:22px;border-radius:50%;border:0.5px solid var(--border-primary);background:var(--bg-secondary);color:var(--text-primary);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;font-family:inherit;padding:0}

<script>
// ================================================================
// MULTI-BUSINESS POS V9 — FULL JAVASCRIPT
// ================================================================

const ALL_BIZ=[

  {key:'carenderia',icon:'🍛',name:'Carenderia',desc:'Filipino eatery & daily meals',cat:'Food & Beverage',ready:true},

  {key:'agrivet',icon:'🌱',name:'Agri-Vet',desc:'Seeds, fertilizer & livestock needs',cat:'Retail',ready:true},
  {key:'hardware',icon:'🔨',name:'Hardware Store',desc:'Construction materials & tools',cat:'Retail',ready:true},
  {key:'laundry',icon:'👕',name:'Laundry Shop',desc:'Wash, dry & fold services',cat:'Services',ready:true},

  {key:'barbershop',icon:'💈',name:'Barber Shop',desc:'Hair, beauty & grooming services',cat:'Services',ready:false},
  {key:'inasal',icon:'🍗',name:'Inasal Business',desc:'Grilled chicken inasal & BBQ',cat:'Food & Beverage',ready:false},
  {key:'vulcanizing',icon:'🔧',name:'Vulcanizing Shop',desc:'Tire repair & puncture fix',cat:'Services',ready:false},
  {key:'ukay',icon:'👗',name:'Ukay-Ukay',desc:'Secondhand & ref clothing',cat:'Retail',ready:false},
];

const DEFAULT_PRODUCTS={
  xerox:[],tapsilog:[],carenderia:[],bakery:[],coffee:[],streetfood:[],
  haloimo:[],sari:[],pharmacy:[],agrivet:[],hardware:[],laundry:[],
  water:[],internet:[],cs:[],pv:[],
};

const DEFAULT_STOCKS={
  xerox:[],tapsilog:[],carenderia:[],bakery:[],coffee:[],streetfood:[],
  haloimo:[],sari:[],pharmacy:[],agrivet:[],hardware:[],laundry:[],
  water:[],internet:[],cs:[],pv:[],
};

const ECATS_MAP={
  tapsilog:['Ingredients','LPG/Gas','Utilities','Supplies','Other'],
  carenderia:['Ingredients','LPG/Gas','Utilities','Supplies','Other'],
  bakery:['Ingredients','LPG/Gas','Equipment','Supplies','Other'],
  coffee:['Ingredients','Equipment','Utilities','Supplies','Other'],
  streetfood:['Ingredients','LPG/Gas','Supplies','Other'],
  haloimo:['Ingredients','Ice','Supplies','Other'],
  sari:['Restocking','Utilities','Supplies','Other'],
  pharmacy:['Medicines','Supplies','Utilities','Other'],
  agrivet:['Products','Equipment','Utilities','Other'],
  hardware:['Materials','Supplies','Utilities','Other'],
  laundry:['Detergent','Utilities','Equipment','Other'],
  water:['Chemicals','Utilities','Equipment','Other'],
  xerox:['Supplies','Utilities','Rent','Maintenance','Other'],
  internet:['Load Credits','Equipment','Maintenance','Utilities','Other'],
  cs:['Equipment','Supplies','Utilities','Maintenance','Other'],
  pv:['Load Credits','Machine Parts','Utilities','Maintenance','Other'],
};

// Per-biz custom expense categories (user-added, persisted)
let BIZ_EXP_CATS={};

const SDATA={Today:{},Monthly:{},Yearly:{}};
const EDATA={Today:{},Monthly:{},Yearly:{}};

// Trendline data — deterministic per business key, 3 periods
// Today = last 7 hours, Monthly = last 6 weeks, Yearly = last 12 months
const TREND={};
// For food & retail businesses — generate deterministic trend from base revenue
function getTrendData(key,period){
  // Only use real recorded trend data — never generate fake data
  if(TREND[key]&&TREND[key][period]&&TREND[key][period].length>=2)return TREND[key][period];
  return null;
}

function buildTrendline(key,period,liveRev){
  // Only show trendline when there is actual live revenue
  if(!liveRev||liveRev<=0)return'';
  const rawData=getTrendData(key,period);
  if(!rawData||rawData.length<2)return'';

  // Replace last data point with actual live revenue for accuracy
  const data=[...rawData];
  if(liveRev!=null)data[data.length-1]=liveRev;

  const W=90,H=36,pad=3;
  const vals=data.map(v=>Math.max(v||0,0));
  const mn=Math.min(...vals),mx=Math.max(...vals);
  const range=mx-mn||1;

  const pts=vals.map((v,i)=>{
    const x=pad+(i/(vals.length-1))*(W-pad*2);
    const y=H-pad-((v-mn)/range)*(H-pad*2);
    return[Math.round(x*10)/10,Math.round(y*10)/10];
  });

  // % change: compare second-to-last vs last (most recent movement)
  const prev=vals[vals.length-2]||1;
  const last=vals[vals.length-1];
  const pct=prev>0?Math.round(((last-prev)/prev)*100):0;
  const trend=pct>0?'up':pct<0?'down':'flat';
  const arrow=trend==='up'?'↑':trend==='down'?'↓':'→';
  const pctClass=`trendline-${trend}`;
  const lineColorHex=trend==='up'?'#22c55e':trend==='down'?'#ef4444':'#9ca3af';
  const fillId=`tgf-${key}-${period}`;

  const polyPts=pts.map(([x,y])=>`${x},${y}`).join(' ');
  const fillPts=pts.map(([x,y])=>`${x},${y}`).join(' ')+` ${pts[pts.length-1][0]},${H} ${pts[0][0]},${H}`;
  const [lx,ly]=pts[pts.length-1];
  const periodLabel=period==='Today'?'Hourly':period==='Monthly'?'6 Weeks':'12 Months';

  return`<div class="trendline-wrap">
    <svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="overflow:visible;display:block">
      <defs>
        <linearGradient id="${fillId}" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="${lineColorHex}" stop-opacity="0.22"/>
          <stop offset="100%" stop-color="${lineColorHex}" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <polygon points="${fillPts}" fill="url(#${fillId})"/>
      <polyline points="${polyPts}" fill="none" stroke="${lineColorHex}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="${lx}" cy="${ly}" r="2.2" fill="${lineColorHex}" stroke="var(--bg-secondary)" stroke-width="1.2"/>
    </svg>
    <span class="trendline-title">${periodLabel}</span>
    <span class="trendline-pct ${pctClass}">${arrow} ${Math.abs(pct)}%</span>

      clients:CLIENTS||[],
      biz_custom_info:BIZ_CUSTOM_INFO||{},
      rev_per:revPer||"Today",
      updated_at:now
    },{onConflict:'user_id'});
    // per-biz tables
    const bizKeys=[...new Set([
      ...Object.keys(BIZ_PRODUCTS),

      ...Object.keys(BIZ_LOGS),

      if(BIZ_STOCKS[k]!==undefined)

      if(BIZ_LOGS[k]!==undefined)
        await supa.from('biz_logs').upsert({user_id:uid,biz_key:k,data:BIZ_LOGS[k]||[],updated_at:now},{onConflict:'user_id,biz_key'});
      if(BIZ_EXPLOGS[k]!==undefined)
        await supa.from('biz_explogs').upsert({user_id:uid,biz_key:k,data:BIZ_EXPLOGS[k]||[],updated_at:now},{onConflict:'user_id,biz_key'});
      if(BIZ_CREDITS[k]!==undefined)
        await supa.from('biz_credits').upsert({user_id:uid,biz_key:k,data:BIZ_CREDITS[k]||{},updated_at:now},{onConflict:'user_id,biz_key'});

  }
}

async function loadFromSupabase(){
  if(!currentUser)return false;
  const uid=currentUser.id;
  const today=new Date().toDateString();
  try{
    // user_data
    const {data:ud}=await supa.from('user_data').select('*').eq('user_id',uid).single();
    if(ud){
      if(ud.selected_biz)selectedBiz=ud.selected_biz;
      if(ud.is_dark!==undefined)isDark=ud.is_dark;
      if(ud.pinned_units)pinnedUnits=ud.pinned_units;
      if(ud.biz_exp_cats)BIZ_EXP_CATS=ud.biz_exp_cats;
      if(ud.clients)CLIENTS=ud.clients;
      if(ud.biz_custom_info)BIZ_CUSTOM_INFO=ud.biz_custom_info;
      if(ud.rev_per)revPer=ud.rev_per;
      if(ud.today_rev){
        const tr=ud.today_rev;
        const savedDate=tr._savedDate||null;
        delete tr._savedAt; delete tr._savedDate;
        todayRev=savedDate===today?tr:{};
      }
    }
    // per-biz tables
    const[prods,stocks,logs,explogs,credits,stocklogs,wastelogs]=await Promise.all([
      supa.from('biz_products').select('biz_key,data').eq('user_id',uid),
      supa.from('biz_stocks').select('biz_key,data').eq('user_id',uid),
      supa.from('biz_logs').select('biz_key,data').eq('user_id',uid),
      supa.from('biz_explogs').select('biz_key,data').eq('user_id',uid),
      supa.from('biz_credits').select('biz_key,data').eq('user_id',uid),
      supa.from('biz_stocklogs').select('biz_key,data').eq('user_id',uid),
      supa.from('biz_wastelogs').select('biz_key,data').eq('user_id',uid),
    ]);
    (prods.data||[]).forEach(r=>{BIZ_PRODUCTS[r.biz_key]=r.data;});
    (stocks.data||[]).forEach(r=>{BIZ_STOCKS[r.biz_key]=r.data;});
    (logs.data||[]).forEach(r=>{BIZ_LOGS[r.biz_key]=r.data;});
    (explogs.data||[]).forEach(r=>{BIZ_EXPLOGS[r.biz_key]=r.data;});
    (credits.data||[]).forEach(r=>{BIZ_CREDITS[r.biz_key]=r.data;});
    (stocklogs.data||[]).forEach(r=>{BIZ_STOCKLOGS[r.biz_key]=r.data;});
    (wastelogs.data||[]).forEach(r=>{BIZ_WASTELOGS[r.biz_key]=r.data;});
    // Rebuild todayRev from BIZ_LOGS — always accurate regardless of session/refresh
    todayRev={};
    Object.entries(BIZ_LOGS).forEach(([k,logArr])=>{
      const dayTotal=(logArr||[]).filter(l=>l.dateKey===today&&l.method!=='Credit/Utang').reduce((s,l)=>s+(l.total||0),0);
      if(dayTotal>0)todayRev[k]=dayTotal;
    });
    return true;
  }catch(e){
    console.warn('Supabase load failed:',e);
    return false;
  }
}

function buildBizScreen(key){
  initBizData(key);
  const tab=bizSubTab[key]||'sell';
  if(key==='internet')return buildInternetScreen(key,tab);
  if(key==='cs')return buildCSScreen(key,tab);
  if(key==='pv')return buildPVScreen(key,tab);
  if(tab==='sell')return buildSell(key);
  if(tab==='stock')return buildStock(key);
  if(tab==='pricing')return buildPricing(key);
  if(tab==='others')return buildOthers(key);
  return buildSell(key);
}

// Build just the product grid HTML (used by buildSell and updateSearch)
function buildProductGrid(key,filtered){
  if(!cart[key])cart[key]={};
  const stocks=BIZ_STOCKS[key]||[];
  if(filtered.length===0)return`<div style="grid-column:1/-1;text-align:center;padding:20px;color:var(--text-tertiary);font-size:12px">No products found</div>`;
  return filtered.map(s=>{
    const stockSummary=getStockSummary(key,s.name);
    const stockItem=stockSummary||stocks.find(st=>st.name.toLowerCase()===s.name.toLowerCase());
    const inCart=cart[key][s.id];
    // For variant products, sum qty across all variant cart lines
    const variantCartQty=s.variants&&s.variants.filter(v=>v.name).length>0
      ?Object.entries(cart[key]||{}).filter(([k])=>k.startsWith(s.id+'__v')).reduce((sum,[,v])=>sum+v.qty,0)
      :0;
    const hasStock=!!stockSummary;
    const sellUnit=(s.unit||'').replace(/^per\s+/i,'').trim().toLowerCase();
    const stockUnit=(stockSummary?.stockUnit||'').toLowerCase();
    const specBaseUnit=(stockSummary?.specBaseUnit||'').toLowerCase();
    const specAmt=stockSummary?.specAmt||0;
    let totalQty=null;
    let stockUnitLabel='';
    if(hasStock){
      if(specAmt>0&&specBaseUnit&&sellUnit===specBaseUnit){
        // Selling in base unit (sheets) — use totalBase directly (0 is valid, don't fallback)
        totalQty=Math.round((stockSummary.totalBase??stockSummary.qty*specAmt)*1000)/1000;
        stockUnitLabel=specBaseUnit;
      } else if(specAmt>0&&specBaseUnit){
        // Selling in stockUnit (reams) — convert totalBase back to reams
        totalQty=Math.floor((stockSummary.totalBase??0)/specAmt);
        stockUnitLabel=stockUnit;
      } else {
        // No spec — qty is already in stockUnit
        totalQty=Math.floor(stockSummary.qty);
        stockUnitLabel=stockUnit;
      }
    }
    const inCartQty=inCart?inCart.qty:0;
    const qty=hasStock?Math.max(0,totalQty-inCartQty):null;
    const isOut=hasStock&&totalQty<=0;
    const isUnavailable=hasStock&&qty<=0;
    const isLow=hasStock&&qty>0&&qty<=stockSummary.low;

    // ── Recipe ingredient check ──────────────────────────────────
    // Recipe objects use: {stockId, stockName, qty, useUnit}
    // If any ingredient is depleted, block the product card.
    let recipeBlocked=false;
    let blockedIngredient='';
    const recipe=s.recipe||[];
    if(recipe.length>0){
      for(const ingr of recipe){
        if(!ingr||(!ingr.stockId&&!ingr.stockName))continue;
        // Find ingredient stock — use getStockSummary for aggregated qty across ALL batches
        const ingrName=ingr.stockName||'';
        const ingrStockFirst=ingr.stockId
          ?stocks.find(st=>String(st.id)===String(ingr.stockId))
          :stocks.find(st=>st.name.toLowerCase()===ingrName.toLowerCase());
        if(!ingrStockFirst){recipeBlocked=true;blockedIngredient=ingrName||'ingredient';break;}
        // Always use summary for total qty across all batches
        const ingrSummary=getStockSummary(key,ingrStockFirst.name)||ingrStockFirst;
        const iSpecAmt=ingrSummary.specAmt||0;
        const iSpecBase=(ingrSummary.specBaseUnit||'').toLowerCase();
        const useUnit=(ingr.useUnit||'').toLowerCase();
        // How many BASE units does one sale consume?
        let consumePerSaleBase=ingr.qty||1;
        if(iSpecAmt>0&&iSpecBase&&useUnit!==iSpecBase){
          // ingredient qty is in stockUnit (e.g. reams) → convert to base units (sheets)
          consumePerSaleBase=(ingr.qty||1)*iSpecAmt;
        }
        // totalBase already has reservations subtracted — just check if enough remains for 1 more
        const availableBase=ingrSummary.totalBase||0;
        if(availableBase<consumePerSaleBase){
          recipeBlocked=true;
          blockedIngredient=ingrName||'ingredient';
          break;
        }
      }
    }
    // ── Variant availability check ───────────────────────────────
    // Only block if ALL variants are out of stock
    let variantBlocked=false;
    const variants=s.variants||[];
    const activeVariants=variants.filter(v=>v.name);
    if(activeVariants.length>0){
      const allVariantsOut=activeVariants.every(v=>{
        const recipe=v.recipe||[];
        if(recipe.length===0)return false; // no recipe = always available
        return recipe.some(r=>{
          if(!r.stockId)return false;
          const stockItem=stocks.find(st=>String(st.id)===String(r.stockId));
          if(!stockItem)return true; // stock item missing = treat as out
          const smry=getStockSummary(key,stockItem.name);
          const availBase=smry?.totalBase||0;
          return availBase<(r.qty||1);
        });
      });
      variantBlocked=allVariantsOut;
      // If product has variants, skip the normal recipeBlocked check
      recipeBlocked=false;
    }
    // ────────────────────────────────────────────────────────────

    const finalUnavailable=activeVariants.length>0?variantBlocked:((isUnavailable)||recipeBlocked);

    let stockBadge='';
    if(recipeBlocked&&!(hasStock&&(isOut||isUnavailable))){
      // Show which ingredient is blocking
      stockBadge=`<div style="margin-top:4px;font-size:10px;font-weight:700;color:var(--danger)">Out of stock</div><div style="font-size:9px;color:var(--danger);margin-top:1px">(${blockedIngredient} depleted)</div>`;
    } else if(hasStock){
      if(isOut||isUnavailable)stockBadge=`<div style="margin-top:4px;font-size:10px;font-weight:700;color:var(--danger)">Out of stock</div>`;
      else if(isLow)stockBadge=`<div style="margin-top:4px;font-size:10px;font-weight:700;color:var(--warning)">Low: ${qty} left</div>`;
      else stockBadge=`<div style="margin-top:4px;font-size:10px;font-weight:600;color:var(--accent)">${qty} in stock</div>`;
    }
    return`<div class="svc-wrap" style="${finalUnavailable?'pointer-events:none;opacity:0.4;filter:grayscale(0.5)':''}"><div class="sb${(inCart||variantCartQty>0)?' in-cart':''}${s.pinned?' pinned-svc':''}" onclick="${finalUnavailable?'':` addToCart('${key}',${s.id})`}">
      ${s.pinned?'<span class="pin-badge">📌</span>':''}
      <div class="sn">${s.name}</div>
      <div class="sp">${p(s.price)} ${s.unit}</div>
      ${s.variants&&s.variants.filter(v=>v.name).length>0?`<div style="margin-top:3px;font-size:9px;font-weight:600;color:var(--accent);background:var(--accent-light);border-radius:4px;padding:1px 5px;display:inline-block">⚡ ${s.variants.filter(v=>v.name).length} variants</div>`:''}
      ${stockBadge}
      ${variantCartQty>0?`<div style="margin-top:3px;font-size:10px;font-weight:700;color:var(--accent)">×${variantCartQty} in cart</div>`:inCart?`<div style="margin-top:3px;font-size:10px;font-weight:700;color:var(--accent)">×${inCart.qty} in cart</div>`:''}
    </div><div class="svc-actions"><button class="svc-pin" onclick="event.stopPropagation();togglePin('${key}',${s.id})">${s.pinned?'📌':'📍'}</button><button class="svc-x" onclick="event.stopPropagation();confirmRemoveProduct('${key}',${s.id})">✕</button></div></div>`;
  }).join('');
}

// Build just the cart rows HTML (reused by patchCart)
function buildCartRows(key,items){
  if(!items.length) return`<div class="le" style="padding:8px 0;font-size:11px">Tap a product above to add to cart</div>`;
  return items.map(i=>{
    const isVariant=String(i.id).includes('__v');
    const isSingleVariant=isVariant&&i.singleVariant;
    const cartKey=i.id;
    // For variant lines with multiple variants, show a "switch" button
    const switchBtn=isVariant&&!isSingleVariant
      ?`<button onclick="switchVariant('${key}',${i.prodId},'${cartKey}')" title="Add another variant"
          style="background:var(--accent-light);border:0.5px solid var(--accent);border-radius:5px;cursor:pointer;font-size:9px;color:var(--accent);padding:1px 5px;white-space:nowrap;font-family:inherit">＋ Variant</button>`
      :'';
    return`<div class="cr">
      <div style="flex:1;min-width:0">
        <span class="crn" style="font-size:11px">${i.name}</span>
        ${isVariant?`<div style="margin-top:2px">${switchBtn}</div>`:''}
      </div>
      <div class="qw">

// Remove a single product from within the edit category modal
function removeCatProduct(key,prodId){
  const row=document.getElementById('ecp-row-'+prodId);
  if(row)row.remove();
  // Mark for deletion (remove from BIZ_PRODUCTS immediately)
  if(BIZ_PRODUCTS[key])BIZ_PRODUCTS[key]=BIZ_PRODUCTS[key].filter(p=>p.id!==prodId);
  // Also remove from cart if present
  if(cart[key]&&cart[key][prodId])delete cart[key][prodId];
}

// Save edits from the edit category modal
function saveCatEdit(key,oldCat){
  const newCat=(document.getElementById('ecat-name')?.value||'').trim();
  if(!newCat){toast('Category name cannot be empty','err');return;}
  const prods=BIZ_PRODUCTS[key]||[];
  // Update each product's name, price, and category
  prods.forEach(pr=>{
    if(pr.category!==oldCat)return;
    const nameEl=document.getElementById('ecp-name-'+pr.id);
    const priceEl=document.getElementById('ecp-price-'+pr.id);
    if(nameEl&&nameEl.value.trim())pr.name=nameEl.value.trim();
    if(priceEl&&parseFloat(priceEl.value)>0)pr.price=parseFloat(priceEl.value);
    pr.category=newCat;
  });
  // If filter was on old category, update to new name
  if(sellCatFilter[key]===oldCat)sellCatFilter[key]=newCat;
  saveData();rmModal();render();setTimeout(()=>toast(`Category updated ✓`),50);
}

  modal(`<div class="modal-t" style="color:var(--danger)">🗑️ Remove Category?</div>

// Actually remove category + all its products
function doRemoveCat(key,cat){
  if(!BIZ_PRODUCTS[key])return;
  const toRemove=(BIZ_PRODUCTS[key]||[]).filter(p=>p.category===cat).map(p=>p.id);
  BIZ_PRODUCTS[key]=BIZ_PRODUCTS[key].filter(p=>p.category!==cat);
  // Remove from cart too
  if(cart[key])toRemove.forEach(id=>{if(cart[key][id])delete cart[key][id];});
  if(sellCatFilter[key]===cat)sellCatFilter[key]='All';
  saveData();rmModal();render();setTimeout(()=>toast(`"${cat}" removed ✓`),50);
}

// FIX: Patch cart panel in-place — saves scroll position, no full render
// Compute final total after discount
function getDiscountedTotal(key,rawTot){
  const d=discount[key];
  if(!d||!d.val||d.val<=0)return rawTot;
  if(d.type==='fixed'){
    const fixed=parseFloat(d.val)||0;
    return Math.max(0,fixed);
  } else {
    const pct=parseFloat(d.val)||0;
    return Math.ceil(Math.max(0,rawTot-(rawTot*pct/100)));
  }
}
function getDiscountAmt(key,rawTot){
  return Math.max(0,rawTot-getDiscountedTotal(key,rawTot));
}

function patchCart(key){
  if(!cart[key])cart[key]={};
  const items=Object.values(cart[key]);
  const tot=items.reduce((s,i)=>s+i.price*i.qty,0);
  const cartCount=items.reduce((s,i)=>s+i.qty,0);

  // Save scroll position
  const cb=document.getElementById('cart-body-'+key);
  const scrollTop=cb?cb.scrollTop:0;

  // Patch cart-body
  if(cb)cb.innerHTML=buildCartRows(key,items);

  // Restore scroll
  const cb2=document.getElementById('cart-body-'+key);
  if(cb2)cb2.scrollTop=scrollTop;

  // Patch header total + badge
  const rawTot=tot;
  const finalTot=getDiscountedTotal(key,rawTot);
  const hasDiscount=getDiscountAmt(key,rawTot)>0;
  const hdr=document.getElementById('cart-header-'+key);
  if(hdr)hdr.innerHTML=`<span class="sl" style="margin:0">Cart${cartCount>0?` <span class="cart-badge">${cartCount}</span>`:''}</span><span style="font-size:16px;font-weight:800;color:${hasDiscount?'var(--text-tertiary)':'var(--text-primary)'}${hasDiscount?';text-decoration:line-through':''}">${p(rawTot)}</span>${hasDiscount?`<span style="font-size:16px;font-weight:800;color:var(--success)">${p(finalTot)}</span>`:''}`;

  // Patch record button
  const btn=document.getElementById('record-btn-'+key);
  const mode=saleMode[key]||'sale';
  if(btn){
    btn.disabled=items.length===0;
    btn.textContent=mode==='credit'
      ?(items.length===0?'Record Credit / Utang':`Record Credit / Utang — ${p(finalTot)}`)
      :(items.length===0?'Record Sale':`Record Sale — ${p(finalTot)} via ${xPay}${hasDiscount?' 🏷️':''}`);
  }
  // Inject discount row if items exist but row isn't in DOM yet
  if(items.length>0&&!document.getElementById('disc-row-'+key)){
    const splitWrap=document.getElementById('split-btn-dd-wrap-'+key);
    if(splitWrap){
      const discDiv=document.createElement('div');
      discDiv.id='disc-row-'+key;

      discDiv.innerHTML=`<button onclick="toggleDiscountRow('${key}')"
        style="width:100%;display:flex;align-items:center;justify-content:space-between;background:none;border:0.5px solid var(--border-primary);border-radius:var(--radius-sm);padding:7px 10px;cursor:pointer;font-family:inherit;color:var(--text-secondary);font-size:11px;font-weight:600">
        <span>🏷️ Add Discount</span><span style="font-size:14px;color:var(--accent)">▼</span></button>
        <div id="disc-panel-${key}" style="display:none;background:var(--accent-light);border:0.5px solid var(--accent);border-radius:0 0 var(--radius-sm) var(--radius-sm);border-top:none;padding:10px">
          <div style="display:flex;gap:6px;margin-bottom:8px">
            <button data-disctype="fixed" onclick="setDiscType('${key}','fixed')" style="flex:1;padding:6px;border-radius:var(--radius-sm);font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;border:0.5px solid var(--accent);background:var(--accent);color:#fff">₱ Fixed Amount</button>
            <button data-disctype="pct" onclick="setDiscType('${key}','pct')" style="flex:1;padding:6px;border-radius:var(--radius-sm);font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;border:0.5px solid var(--border-primary);background:var(--bg-primary);color:var(--text-secondary)">% Percent Off</button>
          </div>
          <div style="display:flex;gap:6px;align-items:center">
            <input class="inp" type="number" style="margin:0;flex:1" id="disc-val-${key}" placeholder="Final amount to charge (e.g. 450)" oninput="applyDiscount('${key}',this.value)">
            <span style="font-size:13px;font-weight:700;color:var(--accent)">₱</span>
            <button onclick="clearDiscount('${key}')" style="background:none;border:none;cursor:pointer;color:var(--danger);font-size:18px;padding:0 2px">✕</button>
          </div>
          <div class="disc-breakdown"></div>
        </div>`;
      splitWrap.parentNode.insertBefore(discDiv,splitWrap);
    }

  // Remove discount row if cart is empty
  if(items.length===0){
    const dr=document.getElementById('disc-row-'+key);
    if(dr)dr.remove();
  }
  // Also patch product grid to update "in cart" badges
  try{
    const prods=BIZ_PRODUCTS[key]||[];
    const sorted=[...prods].sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0));
    const activeCat=sellCatFilter[key]||'All';

function buildStock(key){

  const seenBatchNames=new Set();

    const lowUnit=(s.lowUnit||s.stockUnit||'').toLowerCase();
    const summary=getStockSummary(key,s.name);
    const totalQty=summary?summary.qty:s.qty;
    const wacCost=summary?summary.cost:s.cost;
    const lowInStockUnit=(specAmt>0&&specBaseUnit&&lowUnit===specBaseUnit)?s.low/specAmt:s.low;

    return`<div style="margin-bottom:6px;border:0.5px solid var(--border-secondary);border-radius:var(--radius-sm);overflow:hidden"><div class="stk-row" id="stk-row-${s.id}" style="border:none;margin-bottom:0"><div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:600;color:var(--text-primary)">${s.name}${batchLabel}<span class="badge ${out?'b-out':low?'b-low':'b-ok'}">${out?'Out':low?'Low':'OK'}</span></div><div style="font-size:10px;color:var(--text-tertiary)">${p(wacCost)}/${s.stockUnit} (WAC) · ${preview}</div></div><div style="display:flex;align-items:center;gap:6px"><div style="text-align:right"><div style="font-size:15px;font-weight:700;color:${out?'var(--danger)':low?'var(--warning)':'var(--success)'}">${s.qty}</div><div style="font-size:9px;color:var(--text-tertiary)">${s.stockUnit}</div></div>${histBtn}<button style="background:none;border:0.5px solid var(--border-primary);border-radius:6px;padding:5px 8px;font-size:11px;color:var(--text-secondary);cursor:pointer;font-family:inherit" onclick="openEditStock('${key}',${s.id})">&#9999;&#65039;</button></div></div>${histPanel}</div>`;
  }).join('');

function toggleAddToSell(key){
  const circle=document.getElementById('sell-toggle-'+key);
  const priceWrap=document.getElementById('sell-price-wrap-'+key);
  if(!circle||!priceWrap)return;
  const isOn=circle.classList.toggle('on');
  priceWrap.style.display=isOn?'block':'none';
  if(isOn){
    // Reset sell rows for this key and render
    sellRows[key]=[{price:'',unit:getSelectedUnit(key)}];
    renderSellRows(key);
    // Populate category datalist
    populateCatDatalist(key);
    // Auto-fill category if item already exists in sell tab
    const name=document.getElementById('sn-'+key)?.value.trim();
    if(name){
      const existing=(BIZ_PRODUCTS[key]||[]).find(p=>p.name.toLowerCase()===name.toLowerCase());
      if(existing&&existing.category){
        const catEl=document.getElementById('sell-cat-'+key);
        if(catEl)catEl.value=existing.category;
      }
    }
  }
}

  const dl=document.getElementById('sell-cat-list-'+key);

// Auto-add or update product in Sell tab
// Each name+unit combo is a separate product entry
function addToSellTab(key,name,sellPrice,unit,category){
  if(!BIZ_PRODUCTS[key])BIZ_PRODUCTS[key]=[];
  const unitLabel=`per ${unit}`;
  // Match by BOTH name and unit — different units = different products
  const existing=BIZ_PRODUCTS[key].find(p=>
    p.name.toLowerCase()===name.toLowerCase()&&p.unit===unitLabel
  );
  if(existing){
    if(sellPrice>0)existing.price=sellPrice;
    if(category)existing.category=category;
  } else {
    BIZ_PRODUCTS[key].push({
      id:uid(),name,
      price:sellPrice||0,
      cost:0,
      unit:unitLabel,
      category:category||'',
      pinned:false,recipe:[],batchYield:1
    });
  }
}
function toggleSpecBox(key){
  const body=document.getElementById('spec-body-'+key);
  const arrow=document.getElementById('spec-arrow-'+key);
  const toggle=document.getElementById('spec-toggle-'+key);
  if(!body)return;
  const isOpen=body.style.display!=='none';
  body.style.display=isOpen?'none':'block';
  if(arrow)arrow.style.transform=isOpen?'':'rotate(180deg)';
  if(toggle){
    toggle.style.borderRadius=isOpen
      ?'var(--radius-sm)'
      :'var(--radius-sm) var(--radius-sm) 0 0';
    toggle.style.borderBottom=isOpen?'0.5px solid var(--border-secondary)':'none';
  }
}

function onStockUnitChange(key){
  const uk=getSelectedUnit(key);
  const hint=document.getElementById('spec-hint-'+key);
  const dim=UNITS[uk]?.dim;

  // Detect "base unit mode": user selected the specBaseUnit of an existing item (e.g. sheet)
  // In this case, spec box is not needed — close it, clear it, show info hint
  const name=(document.getElementById('sn-'+key)?.value||'').trim().toLowerCase();
  const existRef=name?(BIZ_STOCKS[key]||[]).find(s=>s.name.toLowerCase()===name):null;
  const isBaseUnitMode=existRef&&existRef.specAmt>0&&existRef.specBaseUnit&&
                        uk.toLowerCase()===existRef.specBaseUnit.toLowerCase();

  if(isBaseUnitMode){
    // Auto-close spec box
    const specBody=document.getElementById('spec-body-'+key);
    const specArrow=document.getElementById('spec-arrow-'+key);
    const specToggle=document.getElementById('spec-toggle-'+key);
    if(specBody&&specBody.style.display!=='none'){
      specBody.style.display='none';
      if(specArrow)specArrow.style.transform='';
      if(specToggle){specToggle.style.borderRadius='var(--radius-sm)';specToggle.style.borderBottom='0.5px solid var(--border-secondary)';}
    }
    // Clear spec fields so no stale data is saved
    const spuEl=document.getElementById('spu-'+key);
    const spbuEl=document.getElementById('spbu-'+key);
    if(spuEl)spuEl.value='';
    if(spbuEl)spbuEl.value='pc';
    // Show info hint
    if(hint)hint.textContent=`Restocking in ${uk} directly — WAC will calculate per ${uk}`;
  } else {
    if(hint){
      if(dim==='weight')hint.textContent=`e.g. 1 sack = 25 kg · leave blank if qty already is the weight`;
      else if(dim==='volume')hint.textContent=`e.g. 1 bottle = 250 ml · leave blank if qty already is the volume`;
      else if(dim==='pack')hint.textContent=`e.g. 1 ${uk} = 500 sheets · 1 ${uk} = 250 ml · what's inside?`;
      else hint.textContent=`e.g. 1 dozen = 12 pieces · leave blank for direct count`;
    }
  }

  updateFormUnitDropdowns(key);
  stockCostHint(key);
}

// Builds unit options from current form state: stockUnit + specBaseUnit (if set)
function getFormUnits(key){
  const stockUnit=getSelectedUnit(key);
  const specBaseUnit=document.getElementById('spbu-'+key)?.value||'';
  const units=[stockUnit];
  if(specBaseUnit&&specBaseUnit!==stockUnit)units.push(specBaseUnit);
  return units;
}

// Updates low-stock unit and sell-unit dropdowns from current form selections
function updateFormUnitDropdowns(key){
  let units=getFormUnits(key);
  // If locked, restrict low stock unit select to locked units only
  const locked=stockUnitLocked[key];
  if(locked){
    const lockedUnits=[locked.stockUnit,locked.specBaseUnit].filter(Boolean);
    units=lockedUnits;
  }
  const opts=units.map(u=>`<option value="${u}">${u}</option>`).join('');
  const lowU=document.getElementById('sl-unit-'+key);
  if(lowU){const prev=lowU.value;lowU.innerHTML=opts;if(units.includes(prev))lowU.value=prev;}
  // Re-render sell rows so their unit dropdowns update too
  renderSellRows(key);
}

// Edit stock item modal
function checkLowStockAlert(key){
  const warn=document.getElementById('sl-warn-'+key);
  if(!warn)return;
  const qty=parseFloat(document.getElementById('sq-'+key)?.value)||0;
  const low=parseInt(document.getElementById('sl-'+key)?.value)||0;
  const lowUnit=document.getElementById('sl-unit-'+key)?.value||'';
  const stockUnit=getSelectedUnit(key);
  const specAmt=parseFloat(document.getElementById('spu-'+key)?.value)||0;
  const specBaseUnit=document.getElementById('spbu-'+key)?.value||'';
  if(!low||!qty){warn.textContent='';return;}
  const lowInStockUnit=lowUnit===specBaseUnit&&specAmt>0?(low/specAmt):low;
  const existingQty=(BIZ_STOCKS[key]||[]).find(s=>s.name.toLowerCase()===(document.getElementById('sn-'+key)?.value||'').trim().toLowerCase())?.qty||0;
  const totalAfter=qty+existingQty;
  if(lowInStockUnit>=totalAfter){
    warn.textContent=`⚠️ Alert (${low} ${lowUnit||stockUnit}) ≥ total stock after restock (${totalAfter} ${stockUnit}) — reduce the alert number`;
  } else {
    warn.textContent='';
  }
}

function saveEditStock(key,stockId){
  // Find item — try string match first then number match
  let item=null;
  const arr=BIZ_STOCKS[key]||[];
  for(let i=0;i<arr.length;i++){
    if(String(arr[i].id)===String(stockId)){item=arr[i];break;}
  }
  if(!item){toast('Cannot find item to edit','err');return;}

  const nameEl=document.getElementById('es-name');
  const lowEl=document.getElementById('es-low');
  const lowUnitEl=document.getElementById('es-lowunit');
  const qtyEl=document.getElementById('es-qty');
  const qunitEl=document.getElementById('es-qunit');
  const spAmtEl=document.getElementById('es-spamt');
  const spUnitEl=document.getElementById('es-spunit');

  const name=(nameEl?.value||'').trim();
  const low=parseFloat(lowEl?.value||item.low||2);
  const lowUnit=lowUnitEl?.value||item.lowUnit||item.stockUnit;
  const qty=parseFloat(qtyEl?.value||item.qty||0);
  const qunit=qunitEl?.value||item.stockUnit;
  const specAmt=parseFloat(spAmtEl?.value||0)||0;
  const specUnit=spUnitEl?.value||item.specBaseUnit||'';

  if(!name){toast('Name cannot be empty','err');return;}

  // Update qty with unit conversion
  if(item.specAmt>0&&item.specBaseUnit&&qunit===item.specBaseUnit){
    item.qty=Math.round((qty/item.specAmt)*10000)/10000;
  } else {
    item.qty=qty;
  }

  // Rename sell listings if name changed
  const oldName=item.name;
  if(oldName.toLowerCase()!==name.toLowerCase()&&BIZ_PRODUCTS[key]){
    BIZ_PRODUCTS[key].filter(function(pr){return pr.name.toLowerCase()===oldName.toLowerCase();}).forEach(function(pr){pr.name=name;});
  }
  // Directly assign all fields
  item.name=name;
  item.low=low;
  item.lowUnit=lowUnit;
  if(specAmt>0){item.specAmt=specAmt;item.specBaseUnit=specUnit;}
  // Sell tab sync
  const esSellBody=document.getElementById('es-sell-body');
  const sellOn=esSellBody&&esSellBody.style.display!=='none';
  const esRows=esEditSellRows[key]||[];
  const keepUnits=new Set(esRows.filter(function(r){return parseFloat(r.price)>0;}).map(function(r){return r.unit;}));
  if(sellOn){
    if(BIZ_PRODUCTS[key]){
      const toRm=BIZ_PRODUCTS[key].filter(function(pr){return pr.name.toLowerCase()===name.toLowerCase()&&!keepUnits.has((pr.unit||'').replace(/^per\s+/i,'').trim());});
      toRm.forEach(function(pr){if(cart[key]&&cart[key][pr.id])delete cart[key][pr.id];});
      BIZ_PRODUCTS[key]=BIZ_PRODUCTS[key].filter(function(pr){return!(pr.name.toLowerCase()===name.toLowerCase()&&!keepUnits.has((pr.unit||'').replace(/^per\s+/i,'').trim()));});
    }
    const esSellCat=(document.getElementById('es-sell-cat')?.value||'').trim();
    esRows.filter(function(r){return parseFloat(r.price)>0;}).forEach(function(r){addToSellTab(key,name,parseFloat(r.price),r.unit,esSellCat);});
  } else if(!sellOn&&esSellBody){
    if(BIZ_PRODUCTS[key]){
      const toRm=BIZ_PRODUCTS[key].filter(function(pr){return pr.name.toLowerCase()===name.toLowerCase();});
      toRm.forEach(function(pr){if(cart[key]&&cart[key][pr.id])delete cart[key][pr.id];});
      BIZ_PRODUCTS[key]=BIZ_PRODUCTS[key].filter(function(pr){return pr.name.toLowerCase()!==name.toLowerCase();});
    }
  }
  saveData();
  rmModal();
  render();
  const sellMsg=sellOn&&keepUnits.size>0?' · sell tab updated ✓':'';
  setTimeout(function(){toast('Updated: '+name+' · alert='+low+' '+lowUnit+sellMsg+' ✓');},50);
}

function confirmDeleteStock(key,stockId){
  const stk=BIZ_STOCKS[key]||[];
  const s=stk.find(x=>x.id===stockId);
  if(!s)return;
  const qtyLabel=s.specAmt>0?`${s.qty} ${s.stockUnit} (${s.qty*(s.specAmt||1)} ${s.specBaseUnit})`:`${s.qty} ${s.stockUnit}`;
  const sellCount=(BIZ_PRODUCTS[key]||[]).filter(pr=>pr.name.toLowerCase()===s.name.toLowerCase()).length;
  const remainingAfter=stk.filter(x=>x.name.toLowerCase()===s.name.toLowerCase()&&String(x.id)!==String(stockId));
  const isLastBatch=remainingAfter.length===0;
  const sellInfo=isLastBatch&&sellCount>0?('<div style="background:var(--warning-light);border:0.5px solid var(--warning);border-radius:var(--radius-sm);padding:8px 10px;font-size:11px;color:var(--warning);margin-bottom:8px">⚠️ Last batch — '+sellCount+' sell listing'+(sellCount>1?'s':'')+' for "'+s.name+'" will also be removed from Sell tab.</div>'):'';
  const batchInfo=!isLastBatch?('<div style="background:var(--accent-light);border:0.5px solid var(--accent);border-radius:var(--radius-sm);padding:8px 10px;font-size:11px;color:var(--accent);margin-bottom:8px">ℹ️ '+remainingAfter.length+' other batch'+(remainingAfter.length>1?'es':'')+' of "'+s.name+'" will remain in stock.</div>'):'';
  const expNote='<div style="background:var(--bg-tertiary);border:0.5px solid var(--border-secondary);border-radius:var(--radius-sm);padding:8px 10px;font-size:11px;color:var(--text-tertiary);margin-bottom:8px">💡 Purchase expenses are preserved in your records. Delete them manually in Others → Expenses if needed.</div>';

  modal(`<div class="modal-t">🗑️ Delete Stock Batch</div>
    <div style="font-size:13px;color:var(--text-primary);margin-bottom:8px">Remove this batch of <strong>${s.name}</strong>?</div>
    <div style="background:var(--danger-light);border:0.5px solid var(--danger);border-radius:var(--radius-sm);padding:10px;font-size:12px;color:var(--danger);margin-bottom:8px">
      <strong>${qtyLabel}</strong> will be permanently removed from inventory.
    </div>
    ${sellInfo}${batchInfo}${expNote}
    <div class="mbtnrow">
      <button class="btn-c" onclick="openEditStock('${key}',${stockId})">&#8592; Back</button>
      <button style="background:var(--danger);color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit" onclick="deleteStock('${key}',${stockId})">Confirm Delete</button>
    </div>`);
}

function deleteStock(key,stockId){
  const s=(BIZ_STOCKS[key]||[]).find(x=>String(x.id)===String(stockId));
  const deletedName=s?s.name.toLowerCase():'';
  BIZ_STOCKS[key]=(BIZ_STOCKS[key]||[]).filter(x=>String(x.id)!==String(stockId));
  const remainingBatches=(BIZ_STOCKS[key]||[]).filter(x=>x.name.toLowerCase()===deletedName);
  const isLastBatch=remainingBatches.length===0;
  if(isLastBatch){
    if(deletedName&&BIZ_PRODUCTS[key]){
      const removedIds=BIZ_PRODUCTS[key].filter(pr=>pr.name.toLowerCase()===deletedName).map(pr=>pr.id);
      BIZ_PRODUCTS[key]=BIZ_PRODUCTS[key].filter(pr=>pr.name.toLowerCase()!==deletedName);
      if(cart[key])removedIds.forEach(id=>{if(cart[key][id])delete cart[key][id];});
    }
    if(deletedName&&BIZ_STOCKLOGS[key])BIZ_STOCKLOGS[key]=BIZ_STOCKLOGS[key].filter(l=>!(l.stockName&&l.stockName.toLowerCase()===deletedName));
    saveData();rmModal();render();
    setTimeout(()=>toast(`"${s?.name||'Item'}" fully deleted – inventory & sell tab cleared ✓`),50);
  } else {
    saveData();rmModal();render();
    setTimeout(()=>toast(`Batch deleted – ${remainingBatches.length} batch${remainingBatches.length>1?'es':''} of "${s?.name}" remaining ✓`),50);
  }
}

function stockCostHint(key){
  const hint=document.getElementById('cost-hint-'+key);
  if(!hint)return;
  const qty=parseFloat(document.getElementById('sq-'+key)?.value)||0;
  const totalCost=parseFloat(document.getElementById('sc-'+key)?.value)||0;
  const uk=getSelectedUnit(key);
  const specAmt=parseFloat(document.getElementById('spu-'+key)?.value)||0;
  const specUnit=document.getElementById('spbu-'+key)?.value||'pc';
  const name=document.getElementById('sn-'+key)?.value.trim().toLowerCase();
  if(!qty||!totalCost){hint.textContent='';return;}

  // Check if this is a restock — use getStockSummary for accurate aggregated WAC
  const summary=name?getStockSummary(key,name):null;
  const isRestock=!!summary;

  let hintHtml='';
  if(specAmt>0){
    const totalBase=qty*specAmt;
    const newCostPerBase=totalCost/totalBase;
    const costPerStockUnit=totalCost/qty;
    hintHtml=`<span style="color:var(--text-tertiary)">${qty} × ${specAmt} = ${totalBase} ${specUnit} total</span> → <strong style="color:var(--accent)">${p(newCostPerBase)}/${specUnit}</strong> · ${p(costPerStockUnit)}/${uk}`;
    if(isRestock&&summary){
      const exSpecAmt=summary.specAmt||0;
      const exBaseQty=exSpecAmt>0?summary.qty*exSpecAmt:summary.qty;
      const exValue=exBaseQty*(summary.cost||0);
      const wac=safeRound((exValue+totalCost)/(exBaseQty+totalBase));
      const bc=summary.batches?summary.batches.length:1;
      hintHtml+=`<br><span style="color:var(--text-tertiary)">Current: ${exBaseQty} ${specUnit} @ ${p(summary.cost)} (WAC across ${bc} batch${bc>1?'es':''})</span> → <strong style="color:var(--success)">New WAC = ${p(wac)}/${specUnit}</strong>`;
    }
  } else {
    const newCostPerUnit=totalCost/qty;
    hintHtml=`<span style="color:var(--text-tertiary)">₱${p(totalCost)} ÷ ${qty}</span> → <strong style="color:var(--accent)">${p(newCostPerUnit)}/${uk}</strong>`;
    if(isRestock&&summary){
      const exBaseQty=summary.qty;
      const exValue=exBaseQty*(summary.cost||0);
      const wac=safeRound((exValue+totalCost)/(exBaseQty+qty));
      const bc=summary.batches?summary.batches.length:1;
      hintHtml+=`<br><span style="color:var(--text-tertiary)">Current: ${exBaseQty} ${uk} @ ${p(summary.cost)} (WAC across ${bc} batch${bc>1?'es':''})</span> → <strong style="color:var(--success)">New WAC = ${p(wac)}/${uk}</strong>`;
    }
  }
  hint.innerHTML=hintHtml;
  // Margin hint for sell price field
  const sellPrice=parseFloat(document.getElementById('sp-'+key)?.value)||0;
  const marginEl=document.getElementById('sell-margin-'+key);
  if(marginEl&&sellPrice>0&&qty>0&&totalCost>0){
    const specA=parseFloat(document.getElementById('spu-'+key)?.value)||0;
    const costPerUnit=specA>0?totalCost/(qty*specA):totalCost/qty;
    const margin=Math.round((sellPrice-costPerUnit)/sellPrice*100);
    const profit=sellPrice-costPerUnit;
    marginEl.innerHTML=`Margin: <strong style="color:${margin>=0?'var(--success)':'var(--danger)'}">${margin}%</strong> · Profit per unit: <strong style="color:${profit>=0?'var(--success)':'var(--danger)'}">${p(profit)}</strong>`;
  } else if(marginEl){marginEl.textContent='';}
}

function buildInventoryContent(key){
  const rawStk=BIZ_STOCKS[key]||[];

  // Deduplicate by name — one combined row per item using getStockSummary
  const seenNames=new Set();
  const stk=[];
  rawStk.forEach(s=>{
    const n=s.name.toLowerCase();
    if(!seenNames.has(n)){seenNames.add(n);stk.push(getStockSummary(key,s.name));}
  });

  // Convert low alert to stock unit for comparison
  function getLowInStockUnit(s){
    const specAmt=s.specAmt||0;
    const specBaseUnit=(s.specBaseUnit||'').toLowerCase();
    const lowUnit=(s.lowUnit||s.stockUnit||'').toLowerCase();
    if(specAmt>0&&specBaseUnit&&lowUnit===specBaseUnit){
      return s.low/specAmt; // convert sheets→reams
    }
    return s.low;
  }

  const lowItems=stk.filter(s=>{const l=getLowInStockUnit(s);return Math.floor(s.qty)>0&&s.qty<=l;});
  const outItems=stk.filter(s=>Math.floor(s.qty)<=0);
  const okItems=stk.filter(s=>{const l=getLowInStockUnit(s);return s.qty>l;});
  const alertCount=lowItems.length+outItems.length;

  function itemRow(s){
    const lowInStockUnit=getLowInStockUnit(s);
    const displayQty=Math.floor(s.qty);
    const out=displayQty<=0;
    const low=!out&&s.qty<=lowInStockUnit;
    const lowUnit=s.lowUnit||s.stockUnit;
    return`<div class="stk-row" style="padding:8px 0;border-bottom:0.5px solid var(--border-secondary)">
      <div style="flex:1">
        <div style="font-size:12px;font-weight:700;color:var(--text-primary)">${s.name}
          <span class="badge ${out?'b-out':low?'b-low':'b-ok'}">${out?'Out':low?'Low':'OK'}</span>
        </div>
        <div style="font-size:10px;color:var(--text-tertiary);margin-top:2px">Cost ${p(s.cost)}/${s.stockUnit} · Alert at ${s.low} ${lowUnit}</div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div style="font-size:14px;font-weight:800;color:${out?'var(--danger)':low?'var(--warning)':'var(--success)'}">${displayQty}</div>
        <div style="font-size:9px;color:var(--text-tertiary)">${s.stockUnit}</div>
        ${s.specAmt>0&&s.specBaseUnit?`<div style="font-size:9px;color:var(--text-tertiary)">${Math.round(s.qty*s.specAmt*1000)/1000} ${s.specBaseUnit}</div>`:''}
      </div>
    </div>`;
  }

  return`
    <!-- Total Items collapsible -->
    <div class="cb" style="margin-bottom:8px;padding:0;overflow:hidden">
      <div onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none';this.querySelector('.inv-arrow').textContent=this.nextElementSibling.style.display==='none'?'▼':'▲'"
        style="display:flex;justify-content:space-between;align-items:center;padding:12px 14px;cursor:pointer;user-select:none">
        <div>
          <div style="font-size:10px;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.5px">Total Items</div>
          <div style="font-size:22px;font-weight:800;color:var(--accent)">${stk.length}</div>
        </div>
        <span class="inv-arrow" style="font-size:18px;color:var(--accent)">▼</span>
      </div>
      <div style="display:none;border-top:0.5px solid var(--border-secondary);padding:0 14px 8px">
        ${stk.length===0?'<div class="le" style="padding:12px 0">No inventory yet — add from Stock tab</div>':okItems.concat(lowItems).concat(outItems).map(itemRow).join('')}
      </div>
    </div>

    <!-- Low / Out collapsible -->
    <div class="cb" style="margin-bottom:0;padding:0;overflow:hidden;border:0.5px solid ${alertCount>0?'var(--danger)':'var(--border-primary)'}">
      <div onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none';this.querySelector('.inv-arrow').textContent=this.nextElementSibling.style.display==='none'?'▼':'▲'"
        style="display:flex;justify-content:space-between;align-items:center;padding:12px 14px;cursor:pointer;user-select:none">
        <div>
          <div style="font-size:10px;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.5px">Low / Out of Stock</div>
          <div style="font-size:22px;font-weight:800;color:${alertCount>0?'var(--danger)':'var(--success)'}">${alertCount}</div>
          ${alertCount>0?`<div style="font-size:10px;color:var(--danger);font-weight:600;margin-top:2px">⚠️ Needs restocking</div>`:`<div style="font-size:10px;color:var(--success);font-weight:600;margin-top:2px">✅ All good</div>`}
        </div>
        <span class="inv-arrow" style="font-size:18px;color:${alertCount>0?'var(--danger)':'var(--success)'}">▼</span>
      </div>
      <div style="display:none;border-top:0.5px solid var(--border-secondary);padding:0 14px 8px">
        ${alertCount===0?'<div class="le" style="padding:12px 0">✅ All items are well stocked</div>':[...outItems,...lowItems].map(itemRow).join('')}
      </div>
    </div>`;
}
